<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KockBot</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#bacca0">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Google Fonts -->

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Calendar, ShoppingCart, BookOpen, RefreshCw, Info, 
          X, CalendarDays, Plus, Upload, Trash2, Save, Users,
          Loader2, Copy, Check, Utensils, ExternalLink, Filter, Camera, Sparkles, Download, Lock, Unlock, ChevronDown, ImagePlus, Sun, Moon
        } from 'lucide-react';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // =========================================================================
        // API OCH FIREBASE CONFIG
        // =========================================================================
        const apiKey = "AIzaSyA1MHgK78SDZ8wqJ16wmbcvQYQEJyqOth0"; 

        const myFirebaseConfig = {
          apiKey: "AIzaSyANEkApp6RLf2dXSiIu_cE5wyDp1dSZuRk",
          authDomain: "kockbot-f0e5f.firebaseapp.com",
          projectId: "kockbot-f0e5f",
          storageBucket: "kockbot-f0e5f.firebasestorage.app",
          messagingSenderId: "132836094378",
          appId: "1:132836094378:web:98106b8982f6c47f61bbd3",
          measurementId: "G-DDW0GD700Z"
        }; 

        let auth = null;
        let db = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kockbot-live';

        try {
          const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
          const finalConfig = (myFirebaseConfig && myFirebaseConfig.apiKey) ? myFirebaseConfig : (configStr ? JSON.parse(configStr) : null);
          
          if (finalConfig && Object.keys(finalConfig).length > 0) {
            const app = initializeApp(finalConfig);
            auth = getAuth(app);
            db = getFirestore(app);
          }
        } catch (err) {
          console.error("Kunde inte initiera databasen:", err);
        }

        // =========================================================================
        // KONSTANTER & HJÄLPFUNKTIONER
        // =========================================================================
        const CATEGORY_CYCLE = ['kött', 'veg', 'fisk', 'kyckling', 'veg', 'kött', 'fisk'];
        const DAYS = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'];
        const BOOK_COLLECTIONS = ['Alla', 'Spaghetti- & pastarätter', 'Potatisrätter', 'Risrätter', 'Soppor', 'Övriga vardagsrätter', 'Helgmat'];

        const getISOWeekNumber = (date) => {
          const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
          const dayNum = d.getUTCDay() || 7;
          d.setUTCDate(d.getUTCDate() + 4 - dayNum);
          const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
          return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        };

        const FALLBACK_IMAGES = [
          "https://images.unsplash.com/photo-1495114752715-2c392c6c78a0?q=80&w=800&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?q=80&w=800&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=800&auto=format&fit=crop"
        ];

        const getFallbackImage = (id) => {
           if (!id) return FALLBACK_IMAGES[0];
           let hash = 0;
           for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
           return FALLBACK_IMAGES[Math.abs(hash) % FALLBACK_IMAGES.length];
        };

        const getRecipeImage = (recipe) => {
          if (recipe.customImage) return recipe.customImage;

          let seed = Math.abs([...(recipe.name || '')].reduce((s, c) => Math.imul(31, s) + c.charCodeAt(0) | 0, 0));
          if (recipe.imagePrompt) {
              const prompt = `${recipe.imagePrompt}, professional food photography, appetizing, highly detailed, restaurant plating, absolutely no text`;
              return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=800&height=600&nologo=true&seed=${seed}`;
          }

          let translated = (recipe.name || '').toLowerCase();
          const dict = {
            'köttfärssås': 'bolognese sauce', 'köttfärsbiffar': 'beef patties', 'köttfärs': 'ground beef', 'blandfärs': 'ground meat',
            'köttbullar': 'meatballs', 'korvstroganoff': 'sausage stroganoff', 'falukorv': 'swedish falukorv sausage', 'salsiccia': 'salsiccia sausage',
            'korv': 'sausage', 'potatismos': 'mashed potatoes', 'pommes frites': 'french fries', 'torsk': 'cod fish', 'lax': 'salmon',
            'smörgåstårta': 'swedish sandwich cake', 'äggakaka': 'thick pancake', 'ugnspannkaka': 'oven baked pancake', 'plättar': 'small pancakes'
          };
          
          Object.keys(dict).sort((a, b) => b.length - a.length).forEach(k => {
            translated = translated.replace(new RegExp(k, 'gi'), dict[k]);
          });
          
          let context = recipe.collection === "Soppor" ? "creamy soup in a bowl, cinematic lighting" : 
                        recipe.collection === "Spaghetti- & pastarätter" ? "pasta dish in a deep plate, cinematic lighting" : "delicious food plate, cinematic lighting, food photography";

          const finalPrompt = `Professional food photography of ${translated}, ${context}, appetizing, realistic, highly detailed, restaurant plating, absolutely no text, no letters, no watermark`;
          return `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=800&height=600&nologo=true&seed=${seed}`;
        };

        const normalizeName = (name) => {
          let n = name.toLowerCase().trim();

          // Exakta synonymer
          const exactSynonyms = {
            'creme fraiche': 'crème fraiche',
            'crème fraîche': 'crème fraiche',
            'krossade tomater': 'krossad tomat',
            'passerade tomater': 'passerad tomat',
            'gullök': 'gul lök',
            'gula lökar': 'gul lök',
            'rödlök': 'röd lök',
            'röda lökar': 'röd lök',
            'köttfärs': 'nötfärs/blandfärs',
            'nötfärs': 'nötfärs/blandfärs',
            'blandfärs': 'nötfärs/blandfärs'
          };

          if (exactSynonyms[n]) {
            n = exactSynonyms[n];
          } else {
            n = n.replace(/vitlöks\s*klyft(a|or)/g, 'vitlöksklyfta');
            n = n.replace(/kycklingbröstfilé(er)?/g, 'kycklingfilé');
            n = n.replace(/kyckling\s*filé(er)?/g, 'kycklingfilé');
            n = n.replace(/cr[eéè]me\s*fra[iîï]che/g, 'crème fraiche');
          }

          const reps = { 'klyftor$':'klyfta', 'lökar$':'lök', 'tomater$':'tomat', 'morötter$':'morot', 'potatisar$':'potatis', 'filéer$':'filé', 'förpackningar$':'förp', 'burkar$':'burk', 'skivor$':'skiva', 'bitar$':'bit', 'påsar$':'påse', 'krukor$':'kruka', 'halvor$':'halva', '^gula ':'gul ', '^röda ':'röd ', '^gröna ':'grön ', '^färska ':'färsk ' };
          for(let [k,v] of Object.entries(reps)) n = n.replace(new RegExp(k, 'i'), v);
          return n.charAt(0).toUpperCase() + n.slice(1);
        };

        const normalizeUnit = (unit) => {
          let u = unit.toLowerCase().trim();
          if (new RegExp('^(klyftor|klyfta|stycken|styck)$').test(u)) return 'st';
          if (new RegExp('^(förpackning|paket|pkt|förpackningar)$').test(u)) return 'förp';
          if (new RegExp('^(krukor)$').test(u)) return 'kruka';
          if (new RegExp('^(skivor)$').test(u)) return 'skiva';
          if (new RegExp('^(burkar|burk)$').test(u)) return 'burk';
          if (new RegExp('^(portioner|portion)$').test(u)) return 'port';
          if (new RegExp('^(gram)$').test(u)) return 'g';
          if (new RegExp('^(kilo)$').test(u)) return 'kg';
          if (new RegExp('^(matskedar|matsked)$').test(u)) return 'msk';
          if (new RegExp('^(teskedar|tesked)$').test(u)) return 'tsk';
          if (new RegExp('^(kryddmått)$').test(u)) return 'krm';
          if (new RegExp('^(liter)$').test(u)) return 'l';
          if (new RegExp('^(deciliter)$').test(u)) return 'dl';
          if (new RegExp('^(centiliter)$').test(u)) return 'cl';
          if (new RegExp('^(milliliter)$').test(u)) return 'ml';
          if (new RegExp('^(knippen)$').test(u)) return 'knippe';
          if (new RegExp('^(nävar)$').test(u)) return 'näve';
          return u;
        };

        const formatAmounts = (amountsObj) => {
          const parts = [];
          for (const [unit, amount] of Object.entries(amountsObj)) {
            if (amount === 0) { 
              if (unit) parts.push(unit); 
              continue; 
            }
            let displayAmount = amount;
            let displayUnit = unit;
            if (unit === 'g' && amount >= 1000 && amount % 100 === 0) { 
              displayAmount = amount / 1000; 
              displayUnit = 'kg'; 
            }
            displayAmount = Math.round(displayAmount * 10) / 10;
            parts.push(`${displayAmount} ${displayUnit}`.trim());
          }
          return parts.join(' + ') || 'Efter smak';
        };

        const parseInstructionsText = (text) => {
          if (!text) return [];
          return text
            .split(/\n|(?=\s\d+\.\s)/)
            .map(step => step.replace(/^\s*\d+\.\s*/, '').trim())
            .filter(step => step.length > 0);
        };

        const RobotLogo = () => (
          <img src="./logo.png" alt="KockBot Logo" className="w-full h-full object-cover rounded-lg shadow-sm" />
        );

        const CatBadge = ({ protein }) => {
          const colors = { 
            'kött': 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400 border-red-200 dark:border-red-800', 
            'fisk': 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400 border-blue-200 dark:border-blue-800', 
            'veg': 'bg-[#bacca0] dark:bg-[#171f0d]/40 text-[#293819] dark:text-[#82a061] border-[#bacca0] dark:border-[#293819]', 
            'kyckling': 'bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 border-amber-200 dark:border-amber-800' 
          };
          const pStr = protein ? protein.toLowerCase() : 'veg';
          return (
            <span className={`px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wider shadow-sm border ${colors[pStr] || colors['veg']}`}>
              {protein || 'VEG'}
            </span>
          );
        };

        const DEFAULT_RECIPES = [];

        // =========================================================================
        // HUVUDKOMPONENT
        // =========================================================================
        const App = () => {
          const [activeTab, setActiveTab] = useState('plan'); 
          const [planType, setPlanType] = useState('week'); 
          const [toastMessage, setToastMessage] = useState(null);
          const [user, setUser] = useState(null);
          const [isDbLoaded, setIsDbLoaded] = useState(false);

          const [isDarkMode, setIsDarkMode] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_theme');
            if (saved) return saved === 'dark';
            return window.matchMedia('(prefers-color-scheme: dark)').matches;
          });

          const [householdId, setHouseholdId] = useState(() => localStorage.getItem('smartMatsedel_householdId') || '');
          const [showShareModal, setShowShareModal] = useState(false);
          const [isPlanLocked, setIsPlanLocked] = useState(() => localStorage.getItem('smartMatsedel_planLocked') === 'true');
          
          const [planStartOffset, setPlanStartOffset] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_planStartOffset');
            return saved ? Number(saved) : 0;
          });

          const [inspirationQuery, setInspirationQuery] = useState('');
          const [isGeneratingInspiration, setIsGeneratingInspiration] = useState(false);
          const [inspiredRecipe, setInspiredRecipe] = useState(null);

          const [recipes, setRecipes] = useState(() => {
            const isCleared = localStorage.getItem('smartMatsedel_cleared_v123');
            if (!isCleared) {
              localStorage.removeItem('smartMatsedel_recipes');
              localStorage.setItem('smartMatsedel_cleared_v123', 'true');
              return DEFAULT_RECIPES;
            }
            const saved = localStorage.getItem('smartMatsedel_recipes');
            return saved ? JSON.parse(saved) : DEFAULT_RECIPES;
          });

          const [mealPlan, setMealPlan] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_mealPlan');
            return saved ? JSON.parse(saved) : [];
          });
          
          const [checkedListItems, setCheckedListItems] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_checkedListItems');
            return saved ? JSON.parse(saved) : {};
          });

          const [selectedCollection, setSelectedCollection] = useState('Alla');
          const [selectedRecipeId, setSelectedRecipeId] = useState(null);
          
          const [showAddModal, setShowAddModal] = useState(false);
          const [isUploadingPdf, setIsUploadingPdf] = useState(false);
          const fileInputRef = useRef(null);

          const imageUploadRef = useRef(null);
          const [uploadingForRecipeId, setUploadingForRecipeId] = useState(null);

          const [deferredPrompt, setDeferredPrompt] = useState(null);
          const [isIOS, setIsIOS] = useState(false);
          const [isStandalone, setIsStandalone] = useState(false);

          // PWA SETUP & DARK MODE
          useEffect(() => {
            const setupPWA = () => {
              let appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
              if (!appleIcon) {
                appleIcon = document.createElement('link');
                appleIcon.rel = 'apple-touch-icon';
                document.head.appendChild(appleIcon);
              }
              appleIcon.href = './logo.png';

              let manifest = document.querySelector('link[rel="manifest"]');
              if (!manifest) {
                manifest = document.createElement('link');
                manifest.rel = 'manifest';
                document.head.appendChild(manifest);
              }
              
              const manifestData = {
                name: "KockBot",
                short_name: "KockBot",
                start_url: ".",
                display: "standalone",
                background_color: isDarkMode ? "#0f172a" : "#f8fafc",
                theme_color: isDarkMode ? "#171f0d" : "#bacca0",
                icons: [
                  { src: "./logo.png", sizes: "192x192", type: "image/png", purpose: "any maskable" },
                  { src: "./logo.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
                ]
              };
              manifest.href = `data:application/manifest+json;charset=utf-8,${encodeURIComponent(JSON.stringify(manifestData))}`;
            };

            setupPWA();
            
            localStorage.setItem('smartMatsedel_theme', isDarkMode ? 'dark' : 'light');
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [isDarkMode]);

          useEffect(() => {
            if (!householdId) {
              const newId = Math.random().toString(36).substring(2, 8).toUpperCase();
              setHouseholdId(newId);
              localStorage.setItem('smartMatsedel_householdId', newId);
            }
          }, [householdId]);

          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  try { await signInWithCustomToken(auth, __initial_auth_token); } 
                  catch (tokenErr) { await signInAnonymously(auth); }
                } else {
                  await signInAnonymously(auth);
                }
              } catch(e) {}
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !db || !householdId) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'households', householdId);
            const unsubscribe = onSnapshot(docRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.recipes) setRecipes(data.recipes);
                if (data.mealPlan) setMealPlan(data.mealPlan);
                if (data.planType) setPlanType(data.planType);
                if (data.checkedListItems) setCheckedListItems(data.checkedListItems);
                if (data.isPlanLocked !== undefined) setIsPlanLocked(data.isPlanLocked);
                if (data.planStartOffset !== undefined) setPlanStartOffset(data.planStartOffset);
              } else {
                setDoc(docRef, { recipes, mealPlan, planType, checkedListItems, isPlanLocked, planStartOffset }, { merge: true }).catch(console.error);
              }
              setIsDbLoaded(true);
            }, (err) => { setIsDbLoaded(true); });
            return () => unsubscribe();
          }, [user, householdId]);

          const updateDb = async (updates) => {
            if (!user || !db || !householdId) return;
            try {
              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'households', householdId);
              await setDoc(docRef, updates, { merge: true });
            } catch (err) {}
          };

          useEffect(() => { localStorage.setItem('smartMatsedel_recipes', JSON.stringify(recipes)); }, [recipes]);
          useEffect(() => { localStorage.setItem('smartMatsedel_mealPlan', JSON.stringify(mealPlan)); }, [mealPlan]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planType', planType); }, [planType]);
          useEffect(() => { localStorage.setItem('smartMatsedel_checkedListItems', JSON.stringify(checkedListItems)); }, [checkedListItems]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planLocked', isPlanLocked); }, [isPlanLocked]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planStartOffset', planStartOffset); }, [planStartOffset]);

          useEffect(() => {
            setIsIOS(new RegExp('iPad|iPhone|iPod').test(navigator.userAgent) && !window.MSStream);
            setIsStandalone(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
            const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setDeferredPrompt(e); };
            window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
          }, []);

          const showToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(null), 4000);
          };

          const installApp = async () => {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              if (outcome === 'accepted') setDeferredPrompt(null);
            } else {
              if (isIOS) {
                showToast("På iPhone: Tryck på 'Dela'-ikonen i botten och välj 'Lägg till på hemskärmen'.");
              } else {
                showToast("På Android: Tryck på webbläsarens meny och välj 'Lägg till på startskärmen'.");
              }
            }
          };

          const triggerImageUpload = (e, recipeId) => {
            e.stopPropagation();
            setUploadingForRecipeId(recipeId);
            if (imageUploadRef.current) imageUploadRef.current.click();
          };

          const handleImageFileChange = (e) => {
            const file = e.target.files?.[0];
            if (!file || !uploadingForRecipeId) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const MAX_DIM = 800;
                
                if (width > height) { 
                  if (width > MAX_DIM) { 
                    height *= MAX_DIM / width; 
                    width = MAX_DIM; 
                  } 
                } else { 
                  if (height > MAX_DIM) { 
                    width *= MAX_DIM / height; 
                    height = MAX_DIM; 
                  } 
                }
                
                canvas.width = width; 
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                const newRecipes = recipes.map(r => r.id === uploadingForRecipeId ? { ...r, customImage: dataUrl } : r);
                
                setRecipes(newRecipes);
                updateDb({ recipes: newRecipes });
                showToast("Din bild har sparats!");
                setUploadingForRecipeId(null);
                if (imageUploadRef.current) imageUploadRef.current.value = '';
              };
              img.src = event.target.result;
            };
            reader.readAsDataURL(file);
          };

          const generatePlan = (type, availableRecipes = recipes) => {
            if (availableRecipes.length === 0) { 
              showToast("Lägg till minst ett recept först."); 
              setActiveTab('recipes'); 
              return; 
            }
            const numDays = type === 'week' ? 7 : type === '2weeks' ? 14 : type === '3weeks' ? 21 : 28;
            const newPlan = [];
            
            for (let i = 0; i < numDays; i++) {
              const targetProtein = CATEGORY_CYCLE[i % CATEGORY_CYCLE.length]; 
              let candidates = availableRecipes.filter(r => r.protein === targetProtein);
              if (candidates.length === 0) candidates = availableRecipes;
              const randomIdx = Math.floor(Math.random() * candidates.length);
              newPlan.push({ 
                dayIndex: i, 
                dayName: DAYS[i % 7], 
                weekNumber: Math.floor(i / 7) + 1, 
                recipe: candidates[randomIdx] 
              });
            }
            
            setMealPlan(newPlan); 
            setPlanType(type); 
            setCheckedListItems({}); 
            setIsPlanLocked(false);
            updateDb({ mealPlan: newPlan, planType: type, checkedListItems: {}, isPlanLocked: false });
          };

          const toggleLock = () => {
            const newState = !isPlanLocked;
            setIsPlanLocked(newState); 
            updateDb({ isPlanLocked: newState });
            showToast(newState ? "Matsedeln är nu låst för hela hushållet! 🔒" : "Matsedeln är nu upplåst! 🔓");
          };

          const clearDayRecipe = (index) => {
            const currentPlan = [...mealPlan];
            currentPlan[index].recipe = null;
            setMealPlan(currentPlan); 
            updateDb({ mealPlan: currentPlan });
          };

          const swapDayRecipe = (index) => {
            if (recipes.length === 0) return;
            const currentPlan = [...mealPlan];
            const targetDay = { ...currentPlan[index] }; 
            const currentRecipeId = targetDay.recipe ? targetDay.recipe.id : null;
            const targetProtein = CATEGORY_CYCLE[targetDay.dayIndex % CATEGORY_CYCLE.length];
            
            let candidates = recipes.filter(r => r.protein === targetProtein && r.id !== currentRecipeId);
            if (candidates.length === 0) candidates = recipes.filter(r => r.id !== currentRecipeId);
            if (candidates.length === 0) candidates = recipes;

            const randomIdx = Math.floor(Math.random() * candidates.length);
            targetDay.recipe = candidates[randomIdx];
            currentPlan[index] = targetDay;
            setMealPlan(currentPlan); 
            updateDb({ mealPlan: currentPlan });
          };

          const deleteRecipe = (id) => {
            const newRecipes = recipes.filter(r => r.id !== id);
            setRecipes(newRecipes); 
            updateDb({ recipes: newRecipes }); 
            showToast("Receptet togs bort.");
          };

          const fetchWithBackoff = async (url, options, maxRetries = 3) => {
            const delays = [1000, 2000, 4000];
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    if (response.status === 400) throw new Error("Bad Request"); 
                    throw new Error(`HTTP error!`);
                }
                return await response.json();
              } catch (error) {
                if (error.message === "Bad Request" || i === maxRetries - 1) throw error;
                await new Promise(res => setTimeout(res, delays[i]));
              }
            }
          };

          const handlePdfUpload = async (event) => {
            const file = event.target.files?.[0];
            if (!file || (!file.type.includes('pdf') && !file.name.toLowerCase().endsWith('.pdf'))) {
              showToast("Endast PDF-filer stöds.");
              return;
            }
            
            setIsUploadingPdf(true); 
            showToast("Läser in PDF... (Stora filer tar upp till 1 min)");

            try {
              const reader = new FileReader();
              reader.onloadend = async () => {
                try {
                  const base64Data = reader.result.split(',')[1];
                  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                  
                  const payload = { 
                    contents: [{ role: "user", parts: [{ text: "Extrahera alla recept från denna PDF." }, { inlineData: { mimeType: "application/pdf", data: base64Data } }] }], 
                    generationConfig: { 
                      temperature: 0.1,
                      responseMimeType: "application/json",
                      responseSchema: {
                        type: "ARRAY",
                        items: {
                          type: "OBJECT",
                          properties: {
                            name: { type: "STRING" },
                            protein: { type: "STRING", description: "kött, fisk, veg eller kyckling" },
                            collection: { type: "STRING", description: "Spaghetti- & pastarätter, Potatisrätter, Risrätter, Soppor, Övriga vardagsrätter eller Helgmat" },
                            time: { type: "STRING", description: "Tid i minuter" },
                            ingredients: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, amount: { type: "NUMBER" }, unit: { type: "STRING" } } } },
                            instructions: { type: "STRING" },
                            imagePrompt: { type: "STRING" }
                          },
                          required: ["name", "protein", "collection", "time", "ingredients", "instructions"]
                        }
                      }
                    } 
                  };
                  
                  const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                  const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                  
                  if (!rawText) throw new Error("Inget svar");
                  const matchPattern = new RegExp('\\[[\\s\\S]*\\]');
                  const match = rawText.match(matchPattern);
                  if (!match) throw new Error("Format error");
                  
                  let parsedData = JSON.parse(match[0]);
                  const newRecs = (Array.isArray(parsedData) ? parsedData : [parsedData]).map(r => ({ 
                    ...r, 
                    id: 'pdf_' + Date.now() + Math.random(), 
                    ingredients: r.ingredients || [], 
                    instructions: r.instructions || '' 
                  }));
                  
                  const combined = [...recipes, ...newRecs];
                  setRecipes(combined); 
                  updateDb({ recipes: combined }); 
                  showToast(`${newRecs.length} recept importerades!`);
                } catch (err) { 
                  console.error(err);
                  showToast("Fel vid import. Dokumentet kan vara för stort."); 
                } 
                finally { 
                  setIsUploadingPdf(false); 
                  if (fileInputRef.current) fileInputRef.current.value = ''; 
                }
              };
              reader.readAsDataURL(file);
            } catch (err) { 
              showToast("Lokalt fel."); 
              setIsUploadingPdf(false); 
            }
          };

          const handleGenerateInspiration = async () => {
            if (!inspirationQuery.trim()) {
              showToast("Skriv in en råvara eller idé först!");
              return;
            }
            
            setIsGeneratingInspiration(true); 
            setInspiredRecipe(null); 
            showToast("Kocken skapar ett recept...");
            
            try {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
              const payload = { 
                contents: [{ role: "user", parts: [{ text: `Du är kock. Skapa recept på svenskt baserat på: "${inspirationQuery}".` }] }], 
                generationConfig: { 
                  temperature: 0.7,
                  responseMimeType: "application/json",
                  responseSchema: {
                    type: "OBJECT",
                    properties: {
                      name: { type: "STRING" },
                      protein: { type: "STRING", description: "kött, fisk, veg eller kyckling" },
                      collection: { type: "STRING", description: "Spaghetti- & pastarätter, Potatisrätter, Risrätter, Soppor, Övriga vardagsrätter eller Helgmat" },
                      time: { type: "STRING" },
                      ingredients: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, amount: { type: "NUMBER" }, unit: { type: "STRING" } } } },
                      instructions: { type: "STRING" },
                      imagePrompt: { type: "STRING" }
                    },
                    required: ["name", "protein", "collection", "time", "ingredients", "instructions"]
                  }
                } 
              };
              
              const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
              const parsed = JSON.parse(rawText);
              setInspiredRecipe({ 
                ...parsed, 
                id: 'insp_' + Date.now(), 
                ingredients: parsed.ingredients || [], 
                instructions: parsed.instructions || '' 
              });
              showToast("Receptet är klart!");
            } catch (err) { 
              showToast("Fel. Kocken behöver vila."); 
            } finally { 
              setIsGeneratingInspiration(false); 
            }
          };

          const saveInspiredRecipe = () => {
            if (!inspiredRecipe) return;
            const newRecipes = [inspiredRecipe, ...recipes];
            setRecipes(newRecipes); 
            updateDb({ recipes: newRecipes });
            setInspiredRecipe(null); 
            setInspirationQuery(''); 
            setActiveTab('recipes'); 
            showToast("Sparades i boken!");
          };

          const shoppingList = useMemo(() => {
            if (mealPlan.length === 0) return [];
            const listMap = {};
            mealPlan.forEach(day => {
              if(!day?.recipe?.ingredients) return; 
              day.recipe.ingredients.forEach(ing => {
                if (!ing?.name) return;
                const normName = normalizeName(ing.name); 

                // Filtrera bort vatten
                if (normName.toLowerCase() === 'vatten') return;

                const normUnit = normalizeUnit(ing.unit);
                const amt = parseFloat(ing.amount) || 0; 
                if (!listMap[normName]) listMap[normName] = { name: normName, amounts: {} };
                listMap[normName].amounts[normUnit] = (listMap[normName].amounts[normUnit] || 0) + amt;
              });
            });
            return Object.values(listMap).sort((a, b) => a.name.localeCompare(b.name));
          }, [mealPlan]);

          const filteredRecipes = useMemo(() => {
            return selectedCollection === 'Alla' ? recipes : recipes.filter(r => r.collection === selectedCollection);
          }, [recipes, selectedCollection]);

          const handleCopyList = () => {
            if (shoppingList.length === 0) {
              showToast("Listan är tom.");
              return;
            }
            const text = shoppingList.map(item => `${formatAmounts(item.amounts)} ${item.name}`).join('\n');
            const ta = document.createElement("textarea"); 
            ta.value = text; 
            document.body.appendChild(ta);

            try { 
              document.execCommand('copy'); 
              showToast("Kopierades till urklipp!"); 
            } catch (err) { 
              showToast("Ett fel uppstod."); 
            }
            document.body.removeChild(ta);
          };

          const ShareModal = () => {
            const [joinCode, setJoinCode] = useState('');
            if (!showShareModal) return null;

            const handleCopyCode = () => {
              const ta = document.createElement("textarea"); 
              ta.value = householdId; 
              document.body.appendChild(ta); 
              ta.select(); 
              try { 
                document.execCommand('copy'); 
                showToast("Kopierades!");

              document.body.removeChild(ta);
            };

            const handleJoin = () => {

                const code = joinCode.trim().toUpperCase(); 
                setHouseholdId(code);

                setShowShareModal(false);

                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in-95 duration-200 border border-slate-100 dark:border-slate-700" onClick={e => e.stopPropagation()}>
                  <div className="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-white dark:bg-slate-800">
                    <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                      <Users className="text-[#526e35] dark:text-[#82a061]" /> Familjedelning
                    </h2>
                    <button onClick={() => setShowShareModal(false)} className="text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 p-2 rounded-full active:scale-95">
                      <X size={20} />

                  </div>
                  <div className="p-6 space-y-6">

                      <div className="flex gap-2">
                        <input type="text" value={joinCode} onChange={(e) => setJoinCode(e.target.value)} placeholder="T.ex. ABC123" className="flex-1 px-4 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-xl outline-none uppercase font-bold tracking-widest shadow-sm" maxLength={6} />
                        <button onClick={handleJoin} disabled={!joinCode.trim()} className="px-6 py-3 bg-slate-900 dark:bg-slate-700 text-white rounded-xl font-bold disabled:opacity-50 shadow-md active:scale-95">Anslut</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const AddRecipeModal = () => {
            const [formData, setFormData] = useState({ 
              name: '', 
              protein: 'kött', 
              collection: 'Spaghetti- & pastarätter', 
              time: '30 min', 
              ingredients: [{ name: '', amount: 1, unit: 'st' }], 
              instructions: '' 
            });
            const [isScanning, setIsScanning] = useState(false);
            const cameraInputRef = useRef(null);

            if (!showAddModal) return null;

            const handleSave = () => { 
              if (!formData.name) return showToast("Receptet måste ha ett namn."); 
              const newRecipes = [...recipes, { ...formData, id: 'man_' + Date.now() }]; 
              setRecipes(newRecipes); 
              updateDb({ recipes: newRecipes }); 
              setShowAddModal(false); 
              showToast("Sparades!"); 
            };

            const updateIngredient = (index, field, value) => { 
              const newIngs = [...formData.ingredients]; 
              newIngs[index][field] = field === 'amount' ? Number(value) : value; 
              setFormData({ ...formData, ingredients: newIngs }); 
            };
            
            const handleScanRecipe = async (event) => {
              const file = event.target.files?.[0]; 
              if (!file) return;

              setIsScanning(true); 
              showToast("Tittar på bilden...");

              try {
                const reader = new FileReader();
                reader.onloadend = async () => {
                  try {
                    const base64Data = reader.result.split(',')[1];
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const payload = { 
                      contents: [{ role: "user", parts: [{ text: "Extrahera receptet från denna bild." }, { inlineData: { mimeType: file.type, data: base64Data } }] }], 
                      generationConfig: { 
                        temperature: 0.1,
                        responseMimeType: "application/json",
                        responseSchema: {
                          type: "OBJECT",
                          properties: {
                            name: { type: "STRING" },
                            protein: { type: "STRING", description: "kött, fisk, veg eller kyckling" },
                            collection: { type: "STRING", description: "Spaghetti- & pastarätter, Potatisrätter, Risrätter, Soppor, Övriga vardagsrätter eller Helgmat" },
                            time: { type: "STRING" },
                            ingredients: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, amount: { type: "NUMBER" }, unit: { type: "STRING" } } } },
                            instructions: { type: "STRING" }
                          },
                          required: ["name", "protein", "collection", "time", "ingredients", "instructions"]
                        }
                      } 
                    };
                    const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("Inget svar");
                    const parsed = JSON.parse(rawText);
                    setFormData(prev => ({ 
                      ...prev, 
                      name: parsed.name || prev.name, 
                      protein: parsed.protein || prev.protein, 
                      collection: parsed.collection || prev.collection, 
                      time: parsed.time || prev.time, 
                      ingredients: parsed.ingredients?.length ? parsed.ingredients : prev.ingredients, 
                      instructions: parsed.instructions || prev.instructions 
                    }));
                    showToast("Ifyllt från bilden!");

                    console.error(err);
                    showToast("Kunde inte tolka bilden."); 
                  } finally { 
                    setIsScanning(false); 
                    if (cameraInputRef.current) cameraInputRef.current.value = ''; 
                  }

                reader.readAsDataURL(file);
              } catch (err) { 
                showToast("Fel uppstod."); 
                setIsScanning(false); 
              }
            };

            return (
              <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50 overflow-y-auto" onClick={() => setShowAddModal(false)}>
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-2xl my-8 flex flex-col border border-slate-200/60 dark:border-slate-700" style={{ maxHeight: 'calc(100vh - 4rem)' }} onClick={e => e.stopPropagation()}>
                  <div className="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-white dark:bg-slate-800 rounded-t-3xl">
                    <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100">Skapa recept</h2>
                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 p-2 rounded-full">
                      <X size={20} />
                    </button>

                  <div className="p-6 space-y-6 overflow-y-auto flex-1 bg-slate-50/50 dark:bg-slate-900/50">
                    <div className="bg-[#f5f8f2] dark:bg-[#171f0d]/30 border border-[#e4ede0] dark:border-[#293819] rounded-2xl p-4 flex flex-col sm:flex-row gap-4 items-center justify-between shadow-sm">
                      <div>

                      <div className="relative w-full sm:w-auto">
                        <input type="file" accept="image/*" capture="environment" ref={cameraInputRef} onChange={handleScanRecipe} className="hidden" id="camera-upload" />
                        <label htmlFor="camera-upload" className={`flex items-center justify-center gap-2 px-5 py-2.5 ${isScanning ? 'bg-[#bacca0] text-[#526e35]' : 'bg-[#526e35] hover:bg-[#3d5226] dark:bg-[#6a8a47] dark:hover:bg-[#526e35] text-white cursor-pointer'} rounded-xl font-semibold text-sm shadow-md active:scale-95 w-full`}>
                          {isScanning ? <Loader2 size={16} className="animate-spin" /> : <Camera size={16} />}

                        </label>
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Receptnamn</label>
                      <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-xl outline-none shadow-sm focus:ring-2 focus:ring-[#6a8a47]" placeholder="T.ex. Krämig Pasta" />

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

                          <option value="kött">Kött</option>

                          <option value="veg">Vegetariskt</option>
                          <option value="kyckling">Kyckling</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Bokkapitel</label>
                        <select value={formData.collection} onChange={e => setFormData({...formData, collection: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-xl outline-none shadow-sm focus:ring-2 focus:ring-[#6a8a47]">

                          <Plus size={16} /> Lägg till
                        </button>
                      </div>
                      <div className="space-y-3">
                        {formData.ingredients.map((ing, idx) => (
                          <div key={idx} className="flex gap-2 items-center">
                            <input type="text" value={ing.name} onChange={e => updateIngredient(idx, 'name', e.target.value)} placeholder="Morot" className="flex-1 px-3 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-lg text-sm shadow-sm" />
                            <input type="number" value={ing.amount} onChange={e => updateIngredient(idx, 'amount', e.target.value)} className="w-20 px-3 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-lg text-sm shadow-sm" min="0" step="0.5"/>

                            <button onClick={() => setFormData({ ...formData, ingredients: formData.ingredients.filter((_, i) => i !== idx) })} className="p-2 text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg active:scale-95">
                              <Trash2 size={18} />
                            </button>
                          </div>
