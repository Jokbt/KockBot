<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KockBot</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#bacca0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KockBot">
    <link rel="apple-touch-icon" href="./logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
      }
    }
    </script>

    <!-- PDF.js för lokal PDF-textextraktion i webbläsaren -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      if (window['pdfjsLib']) {
        window['pdfjsLib'].GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    </script>

    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Calendar, ShoppingCart, BookOpen, RefreshCw, Info, 
          X, CalendarDays, Plus, Upload, Trash2, Save, Users,
          Loader2, Copy, Check, Utensils, ExternalLink, Filter, Camera, Sparkles, Download, Lock, Unlock, ChevronDown, ImagePlus, Sun, Moon, Key
        } from 'lucide-react';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // =========================================================================
        // API OCH FIREBASE CONFIG
        // =========================================================================
        const apiKey = "AIzaSyAnFKZemnkW5OJ8DzbSCvFQEfSIWw8XD8Q"; 

        const myFirebaseConfig = {
          apiKey: "AIzaSyANEkApp6RLf2dXSiIu_cE5wyDp1dSZuRk",
          authDomain: "kockbot-f0e5f.firebaseapp.com",
          projectId: "kockbot-f0e5f",
          storageBucket: "kockbot-f0e5f.firebasestorage.app",
          messagingSenderId: "132836094378",
          appId: "1:132836094378:web:98106b8982f6c47f61bbd3",
          measurementId: "G-DDW0GD700Z"
        }; 

        let auth = null;
        let db = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kockbot-live';

        try {
          const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
          const finalConfig = (myFirebaseConfig && myFirebaseConfig.apiKey) ? myFirebaseConfig : (configStr ? JSON.parse(configStr) : null);
          if (finalConfig && Object.keys(finalConfig).length > 0) {
            const app = initializeApp(finalConfig);
            auth = getAuth(app);
            db = getFirestore(app);
          }
        } catch (err) {
          console.error("Kunde inte initiera databasen:", err);
        }

        // =========================================================================
        // KONSTANTER & HJÄLPFUNKTIONER
        // =========================================================================
        const CATEGORY_CYCLE = ['kött', 'veg', 'fisk', 'kyckling', 'veg', 'kött', 'fisk'];
        const DAYS = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'];
        const BOOK_COLLECTIONS = ['Alla', 'Spaghetti- & pastarätter', 'Potatisrätter', 'Risrätter', 'Soppor', 'Övriga vardagsrätter', 'Helgmat'];

        const getISOWeekNumber = (date) => {
          const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
          const dayNum = d.getUTCDay() || 7;
          d.setUTCDate(d.getUTCDate() + 4 - dayNum);
          const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
          return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        };

        const FALLBACK_IMAGES = [
          "https://images.unsplash.com/photo-1495114752715-2c392c6c78a0?q=80&w=800&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?q=80&w=800&auto=format&fit=crop"
        ];

        const getFallbackImage = (id) => {
           if (!id) return FALLBACK_IMAGES[0];
           let hash = 0;
           for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
           return FALLBACK_IMAGES[Math.abs(hash) % FALLBACK_IMAGES.length];
        };

        const getRecipeImage = (recipe) => {
          if (recipe.customImage) return recipe.customImage;
          let seed = Math.abs([...(recipe.name || '')].reduce((s, c) => Math.imul(31, s) + c.charCodeAt(0) | 0, 0));
          let translated = (recipe.name || '').toLowerCase();
          const dict = { 'köttfärssås': 'bolognese sauce', 'köttbullar': 'meatballs', 'torsk': 'cod fish', 'lax': 'salmon' };
          Object.keys(dict).forEach(k => translated = translated.replace(new RegExp(k, 'gi'), dict[k]));
          let context = recipe.collection === "Soppor" ? "creamy soup in a bowl" : "delicious food plate";
          const finalPrompt = `Professional food photography of ${translated}, ${context}, appetizing, restaurant plating, absolutely no text`;
          return `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=800&height=600&nologo=true&seed=${seed}`;
        };

        const getCategory = (name) => {
          const n = name.toLowerCase();
          if (/(lök|tomat|morot|potatis|spenat|persilja|basilika|svamp|champinjon|paprika|chili|citron|lime|broccoli|äpple|banan|sallad|gurka|purjolök|timjan|oregano|rosmarin|dill|koriander|avokado|zucchini|aubergine|kål|palsternacka|rotfrukt|ingefära|frukt|bär)/.test(n)) return 'Frukt & Grönt';
          if (/(mjölk|grädde|smör|ost|parmesan|pecorino|mozzarella|halloumi|creme fraiche|crème|ägg|feta|färskost|mascarpone|burrata|yoghurt|kvarg|margarin|fil)/.test(n)) return 'Mejeri & Ägg';
          if (/(färs|kyckling|kött|korv|pancetta|salami|lax|torsk|räkor|fläsk|biff|skinka|chorizo|kalkon|bacon|prosciutto|skaldjur)/.test(n)) return 'Kött, Fågel & Fisk';
          if (/(pasta|spaghetti|makaroner|nudlar|ris|buljong|fond|soja|olja|salt|peppar|socker|mjöl|ströbröd|panko|puré|krossade|passerade|sambal|senap|honung|vinäger|nötter|frön|krydda|kanel|kardemumma|spiskummin|kakao|vanilj|sirap|balsamico|maizena|stärkelse|ketchup|chilisås|linser|bönor)/.test(n)) return 'Skafferi';
          if (/(bröd|tortilla|pita|baguette|franska|korvbröd|hamburgerbröd|knäckebröd)/.test(n)) return 'Bröd & Bageri';
          return 'Övrigt';
        };

        const normalizeName = (name) => {
          let n = name.toLowerCase().trim();
          const exactSynonyms = {
            'creme fraiche': 'crème fraiche', 'crème fraîche': 'crème fraiche', 'krossade tomater': 'krossad tomat',
            'gullök': 'gul lök', 'gula lökar': 'gul lök', 'rödlök': 'röd lök', 'röda lökar': 'röd lök',
            'köttfärs': 'nötfärs/blandfärs', 'nötfärs': 'nötfärs/blandfärs', 'blandfärs': 'nötfärs/blandfärs'
          };
          if (exactSynonyms[n]) return exactSynonyms[n];
          n = n.replace(/vitlöks\s*klyft(a|or)/g, 'vitlöksklyfta').replace(/kyckling(bröst)?\s*filé(er)?/g, 'kycklingfilé');
          const reps = { 'klyftor$':'klyfta', 'lökar$':'lök', 'tomater$':'tomat', 'morötter$':'morot', 'potatisar$':'potatis', 'filéer$':'filé', 'förpackningar$':'förp', 'burkar$':'burk', 'skivor$':'skiva', 'bitar$':'bit', 'påsar$':'påse', 'krukor$':'kruka', 'halvor$':'halva', '^gula ':'gul ', '^röda ':'röd ', '^gröna ':'grön ', '^färska ':'färsk ' };
          for(let [k,v] of Object.entries(reps)) n = n.replace(new RegExp(k, 'i'), v);
          return n.charAt(0).toUpperCase() + n.slice(1);
        };

        const normalizeUnit = (unit) => {
          let u = unit.toLowerCase().trim();
          const matchers = {
            'st': /^(klyftor|klyfta|stycken|styck)$/, 'förp': /^(förpackning|paket|pkt|förpackningar)$/,
            'kruka': /^(krukor)$/, 'skiva': /^(skivor)$/, 'burk': /^(burkar|burk)$/, 'port': /^(portioner|portion)$/,
            'g': /^(gram)$/, 'kg': /^(kilo)$/, 'msk': /^(matskedar|matsked)$/, 'tsk': /^(teskedar|tesked)$/,
            'krm': /^(kryddmått)$/, 'l': /^(liter)$/, 'dl': /^(deciliter)$/, 'ml': /^(milliliter)$/
          };
          for (let [k, v] of Object.entries(matchers)) if (v.test(u)) return k;
          return u;
        };

        const formatAmounts = (amountsObj) => {
          const parts = [];
          for (const [unit, amount] of Object.entries(amountsObj)) {
            if (amount === 0) { if (unit) parts.push(unit); continue; }
            let displayAmount = amount, displayUnit = unit;
            if (unit === 'g' && amount >= 1000 && amount % 100 === 0) { displayAmount = amount / 1000; displayUnit = 'kg'; }
            parts.push(`${Math.round(displayAmount * 10) / 10} ${displayUnit}`.trim());
          }
          return parts.join(' + ') || 'Efter smak';
        };

        const parseInstructionsText = (text) => {
          if (!text) return [];
          return text
            .replace(/(\d+\.\s)/g, '\n$1')
            .split('\n')
            .map(step => step.replace(/^\s*\d+\.\s*/, '').trim())
            .filter(step => step.length > 0);
        };

        const RobotLogo = () => <img src="./logo.png" alt="KockBot Logo" className="w-full h-full object-cover rounded-lg shadow-sm" />;

        const CatBadge = ({ protein }) => {
          const colors = { 
            'kött': 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400 border-red-200 dark:border-red-800', 
            'fisk': 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400 border-blue-200 dark:border-blue-800', 
            'veg': 'bg-[#bacca0] dark:bg-[#171f0d]/40 text-[#293819] dark:text-[#82a061] border-[#bacca0] dark:border-[#293819]', 
            'kyckling': 'bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 border-amber-200 dark:border-amber-800' 
          };
          const pStr = protein ? protein.toLowerCase() : 'veg';
          return <span className={`px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wider shadow-sm border ${colors[pStr] || colors['veg']}`}>{protein || 'VEG'}</span>;
        };

        const DEFAULT_RECIPES = [];

        // =========================================================================
        // HUVUDKOMPONENT
        // =========================================================================
        const App = () => {
          const [activeTab, setActiveTab] = useState('plan'); 
          const [planType, setPlanType] = useState('week'); 
          const [toastMessage, setToastMessage] = useState(null);
          const [user, setUser] = useState(null);
          const [isDbLoaded, setIsDbLoaded] = useState(false);

          const [isDarkMode, setIsDarkMode] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_theme');
            return saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          });

          const [householdId, setHouseholdId] = useState(() => localStorage.getItem('smartMatsedel_householdId') || Math.random().toString(36).substring(2, 8).toUpperCase());
          const [showShareModal, setShowShareModal] = useState(false);
          const [showApiModal, setShowApiModal] = useState(false); // NY: Visar API-nyckel rutan
          const [isPlanLocked, setIsPlanLocked] = useState(() => localStorage.getItem('smartMatsedel_planLocked') === 'true');
          const [planStartOffset, setPlanStartOffset] = useState(() => Number(localStorage.getItem('smartMatsedel_planStartOffset')) || 0);

          const [inspirationQuery, setInspirationQuery] = useState('');
          const [isGeneratingInspiration, setIsGeneratingInspiration] = useState(false);
          const [inspiredRecipe, setInspiredRecipe] = useState(null);

          const [recipes, setRecipes] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_recipes');
            return saved ? JSON.parse(saved) : [];
          });
          const [mealPlan, setMealPlan] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_mealPlan');
            return saved ? JSON.parse(saved) : [];
          });
          const [checkedListItems, setCheckedListItems] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_checkedListItems');
            return saved ? JSON.parse(saved) : {};
          });

          const [selectedCollection, setSelectedCollection] = useState('Alla');
          const [selectedRecipeId, setSelectedRecipeId] = useState(null);
          const [showAddModal, setShowAddModal] = useState(false);
          const [isUploadingPdf, setIsUploadingPdf] = useState(false);
          
          const fileInputRef = useRef(null);
          const imageUploadRef = useRef(null);
          const [uploadingForRecipeId, setUploadingForRecipeId] = useState(null);
          const [deferredPrompt, setDeferredPrompt] = useState(null);
          const [isIOS, setIsIOS] = useState(false);
          const [isStandalone, setIsStandalone] = useState(false);

          // PWA Manifest och Dark Mode hantering
          useEffect(() => {
            let manifest = document.querySelector('link[rel="manifest"]');
            if (!manifest) {
              manifest = document.createElement('link');
              manifest.rel = 'manifest';
              document.head.appendChild(manifest);
            }
            const manifestData = {
              name: "KockBot", short_name: "KockBot", start_url: ".", display: "standalone",
              background_color: isDarkMode ? "#0f172a" : "#f8fafc", theme_color: isDarkMode ? "#171f0d" : "#bacca0",
              icons: [ { src: "./logo.png", sizes: "192x192", type: "image/png" }, { src: "./logo.png", sizes: "512x512", type: "image/png" } ]
            };
            manifest.href = `data:application/manifest+json;charset=utf-8,${encodeURIComponent(JSON.stringify(manifestData))}`;
            
            localStorage.setItem('smartMatsedel_theme', isDarkMode ? 'dark' : 'light');
            isDarkMode ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          // Auth och DB Sync
          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  try { await signInWithCustomToken(auth, __initial_auth_token); } catch (e) { await signInAnonymously(auth); }
                } else { await signInAnonymously(auth); }
              } catch(e) {}
            };
            initAuth();
            return onAuthStateChanged(auth, setUser);
          }, []);

          useEffect(() => {
            if (!user || !db || !householdId) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'households', householdId);
            const unsubscribe = onSnapshot(docRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.recipes) setRecipes(data.recipes);
                if (data.mealPlan) setMealPlan(data.mealPlan);
                if (data.planType) setPlanType(data.planType);
                if (data.checkedListItems) setCheckedListItems(data.checkedListItems);
                if (data.isPlanLocked !== undefined) setIsPlanLocked(data.isPlanLocked);
                if (data.planStartOffset !== undefined) setPlanStartOffset(data.planStartOffset);
              }
              setIsDbLoaded(true);
            }, () => setIsDbLoaded(true));
            return () => unsubscribe();
          }, [user, householdId]);

          const updateDb = async (updates) => {
            if (!user || !db || !householdId) return;
            try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', householdId), updates, { merge: true }); } catch (err) {}
          };

          // Spara lokalt
          useEffect(() => { localStorage.setItem('smartMatsedel_householdId', householdId); }, [householdId]);
          useEffect(() => { localStorage.setItem('smartMatsedel_recipes', JSON.stringify(recipes)); }, [recipes]);
          useEffect(() => { localStorage.setItem('smartMatsedel_mealPlan', JSON.stringify(mealPlan)); }, [mealPlan]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planType', planType); }, [planType]);
          useEffect(() => { localStorage.setItem('smartMatsedel_checkedListItems', JSON.stringify(checkedListItems)); }, [checkedListItems]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planLocked', isPlanLocked); }, [isPlanLocked]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planStartOffset', planStartOffset); }, [planStartOffset]);

          // PWA Install Prompt
          useEffect(() => {
            setIsIOS(new RegExp('iPad|iPhone|iPod').test(navigator.userAgent) && !window.MSStream);
            setIsStandalone(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
            const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setDeferredPrompt(e); };
            window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
          }, []);

          const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 4000); };

          const installApp = async () => {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              if (outcome === 'accepted') setDeferredPrompt(null);
            } else {
              showToast(isIOS ? "På iPhone: Tryck på 'Dela'-ikonen i botten och välj 'Lägg till på hemskärmen'." : "På Android: Tryck på webbläsarens meny och välj 'Lägg till på startskärmen'.");
            }
          };

          const handleImageFileChange = (e) => {
            const file = e.target.files?.[0];
            if (!file || !uploadingForRecipeId) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                const MAX_DIM = 500; // Komprimering för att få plats i databas
                if (width > height) { if (width > MAX_DIM) { height = Math.round(height * (MAX_DIM / width)); width = MAX_DIM; } } 
                else { if (height > MAX_DIM) { width = Math.round(width * (MAX_DIM / height)); height = MAX_DIM; } }
                
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                
                const newRecipes = recipes.map(r => r.id === uploadingForRecipeId ? { ...r, customImage: dataUrl } : r);
                setRecipes(newRecipes); updateDb({ recipes: newRecipes });
                showToast("Bilden har sparats permanent!");
                setUploadingForRecipeId(null);
                if (imageUploadRef.current) imageUploadRef.current.value = '';
              };
              img.src = event.target.result;
            };
            reader.readAsDataURL(file);
          };

          const generatePlan = (type) => {
            if (recipes.length === 0) { showToast("Lägg till minst ett recept först."); setActiveTab('recipes'); return; }
            const numDays = type === 'week' ? 7 : type === '2weeks' ? 14 : type === '3weeks' ? 21 : 28;
            const newPlan = [];
            for (let i = 0; i < numDays; i++) {
              const targetProtein = CATEGORY_CYCLE[i % CATEGORY_CYCLE.length]; 
              let candidates = recipes.filter(r => r.protein === targetProtein);
              if (candidates.length === 0) candidates = recipes;
              newPlan.push({ dayIndex: i, dayName: DAYS[i % 7], weekNumber: Math.floor(i / 7) + 1, recipe: candidates[Math.floor(Math.random() * candidates.length)] });
            }
            setMealPlan(newPlan); setPlanType(type); setCheckedListItems({}); setIsPlanLocked(false);
            updateDb({ mealPlan: newPlan, planType: type, checkedListItems: {}, isPlanLocked: false });
          };

          const toggleLock = () => {
            setIsPlanLocked(!isPlanLocked); updateDb({ isPlanLocked: !isPlanLocked });
            showToast(!isPlanLocked ? "Matsedeln är nu låst för hela hushållet! 🔒" : "Matsedeln är nu upplåst! 🔓");
          };

          const swapDayRecipe = (index) => {
            if (recipes.length === 0) return;
            const currentPlan = [...mealPlan];
            const targetProtein = CATEGORY_CYCLE[currentPlan[index].dayIndex % CATEGORY_CYCLE.length];
            let candidates = recipes.filter(r => r.protein === targetProtein && r.id !== currentPlan[index].recipe?.id);
            if (candidates.length === 0) candidates = recipes.filter(r => r.id !== currentPlan[index].recipe?.id);
            if (candidates.length === 0) candidates = recipes;
            currentPlan[index].recipe = candidates[Math.floor(Math.random() * candidates.length)];
            setMealPlan(currentPlan); updateDb({ mealPlan: currentPlan });
          };

          const deleteRecipe = (id) => {
            const newRecipes = recipes.filter(r => r.id !== id);
            setRecipes(newRecipes); updateDb({ recipes: newRecipes }); showToast("Receptet togs bort.");
          };

          const clearDayRecipe = (index) => {
            const currentPlan = [...mealPlan];
            currentPlan[index].recipe = null;
            setMealPlan(currentPlan); updateDb({ mealPlan: currentPlan });
          };

          const fetchWithBackoff = async (url, options, maxRetries = 3) => {
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(url, options);
                if (!response.ok) { 
                    const errorData = await response.json().catch(() => null);
                    const errorMessage = errorData?.error?.message || `HTTP error ${response.status}`;
                    throw new Error(errorMessage); 
                }
                return await response.json();
              } catch (error) {
                if (i === maxRetries - 1 || error.message.includes("API key")) throw error;
                await new Promise(res => setTimeout(res, [1000, 2000, 4000][i]));
              }
            }
          };

          const callGemini = async (promptText, base64Data, mimeType, responseSchema) => {
            const customKey = localStorage.getItem('smartMatsedel_apiKey');
            const activeKey = customKey || apiKey;
            
            // Privata API-nycklar har inte tillgång till Googles interna preview-modell,
            // så vi byter automatiskt till standard 'gemini-2.5-flash' när din egen nyckel används (t.ex. på Github).
            const modelName = customKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
            
            const parts = [{ text: promptText }];
            if (base64Data) parts.push({ inlineData: { mimeType, data: base64Data } });
            
            const payload = { contents: [{ role: "user", parts }], generationConfig: { temperature: 0.1, responseMimeType: "application/json", responseSchema } };
            const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            return JSON.parse(result.candidates[0].content.parts[0].text);
          };

          const recipeSchema = {
            type: "OBJECT",
            properties: {
              name: { type: "STRING" }, protein: { type: "STRING", description: "kött, fisk, veg eller kyckling" },
              collection: { type: "STRING", description: "Spaghetti- & pastarätter, Potatisrätter, Risrätter, Soppor, Övriga vardagsrätter eller Helgmat" },
              time: { type: "STRING" }, instructions: { type: "STRING" },
              ingredients: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, amount: { type: "NUMBER" }, unit: { type: "STRING" } } } }
            }, required: ["name", "protein", "collection", "time", "ingredients", "instructions"]
          };

          const handlePdfUpload = async (event) => {
            const file = event.target.files?.[0];
            if (!file) return;

            // Kontrollera att API-nyckel finns innan vi börjar
            const customKey = localStorage.getItem('smartMatsedel_apiKey');
            if (!customKey && !apiKey) {
              setShowApiModal(true);
              showToast("Lägg till din Gemini API-nyckel för att importera PDF.");
              if (fileInputRef.current) fileInputRef.current.value = '';
              return;
            }

            // Kontrollera att pdf.js är laddad
            if (!window.pdfjsLib) {
              showToast("PDF-biblioteket laddas fortfarande, försök igen om en stund.");
              if (fileInputRef.current) fileInputRef.current.value = '';
              return;
            }

            setIsUploadingPdf(true);
            showToast("Läser in PDF i webbläsaren...");
            try {
              // 1. Läs PDF-fil som ArrayBuffer
              const arrayBuffer = await file.arrayBuffer();

              // 2. Extrahera text lokalt med pdf.js (alla sidor)
              const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              let fullText = '';
              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const pageText = content.items.map(it => it.str).join(' ');
                fullText += `\n\n--- Sida ${i} ---\n${pageText}`;
              }

              if (!fullText.trim()) {
                throw new Error("Kunde inte läsa text från PDF:en (kanske en skannad bild?).");
              }

              // Begränsa textstorlek för att hålla API-anropet smidigt
              const MAX_CHARS = 60000;
              const textForAi = fullText.length > MAX_CHARS
                ? fullText.slice(0, MAX_CHARS) + "\n\n[Texten avkortades]"
                : fullText;

              showToast("Tolkar recept med AI...");

              // 3. Skicka extraherad text till Gemini istället för hela PDF:en
              const prompt = `Extrahera ALLA recept ur följande text från en kokbok/PDF. ` +
                `Returnera en lista med strukturerade recept enligt schemat. ` +
                `Översätt mängder och enheter till svenska om det behövs. ` +
                `Texten:\n\n${textForAi}`;
              const data = await callGemini(prompt, null, null, { type: "ARRAY", items: recipeSchema });

              const list = Array.isArray(data) ? data : [data];
              const newRecs = list
                .filter(r => r && r.name)
                .map(r => ({ ...r, id: 'pdf_' + Date.now() + Math.random(), ingredients: r.ingredients || [], instructions: r.instructions || '' }));

              if (!newRecs.length) throw new Error("Inga recept hittades i PDF:en.");

              const merged = [...recipes, ...newRecs];
              setRecipes(merged); updateDb({ recipes: merged });
              showToast(`${newRecs.length} recept importerades!`);
            } catch (err) {
              console.error("PDF Upload Error:", err);
              if (err.message && (err.message.includes("API key not valid") || err.message.includes("API_KEY_INVALID"))) {
                setShowApiModal(true);
                showToast("API-nyckeln är ogiltig! Kontrollera den.");
              } else {
                showToast("Fel: " + (err.message || 'okänt fel').substring(0, 60));
              }
            } finally {
              setIsUploadingPdf(false);
              if (fileInputRef.current) fileInputRef.current.value = '';
            }
          };

          const handleGenerateInspiration = async () => {
            if (!inspirationQuery.trim()) return showToast("Skriv in en råvara eller idé först!");
            setIsGeneratingInspiration(true); setInspiredRecipe(null); showToast("Kocken skapar ett recept...");
            try {
              const data = await callGemini(`Du är kock. Skapa recept på svenskt baserat på: "${inspirationQuery}".`, null, null, recipeSchema);
              setInspiredRecipe({ ...data, id: 'insp_' + Date.now(), ingredients: data.ingredients || [], instructions: data.instructions || '' });
              showToast("Receptet är klart!");
            } catch (err) { 
              console.error("Inspiration Error:", err);
              if (err.message.includes("API key not valid") || err.message.includes("API_KEY_INVALID")) {
                  setShowApiModal(true);
                  showToast("API-nyckeln är ogiltig! Klicka på 🔑");
              } else {
                  showToast("Fel: " + err.message.substring(0, 40) + "..."); 
              }
            }
            finally { setIsGeneratingInspiration(false); }
          };

          // INKÖPSLISTA LOGIK
          const shoppingList = useMemo(() => {
            if (mealPlan.length === 0) return [];
            const listMap = {};
            mealPlan.forEach(day => {
              if(!day?.recipe?.ingredients) return; 
              day.recipe.ingredients.forEach(ing => {
                if (!ing?.name) return;
                const normName = normalizeName(ing.name); 
                if (normName.toLowerCase() === 'vatten') return; // TA BORT VATTEN
                const normUnit = normalizeUnit(ing.unit);
                const amt = parseFloat(ing.amount) || 0; 
                if (!listMap[normName]) listMap[normName] = { name: normName, amounts: {}, category: getCategory(normName) };
                listMap[normName].amounts[normUnit] = (listMap[normName].amounts[normUnit] || 0) + amt;
              });
            });
            const grouped = { 'Frukt & Grönt': [], 'Kött, Fågel & Fisk': [], 'Mejeri & Ägg': [], 'Skafferi': [], 'Bröd & Bageri': [], 'Övrigt': [] };
            Object.values(listMap).sort((a, b) => a.name.localeCompare(b.name)).forEach(item => grouped[item.category] ? grouped[item.category].push(item) : grouped['Övrigt'].push(item));
            return Object.entries(grouped).filter(([_, items]) => items.length > 0);
          }, [mealPlan]);

          const filteredRecipes = useMemo(() => {
            return selectedCollection === 'Alla' ? recipes : recipes.filter(r => r.collection === selectedCollection);
          }, [recipes, selectedCollection]);

          const handleCopyList = () => {
            if (shoppingList.length === 0) {
              showToast("Listan är tom.");
              return;
            }
            let text = "Inköpslista:\n\n";
            shoppingList.forEach(([category, items]) => {
              text += `--- ${category} ---\n`;
              items.forEach(item => {
                  text += `${formatAmounts(item.amounts)} ${item.name}\n`;
              });
              text += '\n';
            });
            const ta = document.createElement("textarea"); 
            ta.value = text; 
            document.body.appendChild(ta);
            ta.select(); 
            try { 
              document.execCommand('copy'); 
              showToast("Kopierades till urklipp!"); 
            } catch (err) { 
              showToast("Ett fel uppstod."); 
            }
            document.body.removeChild(ta);
          };

          // ================= SUBKOMPONENTER =================
          
          const ShareModal = () => {
            const [joinCode, setJoinCode] = useState('');
            if (!showShareModal) return null;
            return (
              <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50" onClick={() => setShowShareModal(false)}>
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in-95 duration-200 border border-slate-100 dark:border-slate-700" onClick={e => e.stopPropagation()}>
                  <div className="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center"><h2 className="text-xl font-bold dark:text-slate-100 flex items-center gap-2"><Users className="text-[#526e35] dark:text-[#82a061]" /> Familjedelning</h2><button onClick={() => setShowShareModal(false)} className="text-slate-400 p-2"><X size={20} /></button></div>
                  <div className="p-6 space-y-6">
                    <div className="bg-[#f5f8f2] dark:bg-[#171f0d]/30 rounded-2xl p-5 text-center border border-[#e4ede0] dark:border-[#293819]">
                      <p className="text-sm font-semibold text-[#293819] dark:text-[#9eb582] mb-2">Din hushållskod</p>
                      <div className="text-3xl font-black text-[#526e35] dark:text-[#82a061] tracking-widest mb-3">{householdId}</div>
                      <button onClick={() => { const ta = document.createElement("textarea"); ta.value = householdId; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); showToast("Kopierades!"); } catch (e){} document.body.removeChild(ta); }} className="px-4 py-2 bg-white dark:bg-slate-800 text-[#3d5226] dark:text-[#9eb582] rounded-lg text-sm font-bold shadow-sm border border-[#bacca0] dark:border-[#3d5226] flex items-center justify-center gap-2 mx-auto active:scale-95"><Copy size={16} /> Kopiera kod</button>
                    </div>
                    <div className="border-t border-slate-100 dark:border-slate-700 pt-6">
                      <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Har du fått en kod?</label>
                      <div className="flex gap-2">
                        <input type="text" value={joinCode} onChange={(e) => setJoinCode(e.target.value)} placeholder="T.ex. ABC123" className="flex-1 px-4 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-xl outline-none uppercase font-bold tracking-widest" maxLength={6} />
                        <button onClick={() => { if(joinCode.trim()){ setHouseholdId(joinCode.trim().toUpperCase()); setShowShareModal(false); showToast("Ansluten!"); } }} disabled={!joinCode.trim()} className="px-6 py-3 bg-slate-900 dark:bg-slate-700 text-white rounded-xl font-bold disabled:opacity-50">Anslut</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const ApiModal = () => {
            const [keyInput, setKeyInput] = useState(localStorage.getItem('smartMatsedel_apiKey') || '');
            if (!showApiModal) return null;
            return (
              <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50" onClick={() => setShowApiModal(false)}>
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-sm p-6 relative animate-in fade-in zoom-in-95 duration-200 border border-slate-100 dark:border-slate-700" onClick={e => e.stopPropagation()}>
                  <button onClick={() => setShowApiModal(false)} className="absolute top-4 right-4 text-slate-400 p-2 active:scale-95"><X size={20} /></button>
                  <h2 className="text-xl font-bold dark:text-slate-100 mb-2 flex items-center gap-2"><Key className="text-[#526e35] dark:text-[#82a061]" size={20}/> API-Nyckel</h2>
                  <p className="text-sm text-slate-500 dark:text-slate-400 mb-4 leading-relaxed">
                    För att AI-funktionerna (PDF-import m.m.) ska fungera på din egen hemsida krävs en egen, gratis <b>Google Gemini API-nyckel</b>.
                  </p>
                  <input type="text" value={keyInput} onChange={e => setKeyInput(e.target.value)} placeholder="AIzaSy..." className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none dark:text-slate-100 mb-4 text-sm font-mono shadow-inner" />
                  <button onClick={() => { localStorage.setItem('smartMatsedel_apiKey', keyInput.trim()); setShowApiModal(false); showToast("Nyckel sparad i webbläsaren!"); }} className="w-full px-4 py-3 bg-[#526e35] dark:bg-[#6a8a47] hover:bg-[#3d5226] text-white rounded-xl font-bold active:scale-95 shadow-md">Spara Nyckel</button>
                </div>
              </div>
            );
          };

          const AddRecipeModal = () => {
            const [formData, setFormData] = useState({ name: '', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '30 min', ingredients: [{ name: '', amount: 1, unit: 'st' }], instructions: '' });
            const [isScanning, setIsScanning] = useState(false);
            const cameraInputRef = useRef(null);

            if (!showAddModal) return null;

            const handleSave = () => {
              if (!formData.name) return showToast("Receptet måste ha ett namn.");
              const newRecipes = [...recipes, { ...formData, id: 'man_' + Date.now() }];
              setRecipes(newRecipes); updateDb({ recipes: newRecipes }); setShowAddModal(false); showToast("Sparades!");
            };

            const handleScanRecipe = async (event) => {
              const file = event.target.files?.[0]; if (!file) return;
              setIsScanning(true); showToast("Tittar på bilden...");
              try {
                const reader = new FileReader();
                reader.onloadend = async () => {
                  try {
                    const data = await callGemini("Extrahera receptet från denna bild.", reader.result.split(',')[1], file.type, recipeSchema);
                    setFormData(prev => ({ ...prev, name: data.name || prev.name, protein: data.protein || prev.protein, collection: data.collection || prev.collection, time: data.time || prev.time, ingredients: data.ingredients?.length ? data.ingredients : prev.ingredients, instructions: data.instructions || prev.instructions }));
                    showToast("Ifyllt från bilden!");
                  } catch (err) { 
                    console.error("Camera Scan Error:", err);
                    if (err.message.includes("API key not valid") || err.message.includes("API_KEY_INVALID")) {
                        setShowApiModal(true);
                        showToast("API-nyckeln är ogiltig!");
                    } else {
                        showToast("Kunde inte tolka bilden: " + err.message.substring(0, 30)); 
                    }
                  } finally { setIsScanning(false); if (cameraInputRef.current) cameraInputRef.current.value = ''; }
                };
                reader.readAsDataURL(file);
              } catch (err) { setIsScanning(false); }
            };

            return (
              <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50 overflow-y-auto" onClick={() => setShowAddModal(false)}>
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-2xl my-8 flex flex-col border border-slate-200/60 dark:border-slate-700" style={{ maxHeight: 'calc(100vh - 4rem)' }} onClick={e => e.stopPropagation()}>
                  <div className="p-6 border-b flex justify-between items-center rounded-t-3xl"><h2 className="text-xl font-bold dark:text-slate-100">Skapa recept</h2><button onClick={() => setShowAddModal(false)} className="text-slate-400"><X size={20} /></button></div>
                  <div className="p-6 space-y-6 overflow-y-auto flex-1 bg-slate-50/50 dark:bg-slate-900/50">
                    <div className="bg-[#f5f8f2] dark:bg-[#171f0d]/30 border border-[#e4ede0] dark:border-[#293819] rounded-2xl p-4 flex flex-col sm:flex-row gap-4 items-center justify-between shadow-sm">
                      <div><h3 className="font-bold text-[#293819] dark:text-[#9eb582]">Recept framför dig?</h3><p className="text-[#526e35] dark:text-[#82a061] text-sm">Fota av så fyller vi i automatiskt!</p></div>
                      <div className="relative w-full sm:w-auto">
                        <input type="file" accept="image/*" capture="environment" ref={cameraInputRef} onChange={handleScanRecipe} className="hidden" id="camera-upload" />
                        <label htmlFor="camera-upload" className={`flex items-center justify-center gap-2 px-5 py-2.5 ${isScanning ? 'bg-[#bacca0] text-[#526e35]' : 'bg-[#526e35] text-white cursor-pointer'} rounded-xl font-semibold text-sm w-full`}>{isScanning ? <Loader2 size={16} className="animate-spin" /> : <Camera size={16} />} {isScanning ? 'Läser bild...' : 'Scanna med kameran'}</label>
                      </div>
                    </div>
                    <div><label className="block text-sm font-semibold dark:text-slate-300 mb-1.5">Receptnamn</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border rounded-xl outline-none shadow-sm dark:text-slate-100" /></div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div><label className="block text-sm font-semibold dark:text-slate-300 mb-1.5">Protein</label><select value={formData.protein} onChange={e => setFormData({...formData, protein: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border rounded-xl outline-none dark:text-slate-100"><option value="kött">Kött</option><option value="fisk">Fisk</option><option value="veg">Vegetariskt</option><option value="kyckling">Kyckling</option></select></div>
                      <div><label className="block text-sm font-semibold dark:text-slate-300 mb-1.5">Kategori</label><select value={formData.collection} onChange={e => setFormData({...formData, collection: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border rounded-xl outline-none dark:text-slate-100">{BOOK_COLLECTIONS.filter(c => c !== 'Alla').map(c => <option key={c}>{c}</option>)}</select></div>
                      <div><label className="block text-sm font-semibold dark:text-slate-300 mb-1.5">Tid</label><input type="text" value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border rounded-xl outline-none dark:text-slate-100" /></div>
                    </div>
                    <div className="bg-white dark:bg-slate-800 p-5 rounded-2xl border shadow-sm">
                      <div className="flex justify-between items-center mb-4"><label className="text-sm font-semibold dark:text-slate-300">Ingredienser</label><button onClick={() => setFormData({ ...formData, ingredients: [...formData.ingredients, { name: '', amount: 1, unit: 'st' }] })} className="text-sm font-semibold text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2] dark:bg-[#171f0d]/30 px-3 py-1.5 rounded-lg flex items-center gap-1.5"><Plus size={16} /> Lägg till</button></div>
                      <div className="space-y-3">{formData.ingredients.map((ing, idx) => (
                          <div key={idx} className="flex gap-2 items-center">
                            <input type="text" value={ing.name} onChange={e => { const newIngs = [...formData.ingredients]; newIngs[idx].name = e.target.value; setFormData({ ...formData, ingredients: newIngs }); }} placeholder="Morot" className="flex-1 px-3 py-2 bg-slate-50 dark:bg-slate-900 border rounded-lg text-sm dark:text-slate-100" />
                            <input type="number" value={ing.amount} onChange={e => { const newIngs = [...formData.ingredients]; newIngs[idx].amount = Number(e.target.value); setFormData({ ...formData, ingredients: newIngs }); }} className="w-20 px-3 py-2 bg-slate-50 dark:bg-slate-900 border rounded-lg text-sm dark:text-slate-100" step="0.5"/>
                            <input type="text" value={ing.unit} onChange={e => { const newIngs = [...formData.ingredients]; newIngs[idx].unit = e.target.value; setFormData({ ...formData, ingredients: newIngs }); }} placeholder="st" className="w-16 px-3 py-2 bg-slate-50 dark:bg-slate-900 border rounded-lg text-sm dark:text-slate-100" />
                            <button onClick={() => setFormData({ ...formData, ingredients: formData.ingredients.filter((_, i) => i !== idx) })} className="p-2 text-red-400"><Trash2 size={18} /></button>
                          </div>
                      ))}</div>
                    </div>
                    <div><label className="block text-sm font-semibold dark:text-slate-300 mb-1.5">Gör så här</label><textarea value={formData.instructions} onChange={e => setFormData({...formData, instructions: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border rounded-xl outline-none min-h-[120px] dark:text-slate-100" /></div>
                  </div>
                  <div className="p-6 border-t flex justify-end gap-3 rounded-b-3xl">
                    <button onClick={() => setShowAddModal(false)} className="px-6 py-2.5 text-slate-600 dark:text-slate-300 font-semibold">Avbryt</button>
                    <button onClick={handleSave} disabled={!formData.name} className="px-6 py-2.5 bg-[#526e35] text-white rounded-xl font-semibold flex items-center gap-2"><Save size={18} /> Spara</button>
                  </div>
                </div>
              </div>
            );
          };

          const RecipeModal = ({ recipe, onClose }) => {
            const [imgLoading, setImgLoading] = useState(true);
            if (!recipe) return null;
            return (
              <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50 overflow-y-auto" onClick={onClose}>
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-lg my-8 flex flex-col border border-slate-200/60 dark:border-slate-700" style={{ maxHeight: 'calc(100vh - 4rem)' }} onClick={e => e.stopPropagation()}>
                  <div className="p-4 border-b flex justify-end items-center bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-t-3xl absolute top-0 w-full z-20">
                    <div className="flex gap-2">
                      <button onClick={() => { deleteRecipe(recipe.id); onClose(); }} className="text-red-400 bg-white dark:bg-slate-700 rounded-full p-2 shadow-sm border"><Trash2 size={20} /></button>
                      <button onClick={() => { onClose(); setImgLoading(true); }} className="text-slate-400 bg-white dark:bg-slate-700 rounded-full p-2 shadow-sm border"><X size={20} /></button>
                    </div>
                  </div>
                  <div className="p-6 pt-20 overflow-y-auto flex-1">
                    <div className="mb-6 relative">
                      <button onClick={e => triggerImageUpload(e, recipe.id)} className="absolute top-0 right-0 p-2.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm text-slate-500 rounded-full shadow-sm border z-30" title="Lägg till egen bild"><ImagePlus size={20} /></button>
                      <span className="text-xs font-bold text-[#526e35] dark:text-[#82a061] uppercase tracking-widest mb-2 block">{recipe.collection}</span>
                      <h2 className="text-3xl font-extrabold dark:text-slate-100 leading-tight mb-4 pr-12">{recipe.name}</h2>
                      <div className="w-full h-48 sm:h-64 bg-slate-100 dark:bg-slate-700 rounded-2xl mb-5 overflow-hidden shadow-inner border relative">
                        {imgLoading && <div className="absolute inset-0 flex items-center justify-center z-10"><Loader2 size={24} className="text-slate-400 animate-spin" /></div>}
                        <img src={getRecipeImage(recipe)} alt={recipe.name} className={`w-full h-full object-cover transition-opacity duration-700 ${imgLoading ? 'opacity-0' : 'opacity-100'}`} onLoad={() => setImgLoading(false)} onError={(e) => { e.target.onerror = null; e.target.src = getFallbackImage(recipe.id); setImgLoading(false); }} />
                      </div>
                      <div className="flex items-center gap-3 text-sm font-medium text-slate-500 dark:text-slate-400"><CatBadge protein={recipe.protein} /><span className="flex items-center gap-1.5 bg-white dark:bg-slate-700 shadow-sm border px-3 py-1 rounded-full"><CalendarDays size={16}/> {recipe.time}</span></div>
                    </div>
                    <div className="space-y-6 pb-6">
                      <div className="bg-[#f5f8f2] dark:bg-[#171f0d]/20 p-5 rounded-2xl border border-[#e4ede0] dark:border-[#293819] shadow-sm">
                        <h3 className="font-bold dark:text-slate-100 mb-3 flex items-center gap-2"><ShoppingCart size={18} className="text-[#526e35] dark:text-[#82a061]"/> Ingredienser</h3>
                        <ul className="space-y-2.5">{recipe.ingredients.map((ing, i) => (
                            <li key={i} className="flex justify-between items-center text-sm"><span className="font-medium dark:text-slate-300">{ing.name}</span><span className="text-[#3d5226] dark:text-[#9eb582] font-bold bg-white dark:bg-slate-800 px-2 py-1 rounded-md shadow-sm border">{ing.amount} {ing.unit}</span></li>
                        ))}</ul>
                      </div>
                      <div>
                        <h3 className="font-bold dark:text-slate-100 mb-3 flex items-center gap-2"><Utensils size={18} className="text-[#526e35] dark:text-[#82a061]"/> Tillagning</h3>
                        <div className="space-y-3">
                          {parseInstructionsText(recipe.instructions).map((cleanStep, idx) => (
                              <div key={idx} className="flex gap-4 p-4 bg-white dark:bg-slate-700 rounded-2xl border shadow-sm">
                                <span className="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-[#f5f8f2] dark:bg-[#171f0d]/50 rounded-full text-[#526e35] dark:text-[#82a061] font-bold border border-[#e4ede0] dark:border-[#293819]">{idx+1}</span>
                                <p className="text-slate-700 dark:text-slate-200 pt-1 leading-relaxed">{cleanStep}</p>
                              </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className={isDarkMode ? 'dark' : ''}>
              <div className="min-h-screen font-sans text-slate-900 dark:text-slate-100 pb-24 md:pb-10 relative selection:bg-[#bacca0] dark:selection:bg-[#171f0d] transition-colors duration-300">
                <div className="fixed inset-0 -z-10 bg-slate-50 dark:bg-slate-900 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-[#e4ede0]/40 dark:from-[#171f0d]/20 via-slate-50 dark:via-slate-900 to-slate-100/60 dark:to-slate-950 transition-colors duration-300"></div>
                <input type="file" accept="image/*" ref={imageUploadRef} onChange={handleImageFileChange} className="hidden" />
                
                {toastMessage && (
                  <div className="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-slate-800 text-white px-6 py-3.5 rounded-full shadow-2xl flex items-center gap-3 z-[60] animate-in fade-in slide-in-from-bottom-6 w-[90%] md:w-auto max-w-md border border-slate-700"><Info size={20} className="text-[#bacca0] flex-shrink-0" /><span className="font-medium text-sm">{toastMessage}</span></div>
                )}

                <header className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b sticky top-0 z-30 shadow-sm transition-colors duration-300">
                  <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
                    <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-xl shadow-md overflow-hidden bg-white dark:bg-slate-800 border flex-shrink-0 p-0.5"><RobotLogo /></div><h1 className="text-2xl font-extrabold dark:text-white tracking-tight hidden sm:block drop-shadow-sm">KockBot</h1></div>
                    <div className="hidden md:flex bg-slate-100/80 dark:bg-slate-800/80 p-1.5 rounded-full border shadow-inner">
                      <button onClick={() => setActiveTab('plan')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'plan' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400'}`}><Calendar size={18} /> Matsedel</button>
                      <button onClick={() => setActiveTab('list')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'list' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400'}`}><ShoppingCart size={18} /> Inköpslista</button>
                      <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'recipes' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400'}`}><BookOpen size={18} /> Recept</button>
                      <button onClick={() => setActiveTab('inspiration')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'inspiration' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400'}`}><Sparkles size={18} /> Inspiration</button>
                    </div>
                    <div className="flex items-center gap-2 ml-auto sm:ml-4">
                        <button onClick={() => setShowApiModal(true)} className="flex items-center justify-center p-2.5 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl border shadow-sm active:scale-95" title="API Nyckel">
                          <Key size={18} />
                        </button>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="flex items-center justify-center p-2.5 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl border shadow-sm active:scale-95">{isDarkMode ? <Sun size={18} /> : <Moon size={18} />}</button>
                        <button onClick={() => setShowShareModal(true)} className="flex items-center justify-center gap-1.5 px-3 py-2 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl text-xs font-bold border shadow-sm active:scale-95"><Users size={16} className="text-[#526e35] dark:text-[#6a8a47]" /> <span className="hidden sm:inline">Dela</span></button>
                        {!isStandalone && <button onClick={installApp} className="flex items-center gap-1.5 px-3 py-2 bg-[#526e35] dark:bg-[#6a8a47] text-white rounded-xl text-xs font-bold shadow-md active:scale-95"><Download size={14} /> <span className="hidden sm:inline">Installera</span></button>}
                    </div>
                  </div>
                </header>

                <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t px-2 py-2 pb-safe z-40 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                   <button onClick={() => setActiveTab('plan')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl ${activeTab === 'plan' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400'} `}><Calendar size={22} className={activeTab === 'plan' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} /><span className="text-[10px] font-bold">Matsedel</span></button>
                   <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl ${activeTab === 'list' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400'} `}><ShoppingCart size={22} className={activeTab === 'list' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} /><span className="text-[10px] font-bold">Handla</span></button>
                   <button onClick={() => setActiveTab('recipes')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl ${activeTab === 'recipes' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400'} `}><BookOpen size={22} className={activeTab === 'recipes' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} /><span className="text-[10px] font-bold">Recept</span></button>
                   <button onClick={() => setActiveTab('inspiration')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl ${activeTab === 'inspiration' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400'} `}><Sparkles size={22} className={activeTab === 'inspiration' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} /><span className="text-[10px] font-bold">Inspo</span></button>
                </div>

                <main className="max-w-4xl mx-auto px-4 py-8 md:py-12">
                  
                  {activeTab === 'plan' && (
                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                      {recipes.length === 0 ? (
                          <div className="text-center py-24 px-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-3xl border shadow-xl"><div className="bg-[#f5f8f2] dark:bg-[#171f0d]/30 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><BookOpen size={40} className="text-[#6a8a47]" /></div><h2 className="text-2xl font-extrabold mb-3">Din receptbok är tom</h2><p className="text-slate-500 mb-8 max-w-md mx-auto">Du måste lägga till recept innan vi kan hjälpa dig att bygga en matsedel.</p><button onClick={() => setActiveTab('recipes')} className="px-8 py-3.5 bg-[#526e35] text-white rounded-2xl font-bold shadow-lg">Gå till Receptboken</button></div>
                      ) : mealPlan.length === 0 ? (
                          <div className="text-center py-24 px-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-3xl border shadow-xl"><div className="bg-[#f5f8f2] dark:bg-[#171f0d]/30 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Calendar size={40} className="text-[#6a8a47]" /></div><h2 className="text-2xl font-extrabold mb-3">Ingen meny skapad ännu</h2><p className="text-slate-500 mb-8 max-w-md mx-auto">Välj hur många veckor du vill planera!</p>
                              <div className="flex flex-wrap justify-center gap-3"><button onClick={() => generatePlan('week')} className="px-6 py-3 bg-[#526e35] text-white rounded-2xl font-bold">1 Vecka</button><button onClick={() => generatePlan('2weeks')} className="px-6 py-3 bg-[#526e35] text-white rounded-2xl font-bold">2 Veckor</button><button onClick={() => generatePlan('3weeks')} className="px-6 py-3 bg-[#526e35] text-white rounded-2xl font-bold">3 Veckor</button><button onClick={() => generatePlan('month')} className="px-6 py-3 bg-slate-900 dark:bg-slate-700 text-white rounded-2xl font-bold">4 Veckor</button></div>
                          </div>
                      ) : (
                          <>
                              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-10 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-6 sm:p-8 rounded-[2rem] border shadow-xl">
                                <div className="flex items-center gap-4"><div className="bg-[#e4ede0] dark:bg-[#171f0d]/40 p-3.5 rounded-2xl shadow-inner border border-[#f5f8f2] hidden sm:block"><Calendar size={28} className="text-[#526e35]" /></div><div><h2 className="text-2xl sm:text-3xl font-black drop-shadow-sm leading-tight">Din Matsedel</h2><p className="text-slate-500 mt-1">Planera smart och spara tid.</p></div></div>
                                {!isPlanLocked ? (
                                  <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                                      <div className="relative flex-1 sm:flex-none"><select value={planStartOffset} onChange={e => { const val = Number(e.target.value); setPlanStartOffset(val); updateDb({ planStartOffset: val }); }} className="w-full appearance-none bg-white dark:bg-slate-900 pl-4 pr-10 py-3.5 rounded-2xl border shadow-sm text-sm font-bold outline-none focus:ring-2 focus:ring-[#6a8a47] cursor-pointer"><option value={0}>Denna vecka</option><option value={1}>Nästa vecka</option><option value={2}>Om 2 veckor</option></select><div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><ChevronDown size={16} strokeWidth={3} /></div></div>
                                      <div className="relative flex-1 sm:flex-none"><select value={planType} onChange={e => setPlanType(e.target.value)} className="w-full appearance-none bg-white dark:bg-slate-900 pl-4 pr-10 py-3.5 rounded-2xl border shadow-sm text-sm font-bold outline-none focus:ring-2 focus:ring-[#6a8a47] cursor-pointer"><option value="week">1 vecka</option><option value="2weeks">2 veckor</option><option value="3weeks">3 veckor</option><option value="month">4 veckor</option></select><div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><ChevronDown size={16} strokeWidth={3} /></div></div>
                                      <button onClick={() => generatePlan(planType)} className="flex-1 sm:flex-none px-6 py-3.5 bg-[#526e35] text-white rounded-2xl font-black text-sm active:scale-95 shadow-lg flex items-center justify-center gap-2"><RefreshCw size={16} strokeWidth={3} /> Slumpa</button>
                                  </div>
                                ) : ( <div className="mt-4 md:mt-0"><button onClick={toggleLock} className="flex items-center gap-2 px-6 py-3.5 rounded-2xl text-sm font-black shadow-md border bg-amber-50 text-amber-700 w-full justify-center"><Lock size={16} strokeWidth={3} /> Matsedeln är låst</button></div> )}
                              </div>
                              {!isPlanLocked && mealPlan.length > 0 && <div className="flex justify-end mb-6"><button onClick={toggleLock} className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm border bg-white dark:bg-slate-800"><Unlock size={16} /> Lås matsedeln</button></div>}
                              {mealPlan.length > 0 && (
                                  <div className="space-y-12">
                                  {Array.from({ length: planType === 'week' ? 1 : planType === '2weeks' ? 2 : planType === '3weeks' ? 3 : 4 }).map((_, weekIndex) => {
                                      const targetDate = new Date(); targetDate.setDate(targetDate.getDate() + ((weekIndex + planStartOffset) * 7));
                                      const actualWeekNum = getISOWeekNumber(targetDate);
                                      return (
                                          <div key={weekIndex} className="animate-in fade-in slide-in-from-bottom-4 duration-700" style={{animationDelay: `${weekIndex * 100}ms`}}>
                                            <h3 className="text-xl font-extrabold mb-5 flex items-center gap-3"><span className="bg-slate-800 dark:bg-slate-700 text-white w-10 h-10 rounded-xl flex items-center justify-center text-sm shadow-md">V{actualWeekNum}</span> Vecka {actualWeekNum}</h3>
                                            <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-[2rem] shadow-xl border overflow-hidden">
                                                <div className="divide-y divide-slate-100/80 dark:divide-slate-700/50">
                                                {mealPlan.slice(weekIndex * 7, (weekIndex + 1) * 7).map((day, idx) => {
                                                  const actualIndex = (weekIndex * 7) + idx; const hasRecipe = !!day.recipe;
                                                  return (
                                                      <div key={actualIndex} className={`p-4 sm:p-6 flex items-center justify-between transition-all duration-300 ${hasRecipe ? 'hover:bg-slate-50/50 dark:hover:bg-slate-700/30' : 'bg-slate-50/30 dark:bg-slate-900/30'}`}>
                                                        {hasRecipe ? (
                                                          <div className="flex items-center gap-4 sm:gap-6 flex-1 min-w-0 group cursor-pointer" onClick={() => setSelectedRecipeId(day.recipe.id)}>
                                                              <p className="font-black w-16 sm:w-24 text-sm sm:text-base">{day.dayName}</p>
                                                              <div className="flex-1 text-left font-bold text-base sm:text-lg group-hover:text-[#526e35] truncate flex items-center gap-2"><span className="truncate">{day.recipe.name}</span><ExternalLink size={16} className="opacity-0 group-hover:opacity-100 hidden sm:block" /></div>
                                                          </div>
                                                        ) : (
                                                          <div className="flex items-center gap-4 sm:gap-6 flex-1 min-w-0 opacity-60"><p className="font-extrabold w-16 sm:w-24 text-sm sm:text-base">{day.dayName}</p><p className="flex-1 text-left font-medium text-base sm:text-lg italic">Inget planerat</p></div>
                                                        )}
                                                        <div className="flex items-center gap-3 sm:gap-5 flex-shrink-0 ml-4">
                                                            {hasRecipe && <div className="hidden sm:block"><CatBadge protein={day.recipe.protein} /></div>}
                                                            {!isPlanLocked && (
                                                              <div className="flex items-center gap-1.5 sm:gap-2 bg-slate-100/80 dark:bg-slate-900/50 p-1.5 rounded-2xl border shadow-sm">
                                                                {hasRecipe ? (
                                                                  <><button onClick={() => swapDayRecipe(actualIndex)} className="p-2 sm:p-2.5 bg-white dark:bg-slate-800 rounded-xl active:scale-95 shadow-sm border"><RefreshCw size={16} strokeWidth={2.5} /></button><button onClick={() => clearDayRecipe(actualIndex)} className="p-2 sm:p-2.5 bg-white dark:bg-slate-800 text-red-400 rounded-xl active:scale-95 shadow-sm border"><X size={16} strokeWidth={2.5} /></button></>
                                                                ) : (
                                                                  <button onClick={() => swapDayRecipe(actualIndex)} className="px-4 py-2.5 bg-white dark:bg-slate-800 text-[#526e35] rounded-xl active:scale-95 shadow-sm border flex items-center gap-1.5"><Plus size={16} strokeWidth={3} /> <span className="text-xs font-extrabold hidden sm:inline">Lägg till</span></button>
                                                                )}
                                                              </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                              })}
                                            </div>
                                        </div>
                                      </div>
                                    );
                                })}
                                </div>
                            )}
                        </>
                    )}
                  </div>
                )}

                {activeTab === 'list' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-3xl mx-auto">
                    {mealPlan.length === 0 ? (
                         <div className="text-center py-24 px-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-3xl border shadow-xl"><div className="bg-slate-100 dark:bg-slate-900 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><ShoppingCart size={40} className="text-slate-400" /></div><h2 className="text-2xl font-extrabold mb-2">Inköpslistan är tom</h2></div>
                    ) : (
                        <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-[2rem] shadow-xl border p-6 sm:p-8 mb-6">
                          <div className="flex flex-col sm:flex-row justify-between sm:items-end gap-6 mb-8 border-b pb-6"><div><h2 className="text-3xl font-black mb-2 drop-shadow-sm">Inköpslista</h2></div><button onClick={handleCopyList} className="flex items-center justify-center gap-2 px-6 py-3 bg-[#526e35] text-white font-bold rounded-2xl text-sm shadow-lg active:scale-95"><Copy size={18} /> Kopiera text</button></div>
                          <div className="space-y-8">
                              {shoppingList.map(([category, items], catIdx) => (
                                  <div key={catIdx} className="space-y-3">
                                      <h3 className="text-lg font-bold text-[#526e35] border-b pb-2 pl-1 uppercase tracking-widest text-xs">{category}</h3>
                                      {items.map((item, idx) => {
                                      const isChecked = checkedListItems && checkedListItems[item.name];
                                      return (
                                          <div key={idx} className={`flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl border duration-300 gap-4 sm:gap-2 ${isChecked ? 'bg-slate-50/50 dark:bg-slate-900/30 border-transparent opacity-60 scale-[0.98]' : 'bg-white dark:bg-slate-800 shadow-sm hover:shadow-md'}`}>
                                            <div className="flex items-center gap-4 flex-1 cursor-pointer" onClick={() => { setCheckedListItems({...checkedListItems, [item.name]: !isChecked}) }}>
                                                <div className={`flex-shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center ${isChecked ? 'bg-[#6a8a47] border-[#6a8a47]' : 'border-slate-300 bg-slate-50 dark:bg-slate-900'}`}>{isChecked && <Check size={16} className="text-white" strokeWidth={3} />}</div>
                                                <span className={`font-semibold text-lg sm:text-base ${isChecked ? 'line-through text-slate-400' : ''}`}>{item.name}</span>
                                            </div>
                                            <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto pl-11 sm:pl-0"><span className="font-bold bg-slate-100/80 dark:bg-slate-900/50 px-4 py-2 rounded-xl text-sm whitespace-nowrap shadow-sm border">{formatAmounts(item.amounts)}</span><a href={`https://handlaprivatkund.ica.se/stores/1004243/search?q=${encodeURIComponent(item.name)}`} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1.5 px-4 py-2 text-xs font-extrabold text-red-600 bg-red-50 rounded-xl border active:scale-scale shadow-sm" onClick={(e) => e.stopPropagation()}><ExternalLink size={14} /> ICA</a></div>
                                          </div>
                                      );
                                      })}
                                  </div>
                              ))}
                          </div>
                        </div>
                    )}
                  </div>
                )}

                {activeTab === 'recipes' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-8 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-6 sm:p-8 rounded-[2rem] border shadow-xl">
                      <div><h2 className="text-3xl font-black drop-shadow-sm">Receptbok</h2><p className="text-slate-500 font-medium mt-1">{recipes.length} fantastiska favoriter samlade.</p></div>
                      <div className="flex flex-wrap gap-3 w-full md:w-auto">
                        <button onClick={() => setShowAddModal(true)} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3.5 bg-[#526e35] text-white rounded-2xl font-bold text-sm shadow-lg active:scale-95"><Plus size={18} strokeWidth={3} /> Nytt Recept</button>
                        <div className="relative flex-1 md:flex-none">
                          <input type="file" accept="application/pdf" ref={fileInputRef} onChange={handlePdfUpload} className="hidden" id="pdf-upload" />
                          <label htmlFor="pdf-upload" className={`flex items-center justify-center gap-2 px-6 py-3.5 ${isUploadingPdf ? 'bg-slate-100 dark:bg-slate-700 text-slate-400' : 'bg-white dark:bg-slate-800 border-2 border-slate-200 cursor-pointer shadow-sm active:scale-95'} rounded-2xl font-bold text-sm w-full`}>{isUploadingPdf ? <Loader2 size={18} className="animate-spin" /> : <Upload size={18} />} {isUploadingPdf ? 'Läser in...' : 'Importera PDF'}</label>
                        </div>
                      </div>
                    </div>
                    {recipes.length > 0 && (
                        <div className="flex overflow-x-auto hide-scrollbar gap-3 mb-8 pb-2 -mx-4 px-4 sm:mx-0 sm:px-0">
                            {BOOK_COLLECTIONS.map(cat => ( <button key={cat} onClick={() => setSelectedCollection(cat)} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-extrabold whitespace-nowrap border shadow-sm active:scale-95 ${selectedCollection === cat ? 'bg-slate-800 dark:bg-[#526e35] text-white' : 'bg-white/80 dark:bg-slate-800/80 text-slate-600 dark:text-slate-300'}`}>{cat === 'Alla' && <Filter size={16} />} {cat}</button> ))}
                        </div>
                    )}
                    {filteredRecipes.length === 0 ? (
                         <div className="text-center py-20 px-4 bg-white/50 dark:bg-slate-800/50 border-2 border-dashed rounded-3xl backdrop-blur-sm"><p className="text-slate-500 font-medium text-lg">Inga recept i denna kategori.</p></div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredRecipes.map((recipe, index) => (
                            <div key={recipe.id} className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-[2rem] shadow-lg border flex flex-col hover:shadow-2xl hover:-translate-y-1.5 duration-300 group cursor-pointer relative overflow-hidden animate-in fade-in" style={{animationDelay: `${(index % 10) * 50}ms`}} onClick={() => setSelectedRecipeId(recipe.id)}>
                              <div className="h-40 w-full bg-slate-100 dark:bg-slate-700 relative overflow-hidden flex-shrink-0">
                                  <button onClick={(e) => { e.stopPropagation(); deleteRecipe(recipe.id); }} className="absolute top-4 right-4 p-2.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md text-red-400 rounded-full opacity-0 group-hover:opacity-100 shadow-sm active:scale-95 z-10"><Trash2 size={18} /></button>
                                  <button onClick={(e) => triggerImageUpload(e, recipe.id)} className="absolute top-4 left-4 p-2.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md text-slate-400 rounded-full opacity-0 group-hover:opacity-100 shadow-sm active:scale-95 z-10"><ImagePlus size={18} /></button>
                                  <img src={getRecipeImage(recipe)} alt={recipe.name} className="w-full h-full object-cover group-hover:scale-105 duration-700" onError={(e) => { e.target.onerror=null; e.target.src=getFallbackImage(recipe.id); }} />
                                  <div className="absolute bottom-0 left-0 right-0 h-10 bg-gradient-to-t from-white/90 dark:from-slate-800/90 to-transparent"></div>
                              </div>
                              <div className="p-6 flex flex-col flex-1">
