<body class="bg-slate-50">

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as Lucide from 'lucide-react';
        
        const { 
          Calendar, ShoppingCart, BookOpen, RefreshCw, ChefHat, Info, 
          X, CalendarDays, Plus, Upload, Trash2, Save, 
          Loader2, CheckCircle2, Copy, Check, Utensils, ExternalLink, Filter, Camera, Sparkles, Download
        } = Lucide;

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const apiKey = "";
        let auth = null;
        let db = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        try {
          const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
          if (configStr) {
            const config = JSON.parse(configStr);
            if (Object.keys(config).length > 0) {
              const app = initializeApp(config);
              auth = getAuth(app);
              db = getFirestore(app);
            }
          }
        } catch (err) {
          console.error("Kunde inte initiera databasen:", err);
        }

        const CATEGORY_CYCLE = ['kött', 'veg', 'fisk', 'kyckling', 'veg', 'kött', 'fisk'];
        const DAYS = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'];

        const BOOK_COLLECTIONS = [
          'Alla',
          'Spaghetti- & pastarätter',
          'Potatisrätter',
          'Risrätter',
          'Soppor',
          'Övriga vardagsrätter',
          'Helgmat'
        ];

        const getISOWeekNumber = (date) => {
          const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
          const dayNum = d.getUTCDay() || 7;
          d.setUTCDate(d.getUTCDate() + 4 - dayNum);
          const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
          return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        };

        const FALLBACK_IMAGES = [
          "https://images.unsplash.com/photo-1495114752715-2c392c6c78a0?q=80&w=800&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?q=80&w=800&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=800&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?q=80&w=800&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=800&auto=format&fit=crop"
        ];

        const getFallbackImage = (id) => {
           if (!id) return FALLBACK_IMAGES[0];
           let hash = 0;
           for (let i = 0; i < id.length; i++) {
             hash = id.charCodeAt(i) + ((hash << 5) - hash);
           }
           return FALLBACK_IMAGES[Math.abs(hash) % FALLBACK_IMAGES.length];
        };

        const getRecipeImage = (name, collection) => {
          let translated = name.toLowerCase();
          
          // Utökad och förbättrad ordlista
          const dict = {
            'rosépeppargryta': 'creamy pink peppercorn stew',
            'rosépeppar': 'pink peppercorn',
            'fläskytterfilé': 'pork loin',
            'fläskfilé': 'pork tenderloin',
            'hasselbackspotatis': 'hasselback potatoes',
            'kycklingfärsbiffar': 'chicken patties',
            'kycklingbiffar': 'chicken patties',
            'kycklingfärs': 'ground chicken',
            'kycklinglårfilé': 'chicken thighs',
            'kyckling': 'chicken',
            'köttfärssås': 'bolognese sauce',
            'köttfärsbiffar': 'beef patties',
            'köttfärs': 'ground beef',
            'nötfärs': 'ground beef',
            'blandfärs': 'ground meat',
            'köttbullar': 'meatballs',
            'korvstroganoff': 'sausage stroganoff',
            'falukorv': 'swedish falukorv sausage',
            'salsicciapasta': 'salsiccia pasta',
            'salsiccia': 'salsiccia sausage',
            'korv': 'sausage',
            'klyftpotatis': 'potato wedges',
            'potatis': 'potatoes',
            'potatismos': 'mashed potatoes',
            'mos': 'mashed potatoes',
            'pommes frites': 'french fries',
            'pommes': 'french fries',
            'ris': 'rice',
            'soppa': 'soup',
            'gryta': 'stew',
            'torskrygg': 'cod loin',
            'torsk': 'cod fish',
            'lax': 'salmon',
            'fisk': 'fish',
            'räkor': 'shrimp',
            'gräddsås': 'cream sauce',
            'sås': 'sauce',
            'ost': 'cheese',
            'vitlök': 'garlic',
            'rödlök': 'red onion',
            'lök': 'onion',
            'tomater': 'tomatoes',
            'tomat': 'tomato',
            'grädde': 'cream',
            'smörgåstårta': 'swedish sandwich cake',
            'äggakaka': 'thick pancake',
            'ugnspannkaka': 'oven baked pancake',
            'pannkaka': 'pancakes',
            'plättar': 'small pancakes',
            'pirog': 'pastry',
            'timjan': 'thyme',
            'persilja': 'parsley',
            'basilika': 'basil',
            'champinjon': 'button mushrooms',
            'svamp': 'mushrooms',
            'spenat': 'spinach',
            'gratäng': 'gratin',
            'tacopaj': 'taco pie',
            'paj': 'pie',
            'tacos': 'tacos',
            'kebab': 'kebab',
            'lasagne': 'lasagna',
            'mozzarella': 'mozzarella',
            'halloumi': 'halloumi cheese',
            'nudlar': 'noodles',
            'wok': 'stir fry',
            'burgare': 'hamburger',
            'ryggbiff': 'sirloin steak',
            'oxfilé': 'beef tenderloin',
            'lövbiff': 'minute steak',
            'högrev': 'chuck roast',
            'stek': 'steak',
            'kalops': 'beef stew',
            'moussaka': 'moussaka',
            'sjömansbiff': 'beef and potato stew',
            'kroketter': 'croquettes',
            'fiskpinnar': 'fish sticks',
            'wallenbergare': 'veal patties',
            'järpar': 'meat patties',
            'lapskojs': 'potato and beef stew',
            'makaroner': 'macaroni',
            'pasta': 'pasta'
          };

          // Sortera efter längd så att längre ord (t.ex. köttfärssås) ersätts före kortare (t.ex. köttfärs)
          const sortedKeys = Object.keys(dict).sort((a, b) => b.length - a.length);

          for (const sv of sortedKeys) {
              translated = translated.replace(new RegExp(sv, 'gi'), dict[sv]);
          }
          
          let context = "delicious food plate";
          if(collection === "Soppor") context = "creamy soup in a bowl";
          else if(collection === "Spaghetti- & pastarätter") context = "pasta dish in a deep plate";

          // Skapa en "seed" baserat på namnet, så AI:n alltid ritar EXAKT samma bild för samma rätt!
          let seed = 0;
          for (let i = 0; i < name.length; i++) {
            seed = name.charCodeAt(i) + ((seed << 5) - seed);
          }
          seed = Math.abs(seed);

          const prompt = `Professional food photography of ${translated}, ${context}, appetizing, realistic, highly detailed, restaurant plating, absolutely no text, no letters, no watermark`;
          return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=800&height=600&nologo=true&seed=${seed}`;
        };

        const RobotLogo = () => (
          <svg viewBox="0 0 100 100" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" fill="#10B981" />
            <path d="M30 45 C20 45 20 25 35 25 C38 15 62 15 65 25 C80 25 80 45 70 45 Z" fill="#ffffff"/>
            <path d="M35 40 L65 40 L65 52 L35 52 Z" fill="#ffffff"/>
            <rect x="48" y="4" width="4" height="15" fill="#94A3B8"/>
            <circle cx="50" cy="4" r="4" fill="#F87171"/>
            <rect x="25" y="52" width="50" height="35" rx="8" fill="#F1F5F9" stroke="#cbd5e1" strokeWidth="2"/>
            <circle cx="38" cy="65" r="5" fill="#1E293B"/>
            <circle cx="62" cy="65" r="5" fill="#1E293B"/>
            <circle cx="30" cy="72" r="3" fill="#FCA5A5" opacity="0.6"/>
            <circle cx="70" cy="72" r="3" fill="#FCA5A5" opacity="0.6"/>
            <path d="M 40 75 Q 50 80 60 75" stroke="#1E293B" strokeWidth="3" fill="none" strokeLinecap="round"/>
          </svg>
        );

        const C_P = 'Spaghetti- & pastarätter';
        const C_S = 'Soppor';
        const C_Po = 'Potatisrätter';

        const RAW_RECIPES = [
          // 28 PASTARÄTTER FRÅN PDF:
          ['pasta_1', 'Pasta carbonara', 'kött', C_P, '20 min', [['Spaghetti',500,'g'],['Pancetta',180,'g'],['Äggulor',4,'st'],['Pecorinoost',2,'dl'],['Svartpeppar',1,'krm']], '1. Koka upp vatten i en kastrull. Salta vattnet ordentligt.\n2. Stek pancettan i en stekpanna.\n3. Riv generöst med ost och lägg i en skål.\n4. Separera äggulorna och häll gulorna i skålen med osten. Rör runt. Ha i lite svartpeppar.\n5. Koka spaghettin enligt anvisning. Behåll ca 2 dl av pastavattnet.\n6. Dra av stekpannan från plattan. Häll över pastan i stekpannan med pancettan och vänd runt.\n7. Ha i lite pastavatten i skålen med ägg/ost och rör runt. Häll sedan över detta i stekpannan och rör runt.\n8. Salta, peppra och toppa med extra parmesan!'],
          ['pasta_2', 'Spaghetti och köttfärssås', 'kött', C_P, '30 min', [['Blandfärs',500,'g'],['Spaghetti',500,'g'],['Smör',2,'msk'],['Vitlöksklyftor',2,'st'],['Gul lök',1,'st'],['Köttbuljongtärning',1,'st'],['Matlagningsgrädde',2,'dl'],['Vispgrädde',1,'dl'],['Tomatpuré',3,'msk'],['Sambal oelek',1,'tsk'],['Oregano',1,'msk'],['Basilika',1,'msk']], '1. Koka upp saltat vatten.\n2. Skala och finhacka vitlök och gul lök. Stek i smör.\n3. Häll ner blandfärsen och stek. Krydda med salt, peppar och paprikakrydda.\n4. Ha i tomatpuré och sambal oelek.\n5. Tillsätt grädden och köttbuljong, koka upp.\n6. Krydda med basilika och oregano. Koka spaghettin och servera med såsen.'],
          ['pasta_3', 'Spaghetti och kycklingfärssås', 'kyckling', C_P, '30 min', [['Kycklingfärs',500,'g'],['Spaghetti',500,'g'],['Vitlöksklyftor',2,'st'],['Gul lök',1,'st'],['Grönsaksbuljongtärning',1,'st'],['Matlagningsgrädde',2,'dl'],['Vispgrädde',1,'dl'],['Tomatpuré',3,'msk'],['Sambal oelek',1,'tsk']], '1. Finhacka lök och vitlök, stek i smör.\n2. Häll ner kycklingfärsen och stek. Salta och peppra.\n3. Tillsätt tomatpuré och sambal oelek.\n4. Häll i grädde och grönsaksbuljong, koka upp. Krydda med basilika/oregano.\n5. Koka spaghettin och servera med såsen och parmesan.'],
          ['pasta_4', 'Pasta Alfredo & Chicken Milanese', 'kyckling', C_P, '40 min', [['Kycklingbröstfiléer',4,'st'],['Ägg',4,'st'],['Vetemjöl',1,'dl'],['Panko',2,'dl'],['Vitlöksklyftor',4,'st'],['Tagliatelle',400,'g'],['Smör',60,'g'],['Parmesan',2,'dl']], '1. Dela och banka ut kycklingfiléerna platta.\n2. Panera i ordningen: mjöl, uppvispat ägg, panko.\n3. Hetta upp olja och vitlöksklyftor i en panna. Fritera kycklingen och lägg på galler.\n4. Koka tagliatellen i saltat vatten. Riv parmesan.\n5. Smält smör i en panna, tillsätt 2 dl pastavatten och pastan. Dra av från plattan, rör i parmesan.\n6. Servera pastan med den krispiga kycklingen.'],
          ['pasta_5', 'Kycklingpasta med spenat och parmesan', 'kyckling', C_P, '20 min', [['Kycklinglårfilé',500,'g'],['Smör',2,'msk'],['Crème fraiche parmesan & vitlök',2,'dl'],['Babyspenat',65,'g'],['Pasta',500,'g']], '1. Koka pastan enligt anvisning.\n2. Skär kycklingen i bitar. Fräs i smör tills genomstekt, salta och peppra.\n3. Rör ner crème fraiche och koka ihop ca 5 min.\n4. Vänd ner spenaten och blanda såsen med pastan. Servera direkt!'],
          ['pasta_6', 'Lasagne', 'kött', C_P, '50 min', [['Blandfärs',500,'g'],['Gul lök',1,'st'],['Krossade tomater',400,'g'],['Tomatpuré',2,'msk'],['Lasagneplattor',9,'st'],['Mjölk',7,'dl'],['Vetemjöl',3,'msk'],['Riven ost',3,'dl']], '1. Sätt ugnen på 225°.\n2. Fräs lök och vitlök i smör. Lägg i färsen och stek.\n3. Tillsätt tomater, puré, oregano och buljong. Koka 5 min.\n4. Sås: Vispa mjöl i hälften av mjölken i en kastrull. Häll i resten och koka upp under vispning i 3 min. Rör ner 2,5 dl ost.\n5. Varva färssås, ostsås och plattor i form. Avsluta med sås och sista osten. Grädda ca 30 min.'],
          ['pasta_7', 'Kycklinglasagne', 'kyckling', C_P, '45 min', [['Kycklingfilé',300,'g'],['Lasagneplattor',12,'st'],['Gula lökar',2,'st'],['Vitlöksklyftor',4,'st'],['Babyspenat',300,'g'],['Cocktailtomater',200,'g'],['Mozzarella',2,'st'],['Riven ost',2,'dl'],['Smör',75,'g'],['Vetemjöl',2,'dl'],['Mjölk',1.5,'liter'],['Riven muskotnöt',1,'krm']], '1. Hacka lök, vitlök och kyckling. Halvera tomaterna.\n2. Fräs lök, kyckling och vitlök tills gyllene. Vänd i spenat, salta, peppra. Ställ åt sidan.\n3. Bechamelsås: Bryn smöret i kastrull, vispa i mjöl, tillsätt mjölk. Koka upp under omrörning. Krydda med muskot, salt och peppar. Rör ner 150g riven ost.\n4. Sätt ugnen på 200 grader.\n5. Varva bechamelsås, lasagneplattor och kycklingfyllning i en form. Avsluta med plattor, sås, mozzarella och tomater. Krydda med oregano.\n6. Grädda ca 45 min. Låt vila innan servering.'],
          ['pasta_8', 'Pastagratäng med krämig mozzarella', 'kött', C_P, '45 min', [['Kokt pasta',8,'dl'],['Färskost',200,'g'],['Mozzarella',1,'förp'],['Blandfärs',500,'g'],['Matlagningsgrädde',2,'dl'],['Vispgrädde',1,'dl'],['Tomatpuré',2,'msk'],['Körsbärstomater',10,'st']], '1. Koka pastan. Sätt ugnen på 200°.\n2. Bryn lök, vitlök och köttfärs. Krydda med salt, peppar, basilika, puré och lite sambal.\n3. Ha i grädden och köttbuljong, koka upp.\n4. Rör ihop den varma pastan med färskosten. Blanda sedan med köttfärsröran och bred ut i en ugnsform.\n5. Fördela halverade tomater och mozzarella över. Gratinera tills gyllene.'],
          ['pasta_9', 'Stuvade makaroner och köttbullar', 'kött', C_P, '30 min', [['Köttbullar',30,'st'],['Mjölk',10,'dl'],['Makaroner',5,'dl'],['Salt',0.5,'tsk']], '1. Koka upp mjölken i en nonstick kastrull.\n2. Tillsätt makaroner och salt. Koka under omrörning på svag värme ca 25 min tills mjuka.\n3. Smaka av med salt och peppar.\n4. Stek köttbullarna och servera!'],
          ['pasta_10', 'Stuvade makaroner och falukorv', 'kött', C_P, '30 min', [['Falukorv',400,'g'],['Mjölk',10,'dl'],['Makaroner',5,'dl'],['Salt',0.5,'tsk']], '1. Koka upp mjölken i en nonstick kastrull.\n2. Tillsätt makaroner och salt. Koka under omrörning på svag värme ca 25 min.\n3. Skär falukorven i bitar och stek.\n4. Servera stuvningen med korven!'],
          ['pasta_11', 'Tik Tok-pasta', 'veg', C_P, '25 min', [['Körsbärstomater',1,'förp'],['Färsk bladspenat',1,'förp'],['Vitlöksklyftor',2,'st'],['Crème fraiche tomat och basilika',2,'dl'],['Mozzarella',1,'st'],['Pasta',400,'g']], '1. Koka pastan enligt anvisning. Spara lite pastavatten.\n2. Dela tomaterna och hetta upp i en stekpanna.\n3. Pressa ner vitlök och lägg i spenaten. Rör runt.\n4. Ha i buljong, crème fraiche, mozzarellan i bitar och pastavattnet. Rör tills osten smält.\n5. Blanda i pastan och krydda!'],
          ['pasta_12', 'Nudlar och kycklingwok', 'kyckling', C_P, '30 min', [['Kycklinglårfilé',600,'g'],['Japansk soja',4,'msk'],['Äggnudlar',250,'g'],['Röd paprika',1,'st'],['Minimajs',225,'g'],['Sockerärtor',100,'g'],['Oystersås',2,'msk'],['Sesamolja',1,'tsk']], '1. Dela kycklingen och marinera i majsstärkelse, 1 msk soja, chiliflakes och vitlök.\n2. Blanda såsen: 3 msk japansk soja, 1 msk kinesisk soja, oystersås, socker, sesamolja.\n3. Koka nudlarna al dente.\n4. Stek kycklingen på hög värme. Lägg åt sidan.\n5. Woka paprika, majs, sockerärtor. Vänd i kyckling, nudlar och sås. Värm ihop.'],
          ['pasta_13', 'Fläskfilé pasta med spenat', 'kött', C_P, '35 min', [['Fläskfilé',500,'g'],['Babyspenat',120,'g'],['Soltorkade tomater i olja',8,'st'],['Vispgrädde',3,'dl'],['Crème fraîche',1,'dl'],['Färsk tagliatelle',400,'g']], '1. Fräs babyspenaten i smör. Lägg undan.\n2. Strimla filén, salta, peppra och stek runt om. Lägg åt sidan.\n3. Häll grädde i samma panna. Tillsätt hackad vitlök, strimlade tomater, crème fraiche, kycklingfond och spenaten. Låt puttra.\n4. Vänd ner köttet och basilika.\n5. Koka tagliatellen och blanda med såsen. Toppa med parmesan.'],
          ['pasta_14', 'Pastasallad med kyckling', 'kyckling', C_P, '25 min', [['Pasta',400,'g'],['Kycklingbröstfiléer',4,'st'],['Körsbärstomater',1,'ask'],['Minimozzarella',125,'g'],['Crème fraîche',4,'dl'],['Örter provencale',2,'msk'],['Citronsaft',1,'msk']], '1. Koka pastan, sila och låt svalna.\n2. Skiva tomaterna och blanda ner i pastan.\n3. Bryn och genomstek kycklingen i bitar, salta/peppra.\n4. Blanda dressing: crème fraiche, örter, citron, salt, peppar.\n5. Blanda allt i en skål tillsammans med sallad och mozzarella.'],
          ['pasta_15', 'Kyckling- och parmesanpasta', 'kyckling', C_P, '25 min', [['Kycklinglårfilé',4,'st'],['Spaghetti',400,'g'],['Matlagningsgrädde',2,'dl'],['Vispgrädde',1,'dl'],['Parmesan',1.5,'dl'],['Citronjuice',1,'msk']], '1. Stek kycklingen, krydda med salt, peppar, paprikapulver och vitlökspulver. Lägg undan.\n2. Använd samma panna: häll i grädde, parmesan, citronjuice. Salta/peppra. Red med lite maizena.\n3. Koka spaghettin.\n4. Häll spaghettin i såsen, blanda i kycklingen och servera med persilja.'],
          ['pasta_16', 'Citronpasta', 'veg', C_P, '15 min', [['Pasta',400,'g'],['Smör',25,'g'],['Vitlöksklyfta',1,'st'],['Vispgrädde',2.5,'dl'],['Citronskal (finrivet)',2,'msk'],['Citronjuice',1,'msk'],['Riven parmesan',1,'dl']], '1. Bryn smöret. Fräs vitlöken 1 min.\n2. Häll i grädde, citronskal, citronjuice och parmesan. Låt puttra.\n3. Koka pastan al dente.\n4. Vänd ner pastan i såsen. Toppa med extra parmesan och svartpeppar.'],
          ['pasta_17', 'Cacio e peppe', 'veg', C_P, '15 min', [['Pasta',500,'g'],['Parmesan',280,'g'],['Pecorino',120,'g'],['Smör',1,'msk'],['Svartpeppar',1,'msk']], '1. Mortla svartpepparn.\n2. Finriv all ost.\n3. Smält smör, lägg i pepparn och bryn tills smöret slutat bubbla.\n4. Koka pastan al dente i saltat vatten. Spara pastavatten!\n5. Häll 1-2 dl pastavatten i pepparsmöret. Lägg i pastan.\n6. Dra ned värmen, vänd ner osten i omgångar tills det blir en krämig sås.'],
          ['pasta_18', 'Pestopasta med kyckling', 'kyckling', C_P, '20 min', [['Kycklinglårfilé',600,'g'],['Pesto',100,'g'],['Crème fraiche',2,'dl'],['Vispgrädde',1,'dl'],['Pasta',400,'g'],['Vitlöksklyftor',2,'st']], '1. Koka pastan.\n2. Tärna och stek kycklingen. Salta och peppra.\n3. Hacka i vitlök. Tillsätt några skedar pesto, grädde och crème fraiche. Koka upp.\n4. Smaka av med mer pesto, chilipulver, salt och peppar.\n5. Blanda ner pasta och parmesan. Servera.'],
          ['pasta_19', 'Chorizopasta', 'kött', C_P, '25 min', [['Chorizo',400,'g'],['Krossade tomater',400,'g'],['Vispgrädde',2,'dl'],['Gul lök',1,'st'],['Chili',0.5,'st'],['Tomatpuré',1.5,'msk'],['Pasta',500,'g']], '1. Stek finhackad chili, vitlök och lök i olja.\n2. Slanta chorizon och stek med löken.\n3. Tillsätt puré och en smörklick, stek 2 min.\n4. Häll i tomater, paprikapulver, socker, salt, peppar. Puttra 10 min.\n5. Koka pastan under tiden.\n6. Tillsätt grädde i såsen, koka upp, vänd i pastan.'],
          ['pasta_20', 'Krämig tomat gnocchi med burrata', 'veg', C_P, '25 min', [['Gnocchi',1,'förp'],['Olivolja',3,'msk'],['Körsbärstomater',250,'g'],['Tomatpuré',2,'msk'],['Vispgrädde',3,'dl'],['Gul lök',0.5,'st'],['Vitlöksklyftor',2,'st'],['Parmesan',2,'dl'],['Burrata',1,'st']], '1. Koka gnocchin al dente. Spara lite pastavatten.\n2. Värm olivolja och bryn hackad lök och vitlök. Tillsätt tomater, salt och peppar och tillaga 5-10 min.\n3. Kläm sönder några tomater med stekspaden. Tillsätt tomatpuré och fräs några minuter.\n4. Häll i vispgrädde och vänd i gnocchin. Späd med pastavatten.\n5. Rör i basilika, persilja och parmesan.\n6. Servera toppat med burrata och olivolja.'],
          ['pasta_21', 'Tortellinigratäng', 'kött', C_P, '35 min', [['Köttfärs',500,'g'],['Tortellini',500,'g'],['Färskost',200,'g'],['Kalvfond',1,'msk'],['Tomatsås',400,'g'],['Riven ost',2,'dl']], '1. Sätt ugnen på 200 grader.\n2. Stek färsen och krydda med salt och peppar.\n3. Ha i färskost och rör tills den smält.\n4. Tillsätt kalvfond, tomatsås och okokt tortellini.\n5. Lägg över i ugnsform och toppa med riven ost.\n6. Grädda ca 10-15 minuter.'],
          ['pasta_22', 'Krämig halloumipasta', 'veg', C_P, '20 min', [['Halloumi',2,'förp'],['Crème fraiche franska örter',2,'burk'],['Pasta',400,'g'],['Cocktailtomater',200,'g'],['Persilja',1,'kruka']], '1. Koka pastan enligt förpackningen.\n2. Tärna halloumin och stek i lite olja tills den fått fin färg. Lägg åt sidan.\n3. Halvera tomaterna. Häll crème fraiche och tomater i pannan. Låt koka ihop. Salta och peppra.\n4. Vänd ner hackad persilja, halloumi och pastan. Blanda ihop!'],
          ['pasta_23', 'Pastagratäng med kyckling och pesto', 'kyckling', C_P, '40 min', [['Penne',800,'g'],['Kycklingfärs',400,'g'],['Gul lök',1,'st'],['Pastasås basilika',400,'g'],['Crème fraiche parmesan & vitlök',4,'dl'],['Pesto',190,'g'],['Vatten',1.5,'dl']], '1. Värm ugnen till 200 grader.\n2. Koka pastan (2 minuter kortare än anvisningen).\n3. Hacka löken. Bryn kycklingfärs och lök. Tillsätt pastasås och 1 dl vatten. Låt puttra 15 min.\n4. Vispa samman crème fraiche, pesto och 0.5 dl vatten.\n5. Varva pestosås, pasta och kycklingfärssås i en ugnsform. Avsluta med pestosås.\n6. Gratinera i ca 20 min.'],
          ['pasta_24', 'Pasta Italiano', 'kött', C_P, '25 min', [['Spaghetti',400,'g'],['Salami',250,'g'],['Gul lök',1,'st'],['Vitlöksklyftor',2,'st'],['Paprikakrydda',2,'tsk'],['Dijonsenap',1,'msk'],['Krossade tomater',400,'g'],['Crème fraiche',2.5,'dl']], '1. Hacka och stek lök och vitlök mjuka i olivolja.\n2. Strimla salami och stek med löken. Klicka i senap och rör runt.\n3. Häll på krossade tomater och puttra 10 min. Koka pastan och spara 1 dl pastavatten.\n4. Rör i crème fraiche och puttra 5 min.\n5. Tillsätt pastavatten och puttra 5 min till. Vänd i pastan och toppa med ost.'],
          ['pasta_25', 'Pasta med krämig ost- och skinksås', 'kött', C_P, '20 min', [['Pasta',4,'port'],['Gul lök',1,'st'],['Matlagningsgrädde',2.5,'dl'],['Mjölk',1.5,'dl'],['Majsstärkelse',2,'tsk'],['Kycklingbuljongtärning',1,'st'],['Rökt skinka',180,'g'],['Prästost (riven)',1.5,'dl'],['Tomater',3,'st']], '1. Koka pastan.\n2. Stek lök i smör i en stekpanna.\n3. Blanda grädde, mjölk och majsstärkelse. Häll i pannan. Smula ner buljongtärningen och koka upp.\n4. Rör i skinka och ost. Låt bli varmt.\n5. Skär tomater och klipp i gräslök.\n6. Servera pastan med såsen och tomaterna.'],
          ['pasta_26', 'Drunken noodles med fläskytterfilé', 'kött', C_P, '30 min', [['Udonnudlar',300,'g'],['Fläskytterfilé',300,'g'],['Vitlöksklyftor',4,'st'],['Salladslökar',4,'st'],['Broccoli',1,'st'],['Ostronsås',1,'dl'],['Fisksås',2,'msk'],['Kinesisk soja',1,'msk'],['Strösocker',1,'msk']], '1. Koka nudlar, skölj kallt och låt rinna av.\n2. Mortla/pressa vitlök, tärna fläsket i munsbitar.\n3. Hetta upp en wok med olja, fräs vitlöken snabbt och i med fläsket tills gyllene.\n4. Fös fläsket åt sidan. Lägg i skivad salladslök och broccolistavar, fräs 1-2 min.\n5. Tillsätt nudlar, ostronsås, fisksås, soja och socker. Woka ihop tills allt är varmt.'],
          ['pasta_27', 'Pasta mascarpone med citron och spenat', 'veg', C_P, '20 min', [['Pasta',4,'port'],['Mascarpone',150,'g'],['Citron',1,'st'],['Vitlöksklyfta',1,'st'],['Riven parmesan',2,'dl'],['Babyspenat',70,'g']], '1. Koka pastan. Riv citronzest.\n2. Krossa vitlöken och stek hastigt i olja/smör.\n3. Tillsätt mascarpone och parmesan i pannan och låt smälta. Smaksätt med citronsaft, zest, salt och peppar.\n4. Plocka upp vitlöksklyftan.\n5. Vänd ner pasta och några matskedar pastavatten, låt koka ihop. Rör i spenat på slutet.\n6. Toppa med extra parmesan, peppar och olivolja.'],
          ['pasta_28', 'Pad thai', 'kyckling', C_P, '35 min', [['Kycklingfiléer',3,'st'],['Risnudlar',300,'g'],['Gul lök',2,'st'],['Fisksås',1,'msk'],['Ostronsås',1.5,'msk'],['Kinesisk soja',0.5,'msk'],['Lime',0.5,'st'],['Chilifrukter',2,'st'],['Ägg',2,'st'],['Groddar',2.5,'dl']], '1. Koka nudlarna.\n2. Strimla och fräs kycklingen och grovhackad lök i wokpanna.\n3. Blanda sås: vatten, pressad lime, soja, ostronsås, fisksås, socker, pressad vitlök och finhackad chili.\n4. Vänd ner nudlar och groddar i pannan. Häll över såsen och fräs.\n5. Knäck i äggen, rör runt tills de stannat.\n6. Servera med koriander och krossade jordnötter.'],
          
          // 7 SOPPOR FRÅN PDF:
          ['soppa_1', 'Pastasoppa', 'kött', C_S, '20 min', [['Bacon',200,'g'],['Gul lök',1,'st'],['Morötter',3,'st'],['Smör',1,'msk'],['Hönsbuljong',1,'liter'],['Pasta',4,'port'],['Tomatpuré',2,'msk'],['Crème fraiche',2,'dl']], '1. Skär baconet i små tärningar. Skala lök och morötter och skär i små bitar.\n2. Fräs fläsk och grönsaker i smör i en gryta. Häll på buljongen och låt det koka upp.\n3. Lägg i pastan och krydda med tomatpuré, basilika, oregano och peppar. Låt soppan koka i ca 10 min. Rör ner 1 dl crème fraiche.\n4. Servera soppan med en klick crème fraiche.'],
          ['soppa_2', 'Potatissoppa med bacon', 'kött', C_S, '25 min', [['Potatis',800,'g'],['Purjolök',1,'st'],['Vatten',0.5,'L'],['Köttbuljongtärningar',2,'st'],['Vispgrädde',2,'dl'],['Bacon',2,'förp']], '1. Skala och tärna potatisen. Ansa och skiva purjolöken. Fräs purjolöken i smör i 2-3 minuter. Tillsätt potatisen.\n2. Häll på vatten och fond. Låt koka upp och koka på medelvärme tills potatisen är mjuk, ca 10 minuter.\n3. Skär baconet i mindre bitar, stek baconet och låt rinna av på hushållspapper.\n4. Ta kastrullen från värmen. Mosa eller mixa potatisen lite lätt med stavmixer. Häll i grädden och låt soppan bli varm.\n5. Servera soppan med bacon.'],
          ['soppa_3', 'Köttfärs- och potatissoppa', 'kött', C_S, '35 min', [['Gul lök',1,'st'],['Vitlök',1,'klyfta'],['Blandfärs',500,'g'],['Tomatpuré',3,'msk'],['Köttbuljongtärningar',2,'st'],['Vatten',8,'dl'],['Potatis',8,'st'],['Morötter',4,'st']], '1. Skala och hacka lök och vitlök. Fräs löken glansig i matfett i en rejäl gryta.\n2. Värm matfett i en stekpanna och fräs färsen.\n3. Blanda ner tomatpuré och häll över blandningen i grytan.\n4. Lägg i buljongtärningar och häll på vatten. Låt koka på svag värme.\n5. Skala potatisen, skär i bitar och lägg i grytan. Koka i 15-20 minuter.\n6. Skala och skär morötterna i skivor och låt koka med i ca 5 minuter.'],
          ['soppa_4', 'Spenatsoppa', 'veg', C_S, '20 min', [['Hackad fryst spenat',450,'g'],['Smör',2,'msk'],['Vispgrädde',1,'dl'],['Vatten',1,'liter'],['Grönsaksbuljong',2,'tärningar'],['Ägg',4,'st']], '1. Värm upp den frysta spenaten tillsammans med smöret och ca. 2 dl av vattnet.\n2. Häll sedan i resterande mängd vatten och grönsaksbuljongen, koka upp.\n3. Koka äggen medelkokt/hårdkokt beroende på vad som gillas.\n4. Smaka av soppan med salt och peppar. Tillsätt ev. lite gräslök.\n5. Dra av kastrullen från plattan och tillsätt vispgrädde. Servera med halverade ägg.'],
          ['soppa_5', 'Rostad tomatsoppa och vitlöksbröd', 'veg', C_S, '50 min', [['Kvisttomat',1000,'g'],['Vitlök',0.5,'st'],['Rödlökar',2,'st'],['Olivolja',2,'msk'],['Vatten',5,'dl'],['Grönsaksbuljong',2,'tärningar'],['Vispgrädde',2,'dl'],['Vitlöksbröd',1,'förp']], '1. Sätt ugnen på 200 grader.\n2. Skär tomaterna på hälften. Skala och skär löken i klyftor. Halvera vitlöken, behåll skalet på.\n3. Lägg allt i en form, ringla över olivolja. Lägg i vitlöken med snittytan uppåt.\n4. Rosta i ugnen 40-50 minuter tills grönsakerna fått färg.\n5. Koka upp vatten och buljong i en kastrull.\n6. Kläm ur den mjuka vitlöken och släng skalet.\n7. Lägg tomater, lök och vitlök i buljongen, koka i ett par minuter.\n8. Mixa soppan slät med stavmixer.\n9. Tillsätt grädden, mixa mer, smaka av med salt/peppar.\n10. Servera med vitlöksbröd, en klick gräddfil och basilika.'],
          ['soppa_6', 'Lasagnesoppa', 'kött', C_S, '35 min', [['Nötfärs',500,'g'],['Gul lök',2,'st'],['Vitlöksklyftor',5,'st'],['Krossade tomater',390,'g'],['Vatten',5,'dl'],['Köttbuljongtärningar',2,'st'],['Lasagneplattor',10,'st'],['Vispgrädde',2,'dl'],['Mozzarella (riven)',3,'dl'],['Ricotta',250,'g']], '1. Börja med att fräsa hackad lök och vitlök. När de fått färg, tillsätt köttfärs och alla torra kryddor. Stek tills färsen fått fin yta.\n2. Fräs med tomatpurén i några minuter. Tillsätt krossad tomat, vatten, köttbuljong och lagerblad. Låt puttra i 10 minuter.\n3. Bryt ner lasagneplattorna och häll i vispgrädden. Tillsätt mer vatten om det behövs. Koka tills lasagneplattorna mjuknat.\n4. Rör ner mozzarella och färsk basilika.\n5. Ricottaröra: Blanda ricotta, parmesan, salt och peppar i en skål.\n6. Servera soppan toppad med ricottaröran.'],
          ['soppa_7', 'Mild tomatsoppa med salsiccia', 'kött', C_S, '15 min', [['Färdig mild tomatsoppa',1,'liter'],['Körsbärstomater',150,'g'],['Salsiccia',200,'g'],['Smör',1,'msk'],['Mozzarella',1,'st']], '1. Halvera tomaterna. Skiva korven. Lägg undan några korvskivor till garnering.\n2. Bryn korven i smör i en kastrull.\n3. Häll på soppan och värm under omrörning.\n4. Toppa soppan med resten av korven, tomaterna, citronskal och riven mozzarella eller bitar av hel mozzarella.'],

          // 29 POTATISRÄTTER FRÅN SENASTE PDF:
          ['potatis_1', 'Panerad fisk och potatis med kall sås', 'fisk', C_Po, '30 min', [['Panerad fisk',1,'förp'],['Potatis',12,'st'],['Crème fraiche',2,'dl'],['Gräddfil',2,'dl'],['Vitlöksklyftor',3,'st'],['Citronjuice',2,'tsk'],['Rödlök',0.5,'st'],['Majonnäs',1,'msk'],['Dijonsenap',1,'msk'],['Dill',1,'knippe']], '1. Koka potatisen efter anvisningar.\n2. Stek den panerade fisken i smör/olja (eller i ugnen).\n3. Blanda ihop såserna: Fannys sås (1 dl crème fraiche, 1 dl gräddfil, vitlök, citron, salt/peppar, dill) och Jonas sås (1 dl crème fraiche, 1 dl gräddfil, rödlök, majonnäs, senap, dill).\n4. Servera!'],
          ['potatis_2', 'Krispig torsk i ugn med potatis', 'fisk', C_Po, '35 min', [['Torskfilé',750,'g'],['Salt',1.5,'tsk'],['Svartpeppar',0.5,'tsk'],['Citronskal',0.5,'msk'],['Citronsaft',1,'msk'],['Olivolja',1,'dl'],['Dragon',1,'msk'],['Persilja (hackad)',2,'dl'],['Vitt bröd (hackat)',3,'dl'],['Lagrad ost (riven)',2,'dl'],['Körsbärstomater',300,'g'],['Potatis',4,'port']], '1. Värm ugnen till 170 grader varmluft.\n2. Lägg fisken i en smord form och gnid in med salt, peppar, citronskal och saft.\n3. Blanda olja, dragon, persilja, bröd och osten i en skål.\n4. Fördela blandningen över fiskbitarna. Lägg tomaterna bredvid.\n5. Tillaga mitt i ugnen 15-25 minuter (ca 52 grader inuti).\n6. Servera med pressad potatis.'],
          ['potatis_3', 'Fish and chips', 'fisk', C_Po, '25 min', [['Fish and crisp',1,'förp'],['Pommes frites',1,'förp'],['Remouladsås',1,'dl'],['Aioli',1,'dl']], '1. Tillaga fisken och pommes efter anvisning.\n2. Servera med remouladsås och aioli. Salta efter smak.'],
          ['potatis_4', 'Falukorv i ugn och mos', 'kött', C_Po, '40 min', [['Falukorv',1,'st'],['Potatis',15,'st'],['Ketchup',4,'msk'],['Senap',2,'msk'],['Rödlök',0.5,'st'],['Bostongurka',2,'msk'],['Tomat',1,'st'],['Riven ost',1,'förp'],['Mjölk',1,'dl']], '1. Sätt ugnen på 225 grader.\n2. Skär snitt i korven. Fördela ketchup, senap, lök, bostongurka och tomat i skårorna. Toppa med ost.\n3. In i ugnen ca 30 min.\n4. Koka potatis. Häll av vatten och mosa. Rör i mjölk, salt och peppar.'],
          ['potatis_5', 'Kyckling och ugnsrostad potatis', 'kyckling', C_Po, '45 min', [['Kycklinglårfilé',4,'st'],['Potatis',15,'st'],['Vitlöksklyftor',2,'st'],['Soja',1,'msk'],['Honung',1,'msk'],['Bearnaisesås',1,'burk']], '1. Sätt ugnen på 225°C. \n2. Dela potatisen, blanda med olja, salt, peppar. Rosta i ugn ca 35 min.\n3. Stek kycklingen med krossad vitlök tills fin färg.\n4. Lägg kycklingen med potatisen i ugnen, pensla med soja och honung, krydda med timjan. Rosta 25 min till.\n5. Servera med bearnaisesås.'],
          ['potatis_6', 'Wallenbergare och mos', 'kött', C_Po, '45 min', [['Kalvfärs',500,'g'],['Äggulor',3,'st'],['Vispgrädde',3,'dl'],['Ströbröd',1.5,'dl'],['Potatis',15,'st'],['Mjölk',2,'dl'],['Gröna ärtor',1,'förp'],['Lingonsylt',1,'burk']], '1. Blanda kall färs med salt och peppar. Tillsätt äggulor och grädde.\n2. Forma 8 biffar med blöta händer, vänd i ströbröd.\n3. Stek i smör 2 min per sida, sedan in i ugn (100°) tills 65 grader inuti.\n4. Koka potatis, mosa med mjölk och smör. Krydda.\n5. Servera med mos, ärtor, brynt smör och lingon.'],
          ['potatis_7', 'Kycklingsbiffar och klyftpotatis med tzatziki', 'kyckling', C_Po, '40 min', [['Potatis',12,'st'],['Kycklingfärs',500,'g'],['Fetaost',1,'förp'],['Ägg',1,'st'],['Vitlöksklyftor',2,'st'],['Gurka',1,'st'],['Grekisk yoghurt',2,'dl']], '1. Sätt ugnen på 225°. Klyfta och rosta potatisen 25-30 min.\n2. Blanda kycklingfärs med smulad fetaost, ägg, riven vitlök och citronskal. Forma till biffar.\n3. Stek biffarna 3-4 min per sida (tills 70° inuti).\n4. Tzatziki: Riv gurkan, salta, krama ur vätska. Blanda med yoghurt och vitlök.'],
          ['potatis_8', 'Pytt i panna', 'kött', C_Po, '25 min', [['Köttbullar',1,'förp'],['Korv',1,'förp'],['Potatis',10,'st'],['Smör',2,'msk']], '1. Skär köttbullar på mitten och dela korv i bitar.\n2. Koka potatisen och skär ner den.\n3. Stek allt i smör tills de fått fin färg.\n4. Smaksätt med salt, peppar och dill.'],
          ['potatis_9', 'Tunnbrödsrulle', 'kött', C_Po, '30 min', [['Potatis',12,'st'],['Mjölk',1,'dl'],['Korv',8,'st'],['Tunnbröd',4,'st'],['Rostad lök',1,'dl'],['Skagenröra',1,'förp']], '1. Koka potatis, häll av och mosa. Rör i mjölk, salt, peppar och dill.\n2. Koka korven.\n3. Fördela mos, korv, rostad lök, ketchup, senap och skagenröra i tunnbröden. Rulla ihop.'],
          ['potatis_10', 'Schnitzel och kroketter', 'kött', C_Po, '25 min', [['Schnitzel',1,'förp'],['Potatiskroketter',1,'påse'],['Bearnaisesås',1,'burk']], '1. Tillaga schnitzel och potatiskroketter enligt anvisningarna på förpackningarna.\n2. Servera med bearnaisesås.'],
          ['potatis_11', 'Fiskpinnar och mos', 'fisk', C_Po, '25 min', [['Fiskpinnar',1,'förp'],['Potatis',12,'st'],['Mjölk',1,'dl'],['Remouladsås',1,'burk']], '1. Koka potatis, häll av och mosa. Rör i mjölk, smör, salt och peppar.\n2. Tillaga fiskpinnarna i ugn eller panna.\n3. Servera mos och fiskpinnar med remouladsås.'],
          ['potatis_12', 'Stekt falukorv med stuvad spenat', 'kött', C_Po, '35 min', [['Falukorv',400,'g'],['Smör',2,'msk'],['Vetemjöl',1,'msk'],['Mjölk',5,'dl'],['Grädde',3,'msk'],['Grov senap',2,'msk'],['Stuvad spenat',200,'g'],['Potatis',12,'st']], '1. Koka potatisen.\n2. Senapssås: Fräs smör, pudra över mjöl, vispa i mjölk. Koka upp. Smaksätt med grädde, senap, salt och peppar.\n3. Skiva och stek falukorven.\n4. Värm spenaten. Servera korven med sås, spenat och potatis.'],
          ['potatis_13', 'Kalops', 'kött', C_Po, '150 min', [['Nötkött',1000,'g'],['Morötter',4,'st'],['Gul lök',2,'st'],['Lagerblad',3,'st'],['Kalvfond',2,'msk'],['Kryddpepparkorn',5,'st'],['Majsstärkelse',1.5,'msk'],['Potatis',12,'st']], '1. Skär köttet i bitar. Bryn i smör i en gryta.\n2. Skär morötter och lök grovt. Tillsätt med lagerblad och kryddpeppar i grytan.\n3. Häll på vatten och fond. Sjud under lock ca 2-2,5 timmar tills mört.\n4. Red med majsstärkelse. Smaka av. Servera med kokt potatis.'],
          ['potatis_14', 'Moussaka', 'kött', C_Po, '60 min', [['Potatis (kokta)',10,'st'],['Gul lök',2,'st'],['Köttfärs',400,'g'],['Tomatpuré',2,'msk'],['Vetemjöl',5,'msk'],['Mjölk',7,'dl'],['Riven ost',3,'dl']], '1. Färs: Fräs lök, vitlök och färs. Strö över 1 msk mjöl, späd med buljong och tomatpuré. Koka 10 min.\n2. Ostsås: Fräs smör med 4 msk mjöl, späd med mjölk. Koka 10 min, rör ner ost, salt, peppar.\n3. Skiva kokt potatis. Varva potatis, färs och ostsås i en ugnsform. \n4. Gratinera i ugn (250°) ca 30 min.'],
          ['potatis_15', 'Hemmagjorda köttbullar med mos', 'kött', C_Po, '90 min', [['Blandfärs',500,'g'],['Ströbröd',0.5,'dl'],['Mjölk',1,'dl'],['Potatis',600,'g'],['Kalvfond',5,'dl'],['Vispgrädde',1,'dl'],['Svartvinbärsgelé',2,'msk']], '1. Blanda mjölk, ströbröd, ägg och brynt lök. Tillsätt färsen. Forma köttbullar.\n2. Sås: Fräs 1 msk mjöl i smör. Häll i kalvfond, koka. Sila av och smaksätt med gelé och soja.\n3. Mos: Koka potatis, mosa, tillsätt grädde/mjölk och smör.\n4. Stek köttbullarna och servera med mos, brunsås och lingon.'],

          ['potatis_18', 'Köttfärslimpa med brunsås', 'kött', C_Po, '90 min', [['Blandfärs',900,'g'],['Potatis',12,'st'],['Ströbröd',1,'dl'],['Mjölk',3,'dl'],['Kalvfond',4,'dl'],['Vispgrädde',3,'dl'],['Svartvinbärsgelé',2,'msk']], '1. Sätt ugn på 100°. Blanda mjölk, ströbröd. Tillsätt ägg, brynt lök, senap och färs.\n2. Forma till limpa i smord form. Grädda 1,5 h till 72-75° inuti.\n3. Koka potatis och morötter.\n4. Sås: Fräs mjöl i smör, tillsätt buljong, grädde och gelé. Koka 5 min.\n5. Servera limpan med potatis och sås.'],

          ['potatis_20', 'Provencalsk kycklinggryta', 'kyckling', C_Po, '45 min', [['Kycklinglårfilé',800,'g'],['Vitlöksklyfta',1,'st'],['Vispgrädde',3,'dl'],['Kycklingfond',1.5,'msk'],['Sweet chilisås',0.5,'dl'],['Tomater',200,'g']], '1. Salta, peppra kyckling. Bryn i smör och lägg i gryta.\n2. Tillsätt vitlök, grädde, fond, chilisås, oregano, timjan och vatten i pannan, koka upp.\n3. Häll över kycklingen, puttra 30-35 min under lock.\n4. Vänd i tomater och citronsaft på slutet. Servera med potatis.'],
          ['potatis_21', 'Fläskfilé med sås i ugnen', 'kött', C_Po, '40 min', [['Fläskytterfilé',800,'g'],['Vitlökspulver',2,'tsk'],['Vispgrädde',3,'dl'],['Crème fraiche',2,'dl'],['Kalvfond',2,'msk'],['Potatis',4,'port']], '1. Ugn 220 grader. Koka potatis.\n2. Gnid in kött med kryddor, stek för yta. Lägg i form, ugn 15 min.\n3. Sås: pressad vitlök, grädde, creme fraiche, fond, buljong. Koka upp.\n4. Skiva köttet, in i ugn 15 min till. Häll över sås och servera med potatis.'],
          ['potatis_22', 'Fläskfilé med örtsmör', 'kött', C_Po, '50 min', [['Fläskfilé',600,'g'],['Potatis',900,'g'],['Haricots verts',150,'g'],['Bacon',140,'g'],['Smör',200,'g']], '1. Ugn 200 grader. Rosta skivad potatis 30 min.\n2. Örtsmör: Blanda smör med persilja, chili, vitlök, timjan, citronskal.\n3. Linda bacon runt bönorna. Stek fläskfilé till 65 grader inuti.\n4. Stek bönorna. Skiva kött över potatisen, klicka på smöret. Grilla (220) tills smöret smält.'],
          ['potatis_23', 'Fläskfilé i sockerkaksform', 'kött', C_Po, '90 min', [['Fläskytterfilé',1000,'g'],['Vispgrädde',3,'dl'],['Crème fraiche',1,'dl'],['Svartvinbärsgelé',0.5,'dl'],['Soja',2,'msk'],['Potatis',4,'port']], '1. Sätt ugnen på 150 grader. Bryn köttet.\n2. Blanda grädde, creme fraiche, sambal oelek, gelé, soja, örtkrydda, vitlök och buljong. Koka upp.\n3. Lägg köttet i sockerkaksform, häll över sås. Ugn 70-90 min.\n4. Skiva köttet, häll köttsaften i såsen. Servera med potatis.'],

          ['potatis_25', 'Kycklingfärsbiffar med ost', 'kyckling', C_Po, '45 min', [['Kycklingfärs',500,'g'],['Spetspaprika',0.5,'st'],['Gruyereost',50,'g'],['Crème fraiche',3,'dl'],['Klyftpotatis',4,'port']], '1. Ugn 225 för potatis. Stek lök och paprika.\n2. Blanda med färs, ägg, ost, kryddor. Forma biffar, stek till yta.\n3. Sås: Creme fraiche, honung, soja, timjan. Häll över biffarna i form.\n4. Ugn 15 min. Servera med potatis.'],
          ['potatis_26', 'Köttfärsbiffar i färskostsås', 'kött', C_Po, '35 min', [['Crème Bonjour',200,'g'],['Vispgrädde',2,'dl'],['Köttfärs',500,'g'],['Ströbröd',0.5,'dl'],['Mjölk',1,'dl'],['Potatis',4,'port']], '1. Koka potatis. Stek hackad lök.\n2. Blanda ströbröd, mjölk, ägg, lök, färs, basilika. Forma och stek biffar.\n3. Sås: Smält Creme Bonjour med grädde i pannan. Sjud biffar i såsen 5-6 min.'],
          ['potatis_27', 'Järpar i gräddsås och potatis', 'kött', C_Po, '45 min', [['Köttfärs',1000,'g'],['Ströbröd',1.5,'dl'],['Mjölk',2,'dl'],['Vispgrädde',3,'dl'],['Japansk soja',3,'msk'],['Potatis',8,'port']], '1. Ugn 200 grader. Blanda färs, ströbröd, mjölk, ägg, senap, lök, kryddor.\n2. Forma järpar. Bryn och lägg i form.\n3. Stek skivad lök med socker (karamelliserad) och lägg över.\n4. Sås: grädde, soja. Häll över. Ugn 30 min.'],
