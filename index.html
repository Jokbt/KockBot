                                  <div className="flex justify-between items-center mb-4 pr-8"><span className="text-[10px] font-extrabold text-[#526e35] bg-[#f5f8f2] px-2 py-1 rounded-md uppercase tracking-widest border">{recipe.collection}</span></div>
                                  <h3 className="font-black text-xl mb-6 leading-tight group-hover:text-[#6a8a47] transition-colors drop-shadow-sm">{recipe.name}</h3>
                                  <div className="mt-auto pt-5 flex justify-between items-center border-t border-slate-100/80"><CatBadge protein={recipe.protein} /><span className="text-slate-500 text-xs font-bold flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md border"><CalendarDays size={14}/>{recipe.time}</span></div>
                              </div>
                            </div>
                        ))}
                        </div>
                    )}
                  </div>
                )}

                {activeTab === 'inspiration' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-2xl mx-auto">
                    <div className="text-center mb-8 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-8 rounded-3xl border shadow-xl"><div className="bg-[#e4ede0] dark:bg-[#171f0d]/40 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border"><Sparkles size={36} className="text-[#526e35]" /></div><h2 className="text-3xl font-extrabold mb-3 drop-shadow-sm">Ny inspiration</h2><p className="text-slate-500 font-medium">Skriv in en råvara du har hemma eller något du är sugen på, så hittar AI-kocken på ett helt unikt, gott recept åt dig.</p></div>
                    <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md p-3 sm:p-4 rounded-3xl shadow-lg border mb-8 flex flex-col sm:flex-row gap-3 relative z-10">
                      <input type="text" value={inspirationQuery} onChange={(e) => setInspirationQuery(e.target.value)} placeholder="T.ex. Vegetariskt med sötpotatis..." className="flex-1 px-6 py-4 bg-slate-50/50 dark:bg-slate-900/50 border rounded-2xl outline-none text-lg font-medium shadow-inner" onKeyDown={(e) => e.key === 'Enter' && handleGenerateInspiration()} />
                      <button onClick={handleGenerateInspiration} disabled={isGeneratingInspiration} className="px-8 py-4 bg-[#526e35] text-white rounded-2xl font-bold flex items-center justify-center gap-2 disabled:opacity-70 shadow-md active:scale-95 text-lg">{isGeneratingInspiration ? <Loader2 size={20} className="animate-spin" /> : <Sparkles size={20} />} Skapa recept</button>
                    </div>
                    {inspiredRecipe && (
                      <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-[2rem] shadow-2xl overflow-hidden border animate-in zoom-in-95 duration-500 relative">
                        <div className="p-6 sm:p-8">
                          <span className="text-xs font-bold text-[#526e35] bg-[#f5f8f2] px-3 py-1 rounded-md border uppercase tracking-widest mb-4 inline-block">{inspiredRecipe.collection}</span>
                          <h2 className="text-3xl sm:text-4xl font-black leading-tight mb-6 drop-shadow-sm">{inspiredRecipe.name}</h2>
                          <div className="w-full h-48 sm:h-80 bg-slate-100 dark:bg-slate-700 rounded-3xl mb-8 overflow-hidden relative shadow-inner border"><img src={getRecipeImage(inspiredRecipe)} alt={inspiredRecipe.name} className="w-full h-full object-cover animate-in fade-in" onError={(e) => { e.target.onerror=null; e.target.src=getFallbackImage(inspiredRecipe.id); }} /></div>
                          <div className="flex items-center gap-4 text-sm font-medium text-slate-500 mb-8 pb-6 border-b"><CatBadge protein={inspiredRecipe.protein} /><span className="flex items-center gap-1.5 bg-slate-50 px-3 py-1.5 rounded-lg border"><CalendarDays size={18}/> {inspiredRecipe.time}</span></div>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                            <div className="bg-[#f5f8f2]/50 p-6 rounded-3xl border shadow-sm"><h3 className="font-extrabold mb-5 flex items-center gap-2 text-lg"><ShoppingCart size={20} className="text-[#526e35]"/> Ingredienser</h3><ul className="space-y-3 text-sm">{inspiredRecipe.ingredients.map((ing, i) => (<li key={i} className="flex justify-between border-b pb-2 items-center"><span className="font-medium text-base">{ing.name}</span><span className="font-bold text-[#3d5226] bg-white px-3 py-1 rounded-lg shadow-sm border">{ing.amount} {ing.unit}</span></li>))}</ul></div>
                            <div><h3 className="font-extrabold mb-5 flex items-center gap-2 text-lg"><Utensils size={20} className="text-[#526e35]"/> Tillagning</h3><div className="space-y-4">{parseInstructionsText(inspiredRecipe.instructions).map((cleanStep, idx) => (<div key={idx} className="flex gap-4 p-4 bg-slate-50 dark:bg-slate-700 rounded-2xl border shadow-sm items-start"><span className="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-white rounded-full text-[#526e35] font-bold border shadow-sm">{idx+1}</span><p className="pt-1 leading-relaxed font-medium">{cleanStep}</p></div>))}</div></div>
                          </div>
                          <button onClick={saveInspiredRecipe} className="w-full px-6 py-5 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl active:scale-95 text-lg"><Save size={24} /> Spara detta till min Receptbok</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </main>

              <ApiModal />
              {selectedRecipeId && <RecipeModal recipe={recipes.find(r => r.id === selectedRecipeId)} onClose={() => setSelectedRecipeId(null)} />}
              <AddRecipeModal />
              <ShareModal />
            </div>
          </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
