        const DEFAULT_RECIPES = [
          { id: 'pasta_1', name: 'Pasta carbonara', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '20 min', ingredients: [{ name: 'Spaghetti', amount: 500, unit: 'g' },{ name: 'Pancetta', amount: 180, unit: 'g' },{ name: 'Äggulor', amount: 4, unit: 'st' },{ name: 'Pecorinoost/Parmesan', amount: 2, unit: 'dl' },{ name: 'Svartpeppar', amount: 1, unit: 'krm' }], instructions: '1. Koka upp vatten i en kastrull. Salta vattnet ordentligt.\n2. Stek pancettan i en stekpanna.\n3. Riv generöst med ost och lägg i en skål.\n4. Separera äggulorna och häll gulorna i skålen med osten. Rör runt. Ha i lite svartpeppar.\n5. Koka spaghettin enligt anvisning. Behåll ca 2 dl av pastavattnet.\n6. Dra av stekpannan från plattan. Häll över pastan i stekpannan med pancettan och vänd runt.\n7. Ha i lite pastavatten i skålen med ägg/ost och rör runt. Häll sedan över detta i stekpannan och rör runt.\n8. Salta, peppra och toppa med extra parmesan!' },

          { id: 'pasta_4', name: 'Pasta Alfredo & Chicken Milanese', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '40 min', ingredients: [{ name: 'Kycklingbröstfiléer', amount: 4, unit: 'st' },{ name: 'Ägg', amount: 4, unit: 'st' },{ name: 'Vetemjöl', amount: 1, unit: 'dl' },{ name: 'Panko', amount: 2, unit: 'dl' },{ name: 'Vitlöksklyftor', amount: 4, unit: 'st' },{ name: 'Tagliatelle', amount: 400, unit: 'g' },{ name: 'Smör', amount: 60, unit: 'g' },{ name: 'Parmesan', amount: 2, unit: 'dl' }], instructions: '1. Dela och banka ut kycklingfiléerna platta.\n2. Panera i ordningen: mjöl, uppvispat ägg, panko.\n3. Hetta upp olja och vitlöksklyftor i en panna. Fritera kycklingen och lägg på galler.\n4. Koka tagliatellen i saltat vatten. Riv parmesan.\n5. Smält smör i en panna, tillsätt 2 dl pastavatten och pastan. Dra av från plattan, rör i parmesan.\n6. Servera pastan med den krispiga kycklingen.' },
          { id: 'pasta_5', name: 'Kycklingpasta med spenat och parmesan', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '20 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 500, unit: 'g' },{ name: 'Smör', amount: 2, unit: 'msk' },{ name: 'Lätt crème fraiche parmesan & vitlök', amount: 2, unit: 'dl' },{ name: 'Babyspenat', amount: 65, unit: 'g' },{ name: 'Pasta (t.ex. rigatoni)', amount: 500, unit: 'g' }], instructions: '1. Koka pastan enligt anvisning.\n2. Skär kycklingen i bitar. Fräs i smör tills genomstekt, salta och peppra.\n3. Rör ner crème fraiche och koka ihop ca 5 min.\n4. Vänd ner spenaten och blanda såsen med pastan. Servera direkt!' },
          { id: 'pasta_6', name: 'Lasagne', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '50 min', ingredients: [{ name: 'Blandfärs', amount: 500, unit: 'g' },{ name: 'Gul lök', amount: 1, unit: 'st' },{ name: 'Krossade tomater', amount: 400, unit: 'g' },{ name: 'Tomatpuré', amount: 2, unit: 'msk' },{ name: 'Lasagneplattor', amount: 9, unit: 'st' },{ name: 'Mjölk', amount: 7, unit: 'dl' },{ name: 'Vetemjöl', amount: 3, unit: 'msk' },{ name: 'Riven ost', amount: 3, unit: 'dl' }], instructions: '1. Sätt ugnen på 225°.\n2. Fräs lök och vitlök i smör. Lägg i färsen och stek.\n3. Tillsätt tomater, puré, oregano och buljong. Koka 5 min.\n4. Sås: Vispa mjöl i hälften av mjölken i en kastrull. Häll i resten och koka upp under vispning i 3 min. Rör ner 2,5 dl ost.\n5. Varva färssås, ostsås och plattor i form. Avsluta med sås och sista osten. Grädda ca 30 min.' },
          { id: 'pasta_7', name: 'Pastagratäng med krämig mozzarella', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '45 min', ingredients: [{ name: 'Kokt pasta', amount: 8, unit: 'dl' },{ name: 'Färskost (Philadelphia)', amount: 200, unit: 'g' },{ name: 'Mozzarella', amount: 1, unit: 'förp' },{ name: 'Blandfärs', amount: 500, unit: 'g' },{ name: 'Matlagningsgrädde', amount: 2, unit: 'dl' },{ name: 'Vispgrädde', amount: 1, unit: 'dl' },{ name: 'Tomatpuré', amount: 2, unit: 'msk' },{ name: 'Körsbärstomater', amount: 10, unit: 'st' }], instructions: '1. Koka pastan. Sätt ugnen på 200°.\n2. Bryn lök, vitlök och köttfärs. Krydda med salt, peppar, basilika, puré och lite sambal.\n3. Ha i grädden och köttbuljong, koka upp.\n4. Rör ihop den varma pastan med färskosten. Blanda sedan med köttfärsröran och bred ut i en ugnsform.\n5. Fördela halverade tomater och mozzarella över. Gratinera tills gyllene.' },
          { id: 'pasta_8', name: 'Stuvade makaroner och köttbullar', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '30 min', ingredients: [{ name: 'Köttbullar', amount: 30, unit: 'st' },{ name: 'Mjölk', amount: 10, unit: 'dl' },{ name: 'Makaroner', amount: 5, unit: 'dl' },{ name: 'Salt', amount: 0.5, unit: 'tsk' }], instructions: '1. Koka upp mjölken i en nonstick kastrull.\n2. Tillsätt makaroner och salt. Koka under omrörning på svag värme ca 25 min tills mjuka.\n3. Smaka av med salt och peppar.\n4. Stek köttbullarna och servera!' },
          { id: 'pasta_9', name: 'Stuvade makaroner och falukorv', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '30 min', ingredients: [{ name: 'Falukorv', amount: 400, unit: 'g' },{ name: 'Mjölk', amount: 10, unit: 'dl' },{ name: 'Makaroner', amount: 5, unit: 'dl' },{ name: 'Salt', amount: 0.5, unit: 'tsk' }], instructions: '1. Koka upp mjölken i en nonstick kastrull.\n2. Tillsätt makaroner och salt. Koka under omrörning på svag värme ca 25 min.\n3. Skär falukorven i bitar och stek.\n4. Servera stuvningen med korven!' },
          { id: 'pasta_10', name: 'TikTok-pasta', protein: 'veg', collection: 'Spaghetti- & pastarätter', time: '25 min', ingredients: [{ name: 'Körsbärstomater', amount: 1, unit: 'förp' },{ name: 'Färsk bladspenat', amount: 1, unit: 'förp' },{ name: 'Vitlöksklyftor', amount: 2, unit: 'st' },{ name: 'Crème fraiche tomat/basilika', amount: 2, unit: 'dl' },{ name: 'Mozzarella', amount: 1, unit: 'st' },{ name: 'Pasta', amount: 400, unit: 'g' }], instructions: '1. Koka pastan enligt anvisning. Spara lite pastavatten.\n2. Dela tomaterna och hetta upp i en stekpanna.\n3. Pressa ner vitlök och lägg i spenaten. Rör runt.\n4. Ha i buljong, crème fraiche, mozzarellan i bitar och pastavattnet. Rör tills osten smält.\n5. Blanda i pastan och krydda!' },
          { id: 'pasta_11', name: 'Nudlar och kycklingwok', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '30 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 600, unit: 'g' },{ name: 'Japansk soja', amount: 4, unit: 'msk' },{ name: 'Äggnudlar', amount: 250, unit: 'g' },{ name: 'Röd paprika', amount: 1, unit: 'st' },{ name: 'Minimajs', amount: 225, unit: 'g' },{ name: 'Sockerärtor', amount: 100, unit: 'g' },{ name: 'Oystersås', amount: 2, unit: 'msk' },{ name: 'Sesamolja', amount: 1, unit: 'tsk' }], instructions: '1. Dela kycklingen och marinera i majsstärkelse, 1 msk soja, chiliflakes och vitlök.\n2. Blanda såsen: 3 msk japansk soja, 1 msk kinesisk soja, oystersås, socker, sesamolja.\n3. Koka nudlarna al dente.\n4. Stek kycklingen på hög värme. Lägg åt sidan.\n5. Woka paprika, majs, sockerärtor. Vänd i kyckling, nudlar och sås. Värm ihop.' },
          { id: 'pasta_12', name: 'Fläskfilé pasta med spenat', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '35 min', ingredients: [{ name: 'Fläskfilé', amount: 500, unit: 'g' },{ name: 'Babyspenat', amount: 120, unit: 'g' },{ name: 'Soltorkade tomater i olja', amount: 8, unit: 'st' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Crème fraîche', amount: 1, unit: 'dl' },{ name: 'Färsk tagliatelle', amount: 400, unit: 'g' }], instructions: '1. Fräs babyspenaten i smör. Lägg undan.\n2. Strimla filén, salta, peppra och stek runt om. Lägg åt sidan.\n3. Häll grädde i samma panna. Tillsätt hackad vitlök, strimlade tomater, crème fraiche, kycklingfond och spenaten. Låt puttra.\n4. Vänd ner köttet och basilika.\n5. Koka tagliatellen och blanda med såsen. Toppa med parmesan.' },
          { id: 'pasta_13', name: 'Pastasallad med kyckling och örtdressing', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '25 min', ingredients: [{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Kycklingbröstfiléer', amount: 4, unit: 'st' },{ name: 'Körsbärstomater', amount: 1, unit: 'ask' },{ name: 'Minimozzarella', amount: 125, unit: 'g' },{ name: 'Crème fraîche', amount: 4, unit: 'dl' },{ name: 'Örter provencale', amount: 2, unit: 'msk' },{ name: 'Citronsaft', amount: 1, unit: 'msk' }], instructions: '1. Koka pastan, sila och låt svalna.\n2. Skiva tomaterna och blanda ner i pastan.\n3. Bryn och genomstek kycklingen i bitar, salta/peppra.\n4. Blanda dressing: crème fraiche, örter, citron, salt, peppar.\n5. Blanda allt i en skål tillsammans med sallad och mozzarella.' },
          { id: 'pasta_14', name: 'Kyckling- och parmesanpasta', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '25 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 4, unit: 'st' },{ name: 'Spaghetti', amount: 400, unit: 'g' },{ name: 'Matlagningsgrädde', amount: 2, unit: 'dl' },{ name: 'Vispgrädde', amount: 1, unit: 'dl' },{ name: 'Parmesan', amount: 1.5, unit: 'dl' },{ name: 'Citronjuice', amount: 1, unit: 'msk' }], instructions: '1. Stek kycklingen, krydda med salt, peppar, paprikapulver och vitlökspulver. Lägg undan.\n2. Använd samma panna: häll i grädde, parmesan, citronjuice. Salta/peppra. Red med lite maizena.\n3. Koka spaghettin.\n4. Häll spaghettin i såsen, blanda i kycklingen och servera med persilja.' },
          { id: 'pasta_15', name: 'Citronpasta', protein: 'veg', collection: 'Spaghetti- & pastarätter', time: '15 min', ingredients: [{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Smör', amount: 25, unit: 'g' },{ name: 'Vitlöksklyfta', amount: 1, unit: 'st' },{ name: 'Vispgrädde', amount: 2.5, unit: 'dl' },{ name: 'Citronskal (finrivet)', amount: 2, unit: 'msk' },{ name: 'Citronjuice', amount: 1, unit: 'msk' },{ name: 'Riven parmesan', amount: 1, unit: 'dl' }], instructions: '1. Bryn smöret. Fräs vitlöken 1 min.\n2. Häll i grädde, citronskal, citronjuice och parmesan. Låt puttra.\n3. Koka pastan al dente.\n4. Vänd ner pastan i såsen. Toppa med extra parmesan och svartpeppar.' },
          { id: 'pasta_16', name: 'Tacopasta', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '20 min', ingredients: [{ name: 'Blandfärs', amount: 500, unit: 'g' },{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Tacokrydda', amount: 1, unit: 'påse' },{ name: 'Crème fraiche', amount: 2.5, unit: 'dl' },{ name: 'Matlagningsgrädde', amount: 2.5, unit: 'dl' },{ name: 'Körsbärstomater', amount: 15, unit: 'st' },{ name: 'Riven ost', amount: 3, unit: 'dl' }], instructions: '1. Stek köttfärs med pressad vitlök. Tillsätt tacokrydda och pyttelite vatten. Stek ihop.\n2. Tillsätt crème fraiche och grädde, puttra några min.\n3. Lägg i hackade tomater och paprikapulver, puttra 3 min.\n4. Koka pastan.\n5. Avsluta såsen med riven ost och persilja. Rör ner pastan!' },
          { id: 'pasta_17', name: "Linguine all'amatriciana", protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '25 min', ingredients: [{ name: 'Linguine', amount: 400, unit: 'g' },{ name: 'Pancetta', amount: 100, unit: 'g' },{ name: 'Vitt vin', amount: 2, unit: 'dl' },{ name: 'Hela tomater på burk', amount: 1, unit: 'burk' },{ name: 'Gul lök', amount: 0.5, unit: 'st' },{ name: 'Pecorinoost', amount: 1, unit: 'dl' }], instructions: '1. Koka linguinen i saltat vatten al dente.\n2. Tärna och bryn pancettan försiktigt i olivolja.\n3. Vänd ner finhackad lök.\n4. Häll i vinet, salta, peppra. Reducera något.\n5. Klipp sönder tomaterna och lägg i pannan. Sjud 3-4 min.\n6. Vänd ner basilika. Servera såsen över pastan med Pecorino.' },
          { id: 'pasta_18', name: 'Pasta med kycklingfärs', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '30 min', ingredients: [{ name: 'Kycklingfärs', amount: 500, unit: 'g' },{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Tomater', amount: 2, unit: 'st' },{ name: 'Tomatpuré', amount: 1, unit: 'msk' },{ name: 'Vispgrädde', amount: 1, unit: 'dl' },{ name: 'Röd chili', amount: 1, unit: 'st' },{ name: 'Citron', amount: 1, unit: 'st' }], instructions: '1. Bryn färsen i olivolja.\n2. Skålla, skala och hacka tomaterna. Koka pastan, spara pastavatten.\n3. Häll färsen i ny panna. Tillsätt vitlök, chili, tomater, puré och lite pastavatten. Fräs några minuter.\n4. Tillsätt citronskal och citronsaft. Koka med basilika.\n5. Tillsätt grädde, koka 1 min. Blanda i pastan och servera med parmesan.' },
          { id: 'pasta_19', name: 'Cacio e peppe', protein: 'veg', collection: 'Spaghetti- & pastarätter', time: '15 min', ingredients: [{ name: 'Pasta', amount: 500, unit: 'g' },{ name: 'Parmesan', amount: 280, unit: 'g' },{ name: 'Pecorino', amount: 320, unit: 'g' },{ name: 'Smör', amount: 4, unit: 'msk' },{ name: 'Svartpeppar (hel)', amount: 2, unit: 'msk' }], instructions: '1. Mortla svartpepparn.\n2. Finriv all ost.\n3. Smält smör, lägg i pepparn och bryn tills smöret slutat bubbla.\n4. Koka pastan al dente i saltat vatten. Spara pastavatten!\n5. Häll 1-2 dl pastavatten i pepparsmöret. Lägg i pastan.\n6. Dra ned värmen, vänd ner osten i omgångar tills det blir en krämig sås.' },
          { id: 'pasta_20', name: 'Krämig kyckling- och chorizopasta', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '25 min', ingredients: [{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Chorizo', amount: 100, unit: 'g' },{ name: 'Kycklinglårfilé', amount: 500, unit: 'g' },{ name: 'Gul lök', amount: 1, unit: 'st' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Tomatpuré', amount: 3, unit: 'msk' },{ name: 'Färsk spenat', amount: 1, unit: 'näve' }], instructions: '1. Koka pastan.\n2. Stek slantad chorizo. Tillsätt lök och kyckling i bitar.\n3. När kycklingen är klar, tillsätt tomatpuré och grädde.\n4. Vänd ner pastan och spenaten.\n5. Smaka av med salt, peppar och toppa med parmesan.' },
          { id: 'pasta_21', name: 'Pestopasta med kyckling', protein: 'kyckling', collection: 'Spaghetti- & pastarätter', time: '20 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 600, unit: 'g' },{ name: 'Pesto', amount: 100, unit: 'g' },{ name: 'Crème fraiche', amount: 2, unit: 'dl' },{ name: 'Vispgrädde', amount: 4, unit: 'dl' },{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Vitlöksklyftor', amount: 2, unit: 'st' }], instructions: '1. Koka pastan.\n2. Tärna och stek kycklingen. Salta och peppra.\n3. Hacka i vitlök. Tillsätt några skedar pesto, grädde och crème fraiche. Koka upp.\n4. Smaka av med mer pesto, chilipulver, salt och peppar.\n5. Blanda ner pasta och parmesan. Servera.' },
          { id: 'pasta_22', name: 'Chorizopasta', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '25 min', ingredients: [{ name: 'Chorizo', amount: 400, unit: 'g' },{ name: 'Krossade tomater', amount: 400, unit: 'g' },{ name: 'Vispgrädde', amount: 2, unit: 'dl' },{ name: 'Gul lök', amount: 1, unit: 'st' },{ name: 'Chili', amount: 0.5, unit: 'st' },{ name: 'Tomatpuré', amount: 1.5, unit: 'msk' },{ name: 'Pasta', amount: 500, unit: 'g' }], instructions: '1. Stek finhackad chili, vitlök och lök i olja.\n2. Slanta chorizon och stek med löken.\n3. Tillsätt puré och en smörklick, stek 2 min.\n4. Häll i tomater, paprikapulver, socker, salt, peppar. Puttra 10 min.\n5. Koka pastan under tiden.\n6. Tillsätt grädde i såsen, koka upp, vänd i pastan.' },
          
          { id: 'potatis_1', name: 'Panerad fisk och potatis med kall sås', protein: 'fisk', collection: 'Potatisrätter', time: '30 min', ingredients: [{ name: 'Panerad fisk', amount: 1, unit: 'förp' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Crème fraiche', amount: 2, unit: 'dl' },{ name: 'Gräddfil', amount: 2, unit: 'dl' },{ name: 'Vitlöksklyftor', amount: 2, unit: 'st' },{ name: 'Citronjuice', amount: 2, unit: 'tsk' },{ name: 'Rödlök', amount: 0.5, unit: 'st' },{ name: 'Majonnäs', amount: 1, unit: 'msk' },{ name: 'Dijonsenap', amount: 1, unit: 'msk' },{ name: 'Dill', amount: 1, unit: 'knippe' }], instructions: '1. Koka potatisen efter anvisningar.\n2. Stek den panerade fisken i smör/olja (eller i ugnen).\n3. Blanda ihop såserna: Fannys sås (1 dl crème fraiche, 1 dl gräddfil, vitlök, citron, salt/peppar, dill) och Jonas sås (1 dl crème fraiche, 1 dl gräddfil, rödlök, majonnäs, senap, dill).\n4. Servera!' },
          { id: 'potatis_2', name: 'Fish and chips', protein: 'fisk', collection: 'Potatisrätter', time: '25 min', ingredients: [{ name: 'Fish and crisp (Findus)', amount: 1, unit: 'förp' },{ name: 'Pommes frites', amount: 1, unit: 'förp' },{ name: 'Remouladsås', amount: 1, unit: 'dl' },{ name: 'Aioli', amount: 1, unit: 'dl' }], instructions: '1. Tillaga fisken och pommes efter anvisning.\n2. Servera med remouladsås och aioli. Salta efter smak.' },
          { id: 'potatis_3', name: 'Falukorv i ugn och mos', protein: 'kött', collection: 'Potatisrätter', time: '40 min', ingredients: [{ name: 'Falukorv', amount: 1, unit: 'st' },{ name: 'Potatis', amount: 15, unit: 'st' },{ name: 'Ketchup', amount: 4, unit: 'msk' },{ name: 'Senap', amount: 2, unit: 'msk' },{ name: 'Rödlök', amount: 0.5, unit: 'st' },{ name: 'Bostongurka', amount: 2, unit: 'msk' },{ name: 'Tomat', amount: 1, unit: 'st' },{ name: 'Riven ost', amount: 1, unit: 'förp' },{ name: 'Mjölk', amount: 1, unit: 'dl' }], instructions: '1. Sätt ugnen på 225 grader.\n2. Skär snitt i korven. Fördela ketchup, senap, lök, bostongurka och tomat i skårorna. Toppa med ost.\n3. In i ugnen ca 30 min.\n4. Koka potatis. Häll av vatten och mosa. Rör i mjölk, salt och peppar.' },
          { id: 'potatis_4', name: 'Kyckling och ugnsrostad potatis', protein: 'kyckling', collection: 'Potatisrätter', time: '45 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 4, unit: 'st' },{ name: 'Potatis', amount: 15, unit: 'st' },{ name: 'Vitlöksklyftor', amount: 2, unit: 'st' },{ name: 'Soja', amount: 1, unit: 'msk' },{ name: 'Honung', amount: 1, unit: 'msk' },{ name: 'Bearnaisesås', amount: 1, unit: 'burk' }], instructions: '1. Sätt ugnen på 225°C. \n2. Dela potatisen, blanda med olja, salt, peppar. Rosta i ugn ca 35 min.\n3. Stek kycklingen med krossad vitlök tills fin färg.\n4. Lägg kycklingen med potatisen i ugnen, pensla med soja och honung, krydda med timjan. Rosta 25 min till.\n5. Servera med bearnaisesås.' },
          { id: 'potatis_5', name: 'Wallenbergare och mos', protein: 'kött', collection: 'Potatisrätter', time: '45 min', ingredients: [{ name: 'Kalvfärs', amount: 500, unit: 'g' },{ name: 'Äggulor', amount: 3, unit: 'st' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Ströbröd', amount: 1.5, unit: 'dl' },{ name: 'Potatis', amount: 15, unit: 'st' },{ name: 'Mjölk', amount: 2, unit: 'dl' },{ name: 'Gröna ärtor', amount: 1, unit: 'förp' },{ name: 'Lingonsylt', amount: 1, unit: 'burk' }], instructions: '1. Blanda kall färs med salt och peppar. Tillsätt äggulor och grädde.\n2. Forma 8 biffar med blöta händer, vänd i ströbröd.\n3. Stek i smör 2 min per sida, sedan in i ugn (100°) tills 65 grader inuti.\n4. Koka potatis, mosa med mjölk och smör. Krydda.\n5. Servera med mos, ärtor, brynt smör och lingon.' },
          { id: 'potatis_6', name: 'Kycklingsbiffar och klyftpotatis med tzatziki', protein: 'kyckling', collection: 'Potatisrätter', time: '40 min', ingredients: [{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Kycklingfärs', amount: 500, unit: 'g' },{ name: 'Fetaost', amount: 1, unit: 'förp' },{ name: 'Ägg', amount: 1, unit: 'st' },{ name: 'Vitlöksklyftor', amount: 2, unit: 'st' },{ name: 'Gurka', amount: 0.5, unit: 'st' },{ name: 'Grekisk yoghurt', amount: 2, unit: 'dl' }], instructions: '1. Sätt ugnen på 225°. Klyfta och rosta potatisen 25-30 min.\n2. Blanda kycklingfärs med smulad fetaost, ägg, riven vitlök och citronskal. Forma till biffar.\n3. Stek biffarna 3-4 min per sida (tills 70° inuti).\n4. Tzatziki: Riv gurkan, salta, krama ur vätska. Blanda med yoghurt och vitlök.' },
          { id: 'potatis_7', name: 'Pytt i panna', protein: 'kött', collection: 'Potatisrätter', time: '25 min', ingredients: [{ name: 'Köttbullar', amount: 1, unit: 'förp' },{ name: 'Korv', amount: 1, unit: 'förp' },{ name: 'Potatis', amount: 10, unit: 'st' },{ name: 'Smör', amount: 2, unit: 'msk' }], instructions: '1. Skär köttbullar på mitten och dela korv i bitar.\n2. Koka potatisen och skär ner den.\n3. Stek allt i smör tills de fått fin färg.\n4. Smaksätt med salt, peppar och dill. Servera ev. med stekt ägg och rödbetor.' },
          { id: 'potatis_8', name: 'Tunnbrödsrulle', protein: 'kött', collection: 'Potatisrätter', time: '30 min', ingredients: [{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Mjölk', amount: 1, unit: 'dl' },{ name: 'Korv', amount: 8, unit: 'st' },{ name: 'Tunnbröd', amount: 4, unit: 'st' },{ name: 'Rostad lök', amount: 1, unit: 'dl' },{ name: 'Skagenröra', amount: 1, unit: 'förp' }], instructions: '1. Koka potatis, häll av och mosa. Rör i mjölk, salt, peppar och dill.\n2. Koka korven.\n3. Fördela mos, korv, rostad lök, ketchup, senap och skagenröra i tunnbröden. Rulla ihop.' },
          { id: 'potatis_9', name: 'Schnitzel och kroketter', protein: 'kött', collection: 'Potatisrätter', time: '25 min', ingredients: [{ name: 'Schnitzel', amount: 1, unit: 'förp' },{ name: 'Potatiskroketter', amount: 1, unit: 'påse' },{ name: 'Bearnaisesås', amount: 1, unit: 'burk' }], instructions: '1. Tillaga schnitzel och potatiskroketter enligt anvisningarna på förpackningarna.\n2. Servera med bearnaisesås.' },
          { id: 'potatis_10', name: 'Fiskpinnar och mos', protein: 'fisk', collection: 'Potatisrätter', time: '25 min', ingredients: [{ name: 'Fiskpinnar', amount: 1, unit: 'förp' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Mjölk', amount: 1, unit: 'dl' },{ name: 'Remouladsås', amount: 1, unit: 'burk' }], instructions: '1. Koka potatis, häll av och mosa. Rör i mjölk, smör, salt och peppar.\n2. Tillaga fiskpinnarna i ugn eller panna.\n3. Servera mos och fiskpinnar med remouladsås.' },
          { id: 'potatis_11', name: 'Stekt falukorv med stuvad spenat', protein: 'kött', collection: 'Potatisrätter', time: '35 min', ingredients: [{ name: 'Falukorv', amount: 500, unit: 'g' },{ name: 'Smör', amount: 2, unit: 'msk' },{ name: 'Vetemjöl', amount: 3, unit: 'msk' },{ name: 'Mjölk', amount: 5, unit: 'dl' },{ name: 'Grov senap', amount: 2, unit: 'msk' },{ name: 'Stuvad spenat (fryst)', amount: 200, unit: 'g' },{ name: 'Potatis', amount: 12, unit: 'st' }], instructions: '1. Koka potatisen.\n2. Senapssås: Fräs smör, pudra över mjöl, vispa i mjölk. Koka upp. Smaksätt med senap, salt och peppar.\n3. Skiva och stek falukorven.\n4. Värm spenaten. Servera korven med sås, spenat och potatis.' },
          { id: 'potatis_12', name: 'Kalops', protein: 'kött', collection: 'Potatisrätter', time: '150 min', ingredients: [{ name: 'Nötkött (bog/högrev)', amount: 1000, unit: 'g' },{ name: 'Morötter', amount: 4, unit: 'st' },{ name: 'Gul lök', amount: 2, unit: 'st' },{ name: 'Lagerblad', amount: 3, unit: 'st' },{ name: 'Kalvfond', amount: 2, unit: 'msk' },{ name: 'Kryddpepparkorn', amount: 3, unit: 'st' },{ name: 'Majsstärkelse', amount: 1.5, unit: 'msk' },{ name: 'Potatis', amount: 12, unit: 'st' }], instructions: '1. Skär köttet i bitar. Bryn i smör i en gryta.\n2. Skär morötter och lök grovt. Tillsätt med lagerblad och kryddpeppar i grytan.\n3. Häll på vatten och fond. Sjud under lock ca 2-2,5 timmar tills mört.\n4. Red med majsstärkelse. Smaka av. Servera med kokt potatis.' },
          { id: 'potatis_13', name: 'Moussaka', protein: 'kött', collection: 'Potatisrätter', time: '60 min', ingredients: [{ name: 'Potatis (kokt)', amount: 10, unit: 'st' },{ name: 'Gul lök', amount: 2, unit: 'st' },{ name: 'Köttfärs', amount: 400, unit: 'g' },{ name: 'Tomatpuré', amount: 2, unit: 'msk' },{ name: 'Vetemjöl', amount: 5, unit: 'msk' },{ name: 'Mjölk', amount: 7, unit: 'dl' },{ name: 'Riven ost', amount: 4, unit: 'dl' }], instructions: '1. Färs: Fräs lök, vitlök och färs. Strö över 1 msk mjöl, späd med buljong och tomatpuré. Koka 10 min.\n2. Ostsås: Fräs smör med 4 msk mjöl, späd med mjölk. Koka 10 min, rör ner ost, salt, peppar.\n3. Skiva kokt potatis. Varva potatis, färs och ostsås i en ugnsform. \n4. Gratinera i ugn (250°) ca 30 min.' },
          { id: 'potatis_14', name: 'Hemmagjorda köttbullar med mos', protein: 'kött', collection: 'Potatisrätter', time: '90 min', ingredients: [{ name: 'Blandfärs', amount: 500, unit: 'g' },{ name: 'Ströbröd', amount: 0.5, unit: 'dl' },{ name: 'Mjölk', amount: 1, unit: 'dl' },{ name: 'Potatis', amount: 600, unit: 'g' },{ name: 'Kalvfond', amount: 5, unit: 'dl' },{ name: 'Vispgrädde', amount: 1, unit: 'dl' },{ name: 'Svartvinbärsgelé', amount: 2, unit: 'msk' }], instructions: '1. Blanda mjölk, ströbröd, ägg och brynt lök. Tillsätt färsen. Forma köttbullar.\n2. Sås: Fräs 1 msk mjöl i smör. Häll i kalvfond, koka. Sila av och smaksätt med gelé och soja.\n3. Mos: Koka potatis, mosa, tillsätt grädde/mjölk och smör.\n4. Stek köttbullarna och servera med mos, brunsås och lingon.' },
          { id: 'potatis_15', name: 'Kokt torsk med äggsås', protein: 'fisk', collection: 'Potatisrätter', time: '30 min', ingredients: [{ name: 'Torskfilé', amount: 600, unit: 'g' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Ägg', amount: 2, unit: 'st' },{ name: 'Mjölk', amount: 3, unit: 'dl' },{ name: 'Vetemjöl', amount: 1.5, unit: 'msk' },{ name: 'Fiskbuljong', amount: 5, unit: 'dl' }], instructions: '1. Hårdkoka äggen, skala, hacka.\n2. Äggsås: Vispa mjöl i mjölk, koka 3 min. Krydda, vänd i ägg och persilja.\n3. Koka upp buljongen, sjud torsken ca 3 min.\n4. Koka potatis. Servera fisken med äggsås och potatis.' },
          { id: 'potatis_16', name: 'Högrevsgryta med potatis', protein: 'kött', collection: 'Potatisrätter', time: '120 min', ingredients: [{ name: 'Högrev', amount: 1200, unit: 'g' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Morötter', amount: 2, unit: 'st' },{ name: 'Rött vin', amount: 5, unit: 'dl' },{ name: 'Sidfläsk', amount: 200, unit: 'g' },{ name: 'Tomatpuré', amount: 4, unit: 'msk' }], instructions: '1. Bryn köttbitar i olja, lägg i gryta.\n2. Fräs grova morötter, lök och vitlök i stekpanna. Tillsätt puré, mjöl och vin. Koka 5 min.\n3. Häll grönsaksröran och kalvfond över köttet, täck med vatten. Puttra 1-2 timmar.\n4. Stek sidfläsk (eller bacon) och tillsätt de sista 20 minuterna.\n5. Servera med potatis.' },
          { id: 'potatis_17', name: 'Köttfärslimpa med brunsås', protein: 'kött', collection: 'Potatisrätter', time: '90 min', ingredients: [{ name: 'Blandfärs', amount: 900, unit: 'g' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Ströbröd', amount: 1, unit: 'dl' },{ name: 'Mjölk', amount: 3, unit: 'dl' },{ name: 'Kalvfond', amount: 4, unit: 'dl' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Svartvinbärsgelé', amount: 2, unit: 'msk' }], instructions: '1. Sätt ugn på 100°. Blanda mjölk, ströbröd. Tillsätt ägg, brynt lök, senap och färs.\n2. Forma till limpa i smord form. Grädda 1,5 h till 72-75° inuti.\n3. Koka potatis och morötter.\n4. Sås: Fräs mjöl i smör, tillsätt buljong, grädde och gelé. Koka 5 min.\n5. Servera limpan med potatis och sås.' },
          { id: 'potatis_18', name: 'Sjömansbiff med potatis', protein: 'kött', collection: 'Potatisrätter', time: '60 min', ingredients: [{ name: 'Rostbiff', amount: 800, unit: 'g' },{ name: 'Fast potatis', amount: 1000, unit: 'g' },{ name: 'Kalvfond', amount: 1, unit: 'liter' },{ name: 'Porteröl', amount: 3, unit: 'dl' },{ name: 'Gul lök', amount: 4, unit: 'st' }], instructions: '1. Skiva och stek rostbiffen i olja efter att du vänt den i mjöl. Lägg åt sidan.\n2. Koka upp fond, porter, kryddor.\n3. Hacka och stek löken gyllenbrun. Stek även skivad potatis lätt.\n4. Varva potatis, kött och lök i en ugnsform. Häll över fond/sky.\n5. In i ugn (160°) i 45 min.' },
          { id: 'potatis_19', name: 'Lapskojs', protein: 'kött', collection: 'Potatisrätter', time: '45 min', ingredients: [{ name: 'Mjölig potatis', amount: 1000, unit: 'g' },{ name: 'Rimmad oxbringa (kokt)', amount: 350, unit: 'g' },{ name: 'Gul lök', amount: 1, unit: 'st' },{ name: 'Smör', amount: 4, unit: 'msk' },{ name: 'Ägg', amount: 4, unit: 'st' }], instructions: '1. Koka potatisen.\n2. Hacka och svetta lök i smör. Lägg i oxbringan (i bitar) och köttsky. Koka tills köttet "kokar sönder" (ca 10 min).\n3. Stompa/pressa potatisen.\n4. Blanda potatis med kött och buljong, rör ner smör.\n5. Servera med stekta ägg och inlagda rödbetor.' },
          { id: 'potatis_20', name: 'Ugnsgrillad kyckling med rostad potatis', protein: 'kyckling', collection: 'Potatisrätter', time: '50 min', ingredients: [{ name: 'Kycklinglårfilé (med skinn)', amount: 800, unit: 'g' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Paprikapulver', amount: 1, unit: 'msk' },{ name: 'Majonnäs', amount: 2, unit: 'dl' },{ name: 'Barbequesås', amount: 2, unit: 'msk' },{ name: 'Crème fraiche', amount: 1, unit: 'dl' }], instructions: '1. Blanda kryddor, soja, olja. Gnid in kycklingen.\n2. Skrubba potatis, rosta i ugn 220° med olja/salt.\n3. Lägg kycklingen över potatisen och tillaga sista 15 min.\n4. Blanda majonnäs, crème fraiche, BBQ-sås, citron och ev grillolja till en kall sås.\n5. Servera.' },
          { id: 'potatis_21', name: 'Krispig panerad kyckling med klyftpotatis', protein: 'kyckling', collection: 'Potatisrätter', time: '45 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 700, unit: 'g' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Panko', amount: 4, unit: 'dl' },{ name: 'Sweet chilisås', amount: 1, unit: 'dl' },{ name: 'Crème fraiche', amount: 5, unit: 'dl' }], instructions: '1. Klyfta potatis och rosta i ugn (225°) ca 25 min.\n2. Banka ut kycklingen. Panera i mjöl, ägg och panko.\n3. Stek i olja tills frasig och genomstekt.\n4. Sås: Blanda crème fraiche och sweet chilisås.\n5. Riv parmesan över kycklingen. Servera.' },
          { id: 'potatis_22', name: 'Smashed vitlökspotatis och valfritt kött', protein: 'kött', collection: 'Potatisrätter', time: '40 min', ingredients: [{ name: 'Potatis', amount: 900, unit: 'g' },{ name: 'Smör', amount: 50, unit: 'g' },{ name: 'Vitlöksklyftor', amount: 5, unit: 'st' },{ name: 'Valfri köttbit (t.ex. ryggbiff)', amount: 4, unit: 'st' },{ name: 'Fetaost', amount: 150, unit: 'g' },{ name: 'Grekisk yoghurt', amount: 1.5, unit: 'dl' },{ name: 'Pesto', amount: 4, unit: 'tsk' }], instructions: '1. Koka potatisen 15 min.\n2. Smält smör, hacka persilja och pressa i vitlök.\n3. Krossa potatisen på en plåt (smashed), pensla med vitlökssmör och rosta på 225° 15 min.\n4. Stek köttet.\n5. Mixa fetaost, yoghurt och färskost till kräm. Toppa med pesto.\n6. Servera ihop.' },
          
          { id: 'ris_1', name: 'Korvstroganoff och ris', protein: 'kött', collection: 'Risrätter', time: '25 min', ingredients: [{ name: 'Falukorv', amount: 400, unit: 'g' },{ name: 'Gul lök', amount: 1, unit: 'st' },{ name: 'Tomatpuré', amount: 3, unit: 'msk' },{ name: 'Matlagningsgrädde', amount: 0.5, unit: 'dl' },{ name: 'Mjölk', amount: 1, unit: 'dl' },{ name: 'Japansk soja', amount: 1, unit: 'msk' },{ name: 'Dijonsenap', amount: 1, unit: 'tsk' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Koka riset enligt anvisning.\n2. Skär korven i stavar. Skala och hacka löken.\n3. Stek korv och lök i olja ca 5 minuter. Tillsätt tomatpuré och fräs någon minut.\n4. Rör ner grädde, mjölk, soja och dijonsenap. Låt sjuda ca 5 minuter.\n5. Smaka av med peppar och ev salt.' },
          { id: 'ris_2', name: 'Kycklingcurry och ris', protein: 'kyckling', collection: 'Risrätter', time: '30 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 600, unit: 'g' },{ name: 'Rödlök', amount: 1, unit: 'st' },{ name: 'Röd paprika', amount: 1, unit: 'st' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Crème fraiche', amount: 1, unit: 'dl' },{ name: 'Curry', amount: 2.5, unit: 'msk' },{ name: 'Kycklingfond', amount: 1, unit: 'msk' },{ name: 'Japansk soja', amount: 0.5, unit: 'msk' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Koka ris enligt anvisning.\n2. Skala och finhacka lök och strimla paprika.\n3. Bryn kycklingstrimlor med curry och paprikapulver. Tillsätt lök och paprika och fräs 2 min.\n4. Tillsätt grädde, crème fraiche, fond och soja. Puttra ca 10 min.\n5. Smaka av med salt och peppar.' },
          { id: 'ris_3', name: 'Krämig kycklinggryta med bacon', protein: 'kyckling', collection: 'Risrätter', time: '40 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 600, unit: 'g' },{ name: 'Bacon', amount: 2, unit: 'förp' },{ name: 'Vitlöksklyfta', amount: 1, unit: 'st' },{ name: 'Kycklingbuljong', amount: 3, unit: 'dl' },{ name: 'Vispgrädde', amount: 2, unit: 'dl' },{ name: 'Parmesanost (riven)', amount: 1, unit: 'dl' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Fräs kycklingen, salta och peppra. Lägg åt sidan.\n2. Skär bacon i bitar och stek krispigt. Lägg åt sidan. Tillsätt vitlök och fräs 1 min.\n3. Tillsätt grädde, buljong, kryddor. Lägg i kycklingen och sjud i 30 min.\n4. Koka ris.\n5. Rör ner parmesan i grytan. Toppa med bacon och servera.' },
          { id: 'ris_4', name: 'Het kycklinggryta med ris', protein: 'kyckling', collection: 'Risrätter', time: '45 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 800, unit: 'g' },{ name: 'Vitlöksklyftor', amount: 1, unit: 'st' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Kycklingfond', amount: 1.5, unit: 'msk' },{ name: 'Sweet chilisås', amount: 0.5, unit: 'dl' },{ name: 'Körsbärstomater', amount: 200, unit: 'g' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Bryn kycklingen med salt och peppar på båda sidor. Lägg över i en gryta.\n2. Tillsätt vitlök, grädde, fond, chilisås, oregano, timjan och lite vatten i stekpannan, koka upp.\n3. Häll såsen över kycklingen och puttra under lock 30-35 min.\n4. Halvera tomaterna och vänd ner på slutet.\n5. Pressa över citron och servera med ris.' },
          { id: 'ris_5', name: 'Cevapcici med tomatsås och ris', protein: 'kött', collection: 'Risrätter', time: '25 min', ingredients: [{ name: 'Cevapcici', amount: 2, unit: 'förp' },{ name: 'Ris', amount: 4, unit: 'port' },{ name: 'Lätt crème fraiche', amount: 2, unit: 'dl' },{ name: 'Majonnäs', amount: 0.5, unit: 'dl' },{ name: 'Krossade tomater', amount: 390, unit: 'g' },{ name: 'Grönsaksbuljongpulver', amount: 1, unit: 'tsk' }], instructions: '1. Tillaga cevapcici och ris efter anvisning.\n2. Vitlökssås: Blanda crème fraiche, majonnäs, 2 pressade vitlöksklyftor, honung, salt och peppar.\n3. Tomatsås: Fräs 1 pressad vitlök och oregano. Rör ner tomater, vatten, buljong och salt. Koka upp.' },
          { id: 'ris_6', name: 'Fläskfilégryta med bacon och ris', protein: 'kött', collection: 'Risrätter', time: '35 min', ingredients: [{ name: 'Fläskfilé', amount: 500, unit: 'g' },{ name: 'Bacon', amount: 2, unit: 'pkt' },{ name: 'Gul lök', amount: 1, unit: 'st' },{ name: 'Champinjoner', amount: 250, unit: 'g' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Mjölk', amount: 2, unit: 'dl' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Strimla fläskfilén och bryn, salta och peppra. Strimla och stek bacon. Lägg åt sidan.\n2. Hacka lök och dela svamp. Bryn i gryta.\n3. Tillsätt tomatpuré, hönsbuljong, grädde, mjölk, soja och senap. Koka upp.\n4. Red ev. med majsstärkelse. Vänd ner kött och bacon och låt bli varmt.\n5. Servera med ris.' },
          { id: 'ris_7', name: 'Kyckling i grönpepparsås', protein: 'kyckling', collection: 'Risrätter', time: '25 min', ingredients: [{ name: 'Grillad kyckling', amount: 1, unit: 'st' },{ name: 'Dijonsenap', amount: 1, unit: 'msk' },{ name: 'Soja', amount: 3, unit: 'msk' },{ name: 'Grönpeppar (mortlad)', amount: 1, unit: 'msk' },{ name: 'Vispgrädde', amount: 2, unit: 'dl' },{ name: 'Crème fraiche', amount: 2, unit: 'dl' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Sätt ugnen på 225 grader.\n2. Rensa kycklingen från ben och lägg köttet i en ugnsform.\n3. Blanda ihop grädde, crème fraiche, senap, soja och grönpeppar i kastrull och koka upp.\n4. Häll över kycklingen och tillaga i ugn ca 15 min.\n5. Servera med ris.' },
          { id: 'ris_8', name: 'Kycklinggratäng med soltorkade tomater', protein: 'kyckling', collection: 'Risrätter', time: '40 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 1000, unit: 'g' },{ name: 'Soltorkade tomater', amount: 0.5, unit: 'burk' },{ name: 'Crème fraiche tomat & basilika', amount: 2.5, unit: 'dl' },{ name: 'Crème fraiche naturell', amount: 2.5, unit: 'dl' },{ name: 'Vispgrädde', amount: 5, unit: 'dl' },{ name: 'Parmesan (riven)', amount: 2, unit: 'dl' },{ name: 'Bacon', amount: 2, unit: 'pkt' }], instructions: '1. Sätt ugnen på 200 grader.\n2. Stek vitlök, tomater och oregano i smör.\n3. Tillsätt båda crème fraiche, grädde, parmesan. Salta/peppra.\n4. Stek lårfiléer till yta (ej genomstekta), skiva och lägg i form. Häll över såsen. Grädda 20 min.\n5. Knaperstek bacon, strö över. Servera med ris.' },
          { id: 'ris_9', name: 'Ulla-britts kyckling i sås', protein: 'kyckling', collection: 'Risrätter', time: '45 min', ingredients: [{ name: 'Kycklingfilé', amount: 1000, unit: 'g' },{ name: 'Grädde', amount: 3, unit: 'dl' },{ name: 'Crème fraiche', amount: 4, unit: 'dl' },{ name: 'Kinesisk soja', amount: 0.5, unit: 'dl' },{ name: 'Sweet chilisås', amount: 0.5, unit: 'dl' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Sätt ugnen på 175 grader.\n2. Skär köttet i bitar och lägg i en ugnsform. Salta och peppra.\n3. Blanda grädde, creme fraiche, soja och sweet chili i en bunke. Häll över köttet.\n4. Tillaga i ugnen i ca 40 min.\n5. Servera med ris.' },
          { id: 'ris_10', name: 'Marry me chicken med risoni', protein: 'kyckling', collection: 'Risrätter', time: '35 min', ingredients: [{ name: 'Kycklingfilé', amount: 4, unit: 'st' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Mjölk', amount: 2, unit: 'dl' },{ name: 'Soltorkade tomater', amount: 12, unit: 'st' },{ name: 'Parmesan (riven)', amount: 3.5, unit: 'dl' },{ name: 'Färsk spenat', amount: 1, unit: 'näve' },{ name: 'Risoni', amount: 4, unit: 'dl' }], instructions: '1. Salta, peppra kycklingen och vänd i mjöl. Stek tills gyllene, ta upp.\n2. Stek hackad vitlök i pannan. Tillsätt grädde, mjölk, tomater, paprika och oregano. Puttra.\n3. Lägg tillbaka kyckling och puttra tills såsen tjocknar. Vänd i parmesan (1.5 dl) och spenat.\n4. Koka risoni i buljong (8 min). Rör ner smör och 2 dl parmesan.\n5. Servera kycklingen över risonin.' },
          { id: 'ris_11', name: 'Honey garlic chicken', protein: 'kyckling', collection: 'Risrätter', time: '20 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 600, unit: 'g' },{ name: 'Majsstärkelse', amount: 1, unit: 'dl' },{ name: 'Vitlöksklyftor', amount: 10, unit: 'st' },{ name: 'Smör', amount: 2, unit: 'msk' },{ name: 'Honung', amount: 3, unit: 'msk' },{ name: 'Soja', amount: 3, unit: 'msk' },{ name: 'Ris', amount: 4, unit: 'port' }], instructions: '1. Salta, peppra kycklingen och vänd i majsstärkelsen.\n2. Stek 4-5 min per sida i smör tills gyllene.\n3. Lyft ur kycklingen. Lägg i honung, soja, vitlök i pannan. Koka 1 min.\n4. Vänd tillbaka kycklingen i såsen.\n5. Servera med ris och salladslök.' },

          // --- DEL 5: ÖVRIGA VARDAGSRÄTTER ---
          { id: 'ovrigt_1', name: 'Äggakaka', protein: 'kött', collection: 'Övriga vardagsrätter', time: '25 min', ingredients: [{ name: 'Rimmat sidfläsk', amount: 400, unit: 'g' },{ name: 'Ägg', amount: 7, unit: 'st' },{ name: 'Vetemjöl', amount: 0.5, unit: 'dl' },{ name: 'Mjölk (3%)', amount: 6, unit: 'dl' },{ name: 'Salt', amount: 1, unit: 'tsk' },{ name: 'Peppar', amount: 1, unit: 'krm' },{ name: 'Smör', amount: 1, unit: 'msk' },{ name: 'Lingonsylt', amount: 2, unit: 'dl' }], instructions: '1. Stek fläsket i en stekpanna. Lyft upp och håll varmt.\n2. Vispa ihop ägg, mjöl, mjölk, salt och peppar till en slät smet. Häll smeten i den varma stekpannan.\n3. Stick med en stekspade så lös smet kan rinna ner och stelna. När kakan stelnat lite på ytan, vänd den med hjälp av ett grytlock eller en tallrik.\n4. Lägg i smör i pannan och låt äggakakan glida tillbaka. Grädda andra sidan tills helt stelnad.\n5. Stjälp upp kakan och servera med fläsket och lingonsylt.' },
          { id: 'ovrigt_2', name: 'Ugnspannkaka', protein: 'kött', collection: 'Övriga vardagsrätter', time: '35 min', ingredients: [{ name: 'Tärnat bacon', amount: 350, unit: 'g' },{ name: 'Ägg', amount: 4, unit: 'st' },{ name: 'Mjölk', amount: 8, unit: 'dl' },{ name: 'Salt', amount: 0.5, unit: 'tsk' },{ name: 'Vetemjöl', amount: 4, unit: 'dl' },{ name: 'Lingonsylt', amount: 2, unit: 'dl' }], instructions: '1. Sätt ugnen på 225°C och sätt in en långpanna.\n2. Häll baconet i långpannan och stek det mitt i ugnen ca 5 minuter.\n3. Vispa ihop ägg, mjölk, salt och vetemjöl till en slät smet.\n4. Häll smeten över baconet i långpannan. Sätt in i ugnen igen och grädda ca 20 minuter.\n5. Servera ugnspannkakan med lingonsylt.' },
          { id: 'ovrigt_3', name: 'Tacopaj', protein: 'kött', collection: 'Övriga vardagsrätter', time: '50 min', ingredients: [{ name: 'Köttfärs', amount: 500, unit: 'g' },{ name: 'Smör', amount: 150, unit: 'g' },{ name: 'Vetemjöl', amount: 3, unit: 'dl' },{ name: 'Tacokrydda', amount: 1, unit: 'påse' },{ name: 'Crème fraiche paprika & chili', amount: 2, unit: 'dl' },{ name: 'Crème fraiche naturell', amount: 2, unit: 'dl' },{ name: 'Körsbärstomater', amount: 250, unit: 'g' },{ name: 'Riven ost', amount: 150, unit: 'g' },{ name: 'Tacochips', amount: 185, unit: 'g' }], instructions: '1. Sätt ugnen på 225°.\n2. Blanda smör, mjöl och lite paprikapulver. Tillsätt lite vatten och arbeta ihop till en deg. Tryck ut i en form och kyl 30 min. Förgrädda i ca 12 min.\n3. Bryn köttfärsen i smör. Tillsätt tacokrydda och vatten, koka 5 min.\n4. Blanda smaksatt och naturell crème fraiche. Halvera tomaterna.\n5. Fyll pajskalet med färs, bred på crème fraiche, täck med tomater och ev lite green chili. Strö över ost.\n6. Grädda ca 25 min. Servera med gräddfil och tacochips.' },
          { id: 'ovrigt_4', name: 'Korv med pommes', protein: 'kött', collection: 'Övriga vardagsrätter', time: '20 min', ingredients: [{ name: 'Korvar', amount: 8, unit: 'st' },{ name: 'Pommes frites', amount: 1, unit: 'förp' },{ name: 'Ketchup', amount: 1, unit: 'dl' },{ name: 'Senap', amount: 0.5, unit: 'dl' }], instructions: '1. Tillaga korv och pommes efter anvisningar.\n2. Servera med ketchup och senap.' },
          { id: 'ovrigt_5', name: 'Korv med bröd', protein: 'kött', collection: 'Övriga vardagsrätter', time: '10 min', ingredients: [{ name: 'Korv', amount: 8, unit: 'st' },{ name: 'Korvbröd', amount: 8, unit: 'st' },{ name: 'Ketchup', amount: 1, unit: 'dl' },{ name: 'Senap', amount: 0.5, unit: 'dl' },{ name: 'Rostad lök', amount: 1, unit: 'dl' }], instructions: '1. Tillaga korv efter anvisningar.\n2. Servera med korvbröd, ketchup, torkad lök och senap.' },
          { id: 'ovrigt_6', name: 'Chicken club sandwich', protein: 'kyckling', collection: 'Övriga vardagsrätter', time: '25 min', ingredients: [{ name: 'Kycklinglårfiléer', amount: 4, unit: 'st' },{ name: 'Formfranska', amount: 6, unit: 'skivor' },{ name: 'Bacon', amount: 1, unit: 'pkt' },{ name: 'Tomater', amount: 2, unit: 'st' },{ name: 'Isbergssallad', amount: 0.5, unit: 'st' },{ name: 'Majonnäs', amount: 2, unit: 'dl' },{ name: 'Dijonsenap', amount: 2, unit: 'msk' },{ name: 'Chips', amount: 1, unit: 'påse' }], instructions: '1. Stek kycklingen i olja och smör, krydda med salt, peppar, krossad vitlök och timjan.\n2. Blanda majonnäs och dijonsenap i en skål.\n3. Rosta brödet i ugnen på 220 grader i 4-5 min (ringla över lite olivolja).\n4. Stek bacon knaprigt.\n5. Montera mackan i flera lager: bröd, majo, sallad, tomat, kyckling, bröd, majo, bacon etc. Sätt grillspett i hörnen, skär bort kanter och skär diagonalt.\n6. Servera med lite lättsaltade chips.' },
          { id: 'ovrigt_7', name: 'Kycklingwrap', protein: 'kyckling', collection: 'Övriga vardagsrätter', time: '15 min', ingredients: [{ name: 'Grillad kyckling', amount: 1, unit: 'st' },{ name: 'Tortillabröd', amount: 4, unit: 'st' },{ name: 'Philadelphiaost naturell', amount: 200, unit: 'g' },{ name: 'Grekisk yoghurt', amount: 1, unit: 'dl' },{ name: 'Pesto', amount: 2, unit: 'msk' },{ name: 'Honung', amount: 1, unit: 'msk' },{ name: 'Lime', amount: 1, unit: 'st' },{ name: 'Färsk bladspenat', amount: 1, unit: 'påse' }], instructions: '1. Blanda philadelphiaost, grekisk yoghurt, pesto, honung, pressad lime, salt & peppar till en röra.\n2. Rensa kycklingen och blanda ner köttet i röran.\n3. Lägg röran på bröden, toppa med bladspenat.\n4. Rulla ihop och stek (valfritt) någon minut på varje sida innan servering.' },
          { id: 'ovrigt_8', name: 'Friterad halloumi & vattenmelonsallad', protein: 'veg', collection: 'Övriga vardagsrätter', time: '20 min', ingredients: [{ name: 'Halloumi', amount: 1, unit: 'förp' },{ name: 'Vattenmelon', amount: 0.5, unit: 'st' },{ name: 'Chili', amount: 1, unit: 'st' },{ name: 'Gurka', amount: 1, unit: 'st' },{ name: 'Salladsmix', amount: 1, unit: 'påse' },{ name: 'Rapsolja (till fritering)', amount: 3, unit: 'dl' }], instructions: '1. Häll upp spenat och salladsmix i en skål.\n2. Skär gurka, chili, vattenmelon och ev lite salladsost i bitar och blanda ner.\n3. Skär halloumin i stavar.\n4. Hetta upp rikligt med rapsolja i en panna. Fritera halloumin tills gyllene.\n5. Toppa salladen med den varma halloumin och ät direkt.' },
          { id: 'ovrigt_9', name: 'Falukorvskebab i bröd', protein: 'kött', collection: 'Övriga vardagsrätter', time: '20 min', ingredients: [{ name: 'Falukorv', amount: 500, unit: 'g' },{ name: 'Kebabkrydda', amount: 2, unit: 'msk' },{ name: 'Libabröd/Tortilla', amount: 4, unit: 'st' },{ name: 'Tomater', amount: 8, unit: 'st' },{ name: 'Gurka', amount: 0.5, unit: 'st' },{ name: 'Feferoni', amount: 5, unit: 'st' },{ name: 'Kebabsås', amount: 1, unit: 'burk' }], instructions: '1. Skala falukorven och hyvla långa remsor med osthyvel.\n2. Lägg korvremsorna i en burk, häll på kebabkrydda, skaka om ordentligt.\n3. Stek korvremsorna i olja tills de får fin färg.\n4. Fyll libabröden med sallad, gurka, tomat, lök och feferoni.\n5. Lägg på falukorvskebaben och toppa med sås.' },
          { id: 'ovrigt_10', name: 'Varm kycklingsallad med ris', protein: 'kyckling', collection: 'Övriga vardagsrätter', time: '30 min', ingredients: [{ name: 'Kycklingbröst', amount: 2, unit: 'st' },{ name: 'Kokt ris', amount: 2, unit: 'dl' },{ name: 'Gröna ärtor', amount: 1, unit: 'dl' },{ name: 'Tomater', amount: 2, unit: 'st' },{ name: 'Röd paprika', amount: 1, unit: 'st' },{ name: 'Isbergssallad', amount: 0.5, unit: 'st' },{ name: 'Majonnäs', amount: 1, unit: 'dl' },{ name: 'Curry', amount: 0.5, unit: 'msk' }], instructions: '1. Koka ris. Tina ärtor.\n2. Krydda och stek kycklingen (12-15 min).\n3. Dressing: Värm upp rapsolja och curry 1 minut. Blanda majonnäs, vitvinsvinäger, olivolja, citron, salt/peppar i en skål. Rör ner curryoljan.\n4. Hacka alla grönsaker. Blanda grönsaker och ris med dressingen när kycklingen är klar.\n5. Skiva kycklingen och lägg ovanpå salladen.' },
          { id: 'ovrigt_11', name: 'Frasiga chicken nuggets', protein: 'kyckling', collection: 'Övriga vardagsrätter', time: '35 min', ingredients: [{ name: 'Kycklinglårfilé', amount: 700, unit: 'g' },{ name: 'Vetemjöl', amount: 1.5, unit: 'dl' },{ name: 'Ägg', amount: 3, unit: 'st' },{ name: 'Cornflakes', amount: 1, unit: 'liter' },{ name: 'Pommes frites', amount: 800, unit: 'g' },{ name: 'Ketchup', amount: 1.5, unit: 'dl' },{ name: 'Sweet chilisås', amount: 0.5, unit: 'dl' },{ name: 'Majonnäs', amount: 2, unit: 'dl' }], instructions: '1. Tillaga pommes.\n2. Krossa cornflakes i en plastpåse med kavel.\n3. Skär kycklingen i bitar. Salta och peppra.\n4. Panera i ordningen mjöl, ägg, cornflakeskross.\n5. Stek nuggets i rikligt med olja tills genomstekta och gyllene.\n6. Rör ihop dippsåser (en med majo/vitlök, en med ketchup/chili) och servera allt tillsammans.' },
          { id: 'ovrigt_12', name: 'Minicalzones', protein: 'kött', collection: 'Övriga vardagsrätter', time: '25 min', ingredients: [{ name: 'Pizzakit', amount: 1, unit: 'förp' },{ name: 'Ägg', amount: 1, unit: 'st' },{ name: 'Riven ost', amount: 2, unit: 'dl' },{ name: 'Valfri fyllning (skinka/salami)', amount: 200, unit: 'g' },{ name: 'Pizzakrydda', amount: 1, unit: 'msk' }], instructions: '1. Sätt ugnen på 200 grader.\n2. Dela pizzadegen i sex rutor. Bred på tomatsås i mitten av varje ruta.\n3. Lägg på fyllning och riven ost, toppa med krydda.\n4. Vik upp alla kanter mot mitten (så det blir små "paket") och pensla med ägg.\n5. Grädda 15-20 minuter tills de fått fin färg.' },

          // --- DEL 6: HELGMAT ---
          { id: 'helg_1', name: 'Kronärtskockspasta', protein: 'veg', collection: 'Helgmat', time: '25 min', ingredients: [{ name: 'Pasta', amount: 300, unit: 'g' },{ name: 'Kronärtskockshjärtan', amount: 390, unit: 'g' },{ name: 'Smör', amount: 125, unit: 'g' },{ name: 'Vitlöksklyftor', amount: 5, unit: 'st' },{ name: 'Citron', amount: 0.5, unit: 'st' },{ name: 'Parmesanost (riven)', amount: 2, unit: 'dl' }], instructions: '1. Koka pasta i redigt saltat vatten. Smält smöret.\n2. Skala och hacka vitlöksklyftorna. Låt puttra på svag värme i smöret.\n3. Mixa kronärtskockorna och blanda ner i smöret. Pressa i citronsaft, krydda med salt och peppar.\n4. Blanda ner pastan i såsen och späd med ca 2 dl pastavatten.\n5. Toppa med generöst med parmesan.' },
          { id: 'helg_2', name: 'Salsicciapasta', protein: 'kött', collection: 'Helgmat', time: '30 min', ingredients: [{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Färsk salsiccia', amount: 320, unit: 'g' },{ name: 'Röd chili', amount: 1, unit: 'st' },{ name: 'Gul lök', amount: 0.5, unit: 'st' },{ name: 'Tomater', amount: 2, unit: 'st' },{ name: 'Vitt vin', amount: 1, unit: 'dl' },{ name: 'Pecorinoost', amount: 2, unit: 'dl' }], instructions: '1. Koka pastan al dente.\n2. Bryt salsiccian i bitar och stek i olivolja.\n3. Tillsätt hackad lök, vitlök och chili.\n4. Skålla och tärna tomaterna, ha ner i pannan.\n5. Tillsätt vitt vin, salt och peppar.\n6. Vänd ner pastan, dra av från värmen och rör ner pecorino och persilja.' },
          { id: 'helg_3', name: 'Hemmagjord pizza med Milano-skinka', protein: 'kött', collection: 'Helgmat', time: '25 min', ingredients: [{ name: 'Pizzadeg', amount: 1, unit: 'sats' },{ name: 'Milanoskinka', amount: 150, unit: 'g' },{ name: 'Pizzasås', amount: 1, unit: 'burk' },{ name: 'Riven ost', amount: 3, unit: 'dl' },{ name: 'Ruccola', amount: 1, unit: 'näve' }], instructions: '1. Värm ugnen till högsta värme med en pizzasten.\n2. Baka ut degen.\n3. Bred på tomatsås, skinka och toppa med ost.\n4. Grädda 5-10 min.\n5. Toppa med ruccola innan servering.' },
          { id: 'helg_4', name: 'Högrevsburgare och pommes', protein: 'kött', collection: 'Helgmat', time: '30 min', ingredients: [{ name: 'Högrevsfärs', amount: 500, unit: 'g' },{ name: 'Hamburgerbröd', amount: 4, unit: 'st' },{ name: 'Hamburgerost', amount: 8, unit: 'skivor' },{ name: 'Pommes frites', amount: 1, unit: 'förp' },{ name: 'Majonnäs', amount: 1.5, unit: 'dl' },{ name: 'Sriracha', amount: 1, unit: 'msk' }], instructions: '1. Rulla färsen till 4 bollar. Pressa ut i pannan och stek (smashburgare).\n2. Salta och peppra. Lägg på ost på slutet så den smälter.\n3. Tillaga pommes frites.\n4. Blanda majonnäs och sriracha till sås.\n5. Montera burgarna med bröd, sallad, lök, kött och sås.' },
          { id: 'helg_5', name: 'Tacos', protein: 'kött', collection: 'Helgmat', time: '25 min', ingredients: [{ name: 'Blandfärs', amount: 500, unit: 'g' },{ name: 'Tacokrydda', amount: 1, unit: 'påse' },{ name: 'Tortillabröd', amount: 8, unit: 'st' },{ name: 'Riven ost', amount: 1, unit: 'påse' },{ name: 'Gräddfil', amount: 2, unit: 'dl' },{ name: 'Tacochips', amount: 1, unit: 'påse' }], instructions: '1. Hacka grönsaker (gurka, lök, sallad).\n2. Stek färsen, krydda med tacokrydda och vatten, låt koka ihop.\n3. Värm tortillabröden.\n4. Servera färsen i bröden med grönsaker, ost, tacosås och gräddfil.' },
          { id: 'helg_6', name: 'Ugnsbakad potatis med valfri röra', protein: 'fisk', collection: 'Helgmat', time: '60 min', ingredients: [{ name: 'Bakpotatis', amount: 4, unit: 'st' },{ name: 'Tonfisk (i vatten)', amount: 1, unit: 'burk' },{ name: 'Ägg', amount: 2, unit: 'st' },{ name: 'Crème fraiche', amount: 3, unit: 'dl' },{ name: 'Bacon', amount: 2, unit: 'förp' },{ name: 'Skagenröra', amount: 1, unit: 'förp' }], instructions: '1. Sätt ugnen på 225°. Stick hål i potatisarna och baka dem mjuka, 45-60 min.\n2. Koka äggen och hacka dem. Blanda med tonfisk och crème fraiche.\n3. Stek baconet knaprigt.\n4. Skär ett kryss i potatisarna och servera med tonfiskröra, skagenröra, bacon, smör och ost.' },
          { id: 'helg_7', name: 'Lövbiffspasta', protein: 'kött', collection: 'Helgmat', time: '25 min', ingredients: [{ name: 'Färsk tagliatelle', amount: 400, unit: 'g' },{ name: 'Lövbiff', amount: 350, unit: 'g' },{ name: 'Gul lök', amount: 0.5, unit: 'st' },{ name: 'Crème fraiche', amount: 3, unit: 'dl' },{ name: 'Vispgrädde', amount: 2, unit: 'dl' },{ name: 'Kalvfond', amount: 1, unit: 'msk' },{ name: 'Parmesan', amount: 2, unit: 'dl' }], instructions: '1. Strimla lövbiffen, salta och peppra.\n2. Fräs skivad lök och vitlök. Tillsätt crème fraiche, grädde och fond. Puttra några min.\n3. Koka pastan.\n4. Stek lövbiffen snabbt på hög värme.\n5. Blanda lövbiff och pasta i såsen. Toppa med parmesan.' },
          { id: 'helg_8', name: 'Köttbit och potatisgratäng med sås', protein: 'kött', collection: 'Helgmat', time: '35 min', ingredients: [{ name: 'Valfri köttbit', amount: 4, unit: 'st' },{ name: 'Potatisgratäng (färdig)', amount: 1, unit: 'påse' },{ name: 'Gurka', amount: 0.5, unit: 'st' },{ name: 'Isbergssallad', amount: 0.5, unit: 'st' },{ name: 'Salladsost', amount: 150, unit: 'g' },{ name: 'Valfri sås', amount: 2, unit: 'dl' }], instructions: '1. Tillaga köttet och potatisgratängen efter anvisningar. Krydda köttet med salt och peppar.\n2. Hacka grönsaker och blanda till en sallad med salladsost.\n3. Servera köttet med gratäng, sallad och valfri sås.' },
          { id: 'helg_9', name: 'Grekisk pytt i panna', protein: 'kött', collection: 'Helgmat', time: '45 min', ingredients: [{ name: 'Fläskfilé', amount: 600, unit: 'g' },{ name: 'Potatis', amount: 6, unit: 'st' },{ name: 'Paprika (röd/gul)', amount: 2, unit: 'st' },{ name: 'Körsbärstomater', amount: 10, unit: 'st' },{ name: 'Fetaost', amount: 150, unit: 'g' },{ name: 'Crème fraiche', amount: 2, unit: 'dl' },{ name: 'Majonnäs', amount: 2, unit: 'msk' }], instructions: '1. Marinera fläskfilébitar i olja, soja, ingefära, vitlök och sambal.\n2. Skiva och rosta potatisen på en plåt (200°) i 20 min.\n3. Lägg kött, lök, paprika och tomater över potatisen. Smula över fetaost.\n4. Rosta i ugn 20-30 min tills köttet är klart.\n5. Blanda crème fraiche och majonnäs till sås.' },
          { id: 'helg_10', name: 'Kycklingenchiladas', protein: 'kyckling', collection: 'Helgmat', time: '35 min', ingredients: [{ name: 'Kycklingfilé', amount: 600, unit: 'g' },{ name: 'Gul lök', amount: 1, unit: 'st' },{ name: 'Sambal oelek', amount: 1, unit: 'tsk' },{ name: 'Crème fraiche', amount: 2, unit: 'dl' },{ name: 'Tortillabröd', amount: 8, unit: 'st' },{ name: 'Riven ost', amount: 2, unit: 'dl' }], instructions: '1. Sätt ugnen på 225 grader.\n2. Strimla kyckling, hacka lök och bryn i panna.\n3. Krydda med salt och sambal. Rör ner crème fraiche och koka ihop.\n4. Fördela röran i bröden, rulla ihop och lägg i en form.\n5. Strö över ost och gratinera i 10-15 min.' },
          { id: 'helg_11', name: 'Vodkapasta', protein: 'kött', collection: 'Helgmat', time: '30 min', ingredients: [{ name: 'Pasta', amount: 400, unit: 'g' },{ name: 'Pancetta', amount: 200, unit: 'g' },{ name: 'Vodka', amount: 1, unit: 'dl' },{ name: 'Tomatpuré', amount: 4, unit: 'msk' },{ name: 'Vispgrädde', amount: 4, unit: 'dl' },{ name: 'Riven parmesanost', amount: 2, unit: 'dl' },{ name: 'Persilja', amount: 1, unit: 'kruka' }], instructions: '1. Fräs pancetta, vitlök och chiliflakes tills gyllene.\n2. Häll i vodkan och koka bort alkoholen (ca 1 min).\n3. Tillsätt tomatpuré och fräs 1 min, häll sedan i grädden. Koka 5 min.\n4. Koka pastan. Blanda ner pastan i såsen.\n5. Rör ner parmesan och persilja. Servera direkt.' },
          { id: 'helg_12', name: 'Pulled pork', protein: 'kött', collection: 'Helgmat', time: '5 tim', ingredients: [{ name: 'Fläskkarré (benfri)', amount: 1500, unit: 'g' },{ name: 'Gula lökar', amount: 2, unit: 'st' },{ name: 'Vitlök', amount: 1, unit: 'hel' },{ name: 'BBQ-sås (Hickory)', amount: 1, unit: 'flaska' },{ name: 'Tortillabröd', amount: 8, unit: 'st' },{ name: 'Gräddfil', amount: 2, unit: 'dl' }], instructions: '1. Sätt ugnen på 125°C. Krydda köttet med salt/peppar.\n2. Lägg köttet i en ugnssäker gryta. Klyfta lök och vitlök och lägg runt.\n3. Häll över BBQ-såsen. Sätt på lock och tillaga i ugnen i 4-5 timmar.\n4. Dra isär köttet med gafflar.\n5. Servera med bröd, gräddfil och en egen tomatsalsa.' },
          { id: 'helg_13', name: 'Porterstek och pressad potatis', protein: 'kött', collection: 'Helgmat', time: '2 tim', ingredients: [{ name: 'Fransyska', amount: 1500, unit: 'g' },{ name: 'Porteröl', amount: 2, unit: 'flaskor' },{ name: 'Svartvinbärssaft', amount: 1, unit: 'dl' },{ name: 'Kinesisk soja', amount: 0.5, unit: 'dl' },{ name: 'Vispgrädde', amount: 3, unit: 'dl' },{ name: 'Potatis', amount: 1500, unit: 'g' }], instructions: '1. Koka upp porter, saft, soja, lök och kryddor i en gryta. Lägg ner köttet och sjud 90 min (75° innertemp).\n2. Ta upp köttet och låt vila.\n3. Sila 6 dl sky, tillsätt grädde och koka 8 min. Red med majsstärkelse.\n4. Koka och pressa potatisen.\n5. Servera köttet i skivor med sås och pressad potatis.' },
          { id: 'helg_14', name: 'Caesarsallad', protein: 'kyckling', collection: 'Helgmat', time: '30 min', ingredients: [{ name: 'Romansallad', amount: 1, unit: 'huvud' },{ name: 'Krutonger', amount: 0.5, unit: 'pkt' },{ name: 'Bacon', amount: 2, unit: 'pkt' },{ name: 'Kycklingfiléer', amount: 4, unit: 'st' },{ name: 'Parmesan', amount: 1.5, unit: 'dl' },{ name: 'Caesardressing', amount: 1, unit: 'dl' }], instructions: '1. Banka ut kycklingen, stek med salt och rosmarin.\n2. Stek bacon knaprigt.\n3. Rosta ev krutongerna i ugn med lite olja.\n4. Skölj och riv salladen, blanda med lite dressing.\n5. Fördela kyckling, bacon och krutonger över salladen. Toppa med mer parmesan och dressing.' },
          { id: 'helg_15', name: 'Rostbiff och färskpotatissallad', protein: 'kött', collection: 'Helgmat', time: '10 min', ingredients: [{ name: 'Rostbiff', amount: 1000, unit: 'g' },{ name: 'Potatissallad', amount: 1, unit: 'förp' },{ name: 'Valfri sås (t.ex. bearnaise)', amount: 2, unit: 'dl' },{ name: 'Rostad lök', amount: 1, unit: 'dl' }], instructions: '1. Lägg upp den kalla rostbiffen och potatissalladen.\n2. Toppa med rostad lök och servera med en god sås.' },
          { id: 'helg_16', name: 'Kycklingkebab och pitabröd', protein: 'kyckling', collection: 'Helgmat', time: '15 min', ingredients: [{ name: 'Kycklingkebab', amount: 1, unit: 'påse' },{ name: 'Pitabröd', amount: 8, unit: 'st' },{ name: 'Riven ost', amount: 2, unit: 'dl' },{ name: 'Gurka', amount: 0.5, unit: 'st' },{ name: 'Rödlök', amount: 0.5, unit: 'st' },{ name: 'Kebabsås', amount: 1, unit: 'dl' }], instructions: '1. Stek kycklingkebaben i en stekpanna.\n2. Värm pitabröden enligt anvisningarna.\n3. Hacka grönsakerna.\n4. Fyll bröden med kebab, grönsaker, ost och sås.' },
          { id: 'helg_17', name: 'Fläskfilé med hasselbackspotatis', protein: 'kött', collection: 'Helgmat', time: '60 min', ingredients: [{ name: 'Fläskfilé', amount: 700, unit: 'g' },{ name: 'Soja', amount: 2, unit: 'msk' },{ name: 'Honung', amount: 2, unit: 'msk' },{ name: 'Potatis', amount: 12, unit: 'st' },{ name: 'Smör', amount: 3, unit: 'msk' },{ name: 'Ströbröd', amount: 0.5, unit: 'dl' },{ name: 'Bearnaisesås', amount: 2, unit: 'dl' }], instructions: '1. Marinera fläskfilén i soja, honung, salt, vitlök och peppar i minst 30 min.\n2. Sätt ugnen på 225°. Skär potatisarna i tunna skivor, ej helt igenom. Pensla med smör, in i ugn 20 min. Pensla igen, strö på ströbröd, in 20 min till.\n3. Bryn köttet, kör i ugn (200°) till 65° inuti.\n4. Servera med sallad och bearnaise.' },
          { id: 'helg_18', name: 'Oxfilépasta', protein: 'kött', collection: 'Helgmat', time: '30 min', ingredients: [{ name: 'Pasta (Mezze maniche)', amount: 400, unit: 'g' },{ name: 'Gul lök', amount: 0.5, unit: 'st' },{ name: 'Piri-piri/chili', amount: 1, unit: 'st' },{ name: 'Vitt vin', amount: 1, unit: 'dl' },{ name: 'Vispgrädde', amount: 2, unit: 'dl' },{ name: 'Parmesan', amount: 100, unit: 'g' },{ name: 'Oxfilé', amount: 300, unit: 'g' }], instructions: '1. Koka pastan al dente.\n2. Fräs lök, vitlök och chili i olivolja.\n3. Tillsätt vin och grädde, puttra lätt.\n4. Skär oxfilén och stek snabbt i en egen panna.\n5. Blanda pastan med såsen, rör ner riven parmesan.\n6. Vänd ner oxfilén och all steksky i pastan. Servera!' },
          { id: 'helg_19', name: 'Fläskkarré med pommes och tzatziki', protein: 'kött', collection: 'Helgmat', time: '45 min', ingredients: [{ name: 'Fläskkarré (skivad)', amount: 500, unit: 'g' },{ name: 'Pitabröd', amount: 8, unit: 'st' },{ name: 'Grekisk yoghurt', amount: 3, unit: 'dl' },{ name: 'Gurka', amount: 0.5, unit: 'st' },{ name: 'Pommes frites', amount: 600, unit: 'g' },{ name: 'Ajvar relish', amount: 4, unit: 'msk' }], instructions: '1. Pensla karrén med olja, citronskal, timjan och oregano. Marinera 20 min.\n2. Tillaga pommes.\n3. Tzatziki: Riv och krama ur gurkan, blanda med yoghurt och vitlök.\n4. Grilla/stek köttet och skiva det tunt.\n5. Fyll pitabröd med tzatziki, ajvar, kött, sallad och pommes.' },
          { id: 'helg_20', name: 'Vodkapasta med salsiccia', protein: 'kött', collection: 'Helgmat', time: '25 min', ingredients: [{ name: 'Salsiccia', amount: 500, unit: 'g' },{ name: 'Tomatpuré', amount: 6, unit: 'msk' },{ name: 'Vodka', amount: 8, unit: 'cl' },{ name: 'Parmesan', amount: 4, unit: 'dl' },{ name: 'Pasta', amount: 500, unit: 'g' },{ name: 'Färsk basilika', amount: 1, unit: 'kruka' }], instructions: '1. Koka pastan och spara 3-4 dl pastavatten.\n2. Kläm ur salsiccian och fräs tills brynt. Tillsätt tomatpuré och stek ur.\n3. Häll i vodka och koka bort alkoholen.\n4. Tillsätt pastavatten, pasta och parmesan. Rör till en krämig sås.\n5. Toppa med extra parmesan och basilika.' },
          { id: 'helg_21', name: 'Tagliata - köttbit med parmesanpotatis', protein: 'kött', collection: 'Helgmat', time: '45 min', ingredients: [{ name: 'Delikatesspotatis', amount: 800, unit: 'g' },{ name: 'Parmesanost', amount: 3, unit: 'dl' },{ name: 'Majonnäs', amount: 2, unit: 'dl' },{ name: 'Tryffelolja', amount: 1, unit: 'tsk' },{ name: 'Ryggbiff/entrecote', amount: 700, unit: 'g' },{ name: 'Balsamvinäger', amount: 2, unit: 'msk' },{ name: 'Ruccola', amount: 4, unit: 'nävar' }], instructions: '1. Sätt ugnen på 225°. Halvera potatis och snitta ytan. Strö ost på en plåt, lägg potatisen ovanpå. Rosta 35-40 min.\n2. Blanda majonnäs och tryffelolja.\n3. Stek köttet på hög värme till önskad stekgrad (ca 52° inuti). Låt vila och skiva upp.\n4. Lägg ruccola på ett fat, klicka på tryffelmajo, lägg på kött, ringla över balsamvinäger och toppa med hyvlad ost. Servera med potatisen.' }
        ];

        export default function App() {
          const [activeTab, setActiveTab] = useState('recipes'); 
          const [toastMessage, setToastMessage] = useState(null);
          
          const [user, setUser] = useState(null);
          const [isDbLoaded, setIsDbLoaded] = useState(false);

          // Familjedelning & Lås-funktion
          const [householdId, setHouseholdId] = useState(() => localStorage.getItem('smartMatsedel_householdId') || '');
          const [showShareModal, setShowShareModal] = useState(false);
          const [isPlanLocked, setIsPlanLocked] = useState(() => localStorage.getItem('smartMatsedel_planLocked') === 'true');
          
          const [deferredPrompt, setDeferredPrompt] = useState(null);
          const [isIOS, setIsIOS] = useState(false);
          const [isStandalone, setIsStandalone] = useState(false);

          const [inspirationQuery, setInspirationQuery] = useState('');
          const [isGeneratingInspiration, setIsGeneratingInspiration] = useState(false);
          const [inspiredRecipe, setInspiredRecipe] = useState(null);
          
          const [recipes, setRecipes] = useState(() => {
            const isCleared = localStorage.getItem('smartMatsedel_cleared_v29');
            if (!isCleared) {
              localStorage.removeItem('smartMatsedel_recipes');
              localStorage.removeItem('smartMatsedel_mealPlan');
              localStorage.removeItem('smartMatsedel_planType');
              localStorage.removeItem('smartMatsedel_checkedListItems');
              localStorage.setItem('smartMatsedel_cleared_v29', 'true');
              return DEFAULT_RECIPES;
            }
            const saved = localStorage.getItem('smartMatsedel_recipes');
            return saved ? JSON.parse(saved) : DEFAULT_RECIPES;
          });

          const [planType, setPlanType] = useState(() => localStorage.getItem('smartMatsedel_planType') || 'week'); 
          const [mealPlan, setMealPlan] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_mealPlan');
            return saved ? JSON.parse(saved) : [];
          });
          const [checkedListItems, setCheckedListItems] = useState(() => {
            const saved = localStorage.getItem('smartMatsedel_checkedListItems');
            return saved ? JSON.parse(saved) : {};
          });

          const [selectedCollection, setSelectedCollection] = useState('Alla');
          const [selectedRecipeId, setSelectedRecipeId] = useState(null);
          
          const [showAddModal, setShowAddModal] = useState(false);
          const [isUploadingPdf, setIsUploadingPdf] = useState(false);
          const fileInputRef = useRef(null);

          useEffect(() => {
            if (!householdId) {
              const newId = Math.random().toString(36).substring(2, 8).toUpperCase();
              setHouseholdId(newId);
              localStorage.setItem('smartMatsedel_householdId', newId);
            }
          }, [householdId]);

          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch(e) { console.error("Auth error:", e); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          // Realtids-synkning med Firebase (HARD SYNC)
          useEffect(() => {
            if (!user || !db || !householdId) return;
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'households', householdId);
            const unsubscribe = onSnapshot(docRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                // Ta in data oavsett .length (om en array blivit rensad så töms den nu lokalt)
                if (data.recipes) setRecipes(data.recipes);
                if (data.mealPlan) setMealPlan(data.mealPlan);
                if (data.planType) setPlanType(data.planType);
                if (data.checkedListItems) setCheckedListItems(data.checkedListItems);
                if (data.isPlanLocked !== undefined) setIsPlanLocked(data.isPlanLocked);
              } else {
                setDoc(docRef, { 
                  recipes, mealPlan, planType, checkedListItems, isPlanLocked 
                }, { merge: true }).catch(console.error);
              }
              setIsDbLoaded(true);
            }, (err) => {
              console.error("Firestore error:", err);
              setIsDbLoaded(true);
            });

            return () => unsubscribe();
          }, [user, householdId]);

          const updateDb = async (updates) => {
            if (!user || !db || !householdId) return;
            try {
              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'households', householdId);
              await setDoc(docRef, updates, { merge: true });
            } catch (err) {
              console.error("DB Save Error:", err);
            }
          };

          useEffect(() => { localStorage.setItem('smartMatsedel_recipes', JSON.stringify(recipes)); }, [recipes]);
          useEffect(() => { localStorage.setItem('smartMatsedel_mealPlan', JSON.stringify(mealPlan)); }, [mealPlan]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planType', planType); }, [planType]);
          useEffect(() => { localStorage.setItem('smartMatsedel_checkedListItems', JSON.stringify(checkedListItems)); }, [checkedListItems]);
          useEffect(() => { localStorage.setItem('smartMatsedel_planLocked', isPlanLocked); }, [isPlanLocked]);

          useEffect(() => {
            const ios = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            setIsIOS(ios);
            const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            setIsStandalone(standalone);

            const handleBeforeInstallPrompt = (e) => {
              e.preventDefault();
              setDeferredPrompt(e);
            };
            window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
          }, []);

          const installApp = async () => {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              if (outcome === 'accepted') setDeferredPrompt(null);
            } else {
              if (isIOS) {
                showToast("På iPhone: Tryck på 'Dela'-ikonen i botten (fyrkant med pil) och välj 'Lägg till på hemskärmen'.");
              } else {
                showToast("På Android: Tryck på webbläsarens meny (tre prickar) och välj 'Lägg till på startskärmen'.");
              }
            }
          };

          const showToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(null), 4000);
          };

          const generatePlan = (type, availableRecipes = recipes) => {
            if (availableRecipes.length === 0) {
                showToast("Du måste lägga till minst ett recept.");
                setActiveTab('recipes');
                return;
            }

            const numDays = type === 'week' ? 7 : 28;
            const newPlan = [];
            
            for (let i = 0; i < numDays; i++) {
              const targetProtein = CATEGORY_CYCLE[i % CATEGORY_CYCLE.length]; 
              let candidates = availableRecipes.filter(r => r.protein === targetProtein);
              if (candidates.length === 0) candidates = availableRecipes;

              const randomIdx = Math.floor(Math.random() * candidates.length);
              newPlan.push({
                dayIndex: i,
                dayName: DAYS[i % 7],
                weekNumber: Math.floor(i / 7) + 1,
                recipe: candidates[randomIdx]
              });
            }

            setMealPlan(newPlan);
            setPlanType(type);
            setCheckedListItems({});
            setIsPlanLocked(false);
            updateDb({ mealPlan: newPlan, planType: type, checkedListItems: {}, isPlanLocked: false });
          };

          const toggleLock = () => {
            const newState = !isPlanLocked;
            setIsPlanLocked(newState);
            updateDb({ isPlanLocked: newState });
            showToast(newState ? "Matsedeln är nu låst för hela hushållet! 🔒" : "Matsedeln är nu upplåst! 🔓");
          };

          // Auto-generera om databasen är tom och vi saknar lokal data.
          useEffect(() => {
            if (isDbLoaded && mealPlan.length === 0 && recipes.length > 0) {
              generatePlan('week', recipes);
            }
          }, [isDbLoaded, recipes, mealPlan.length]);

          const swapDayRecipe = (index) => {
            if (recipes.length === 0) return;
            
            const currentPlan = [...mealPlan];
            const targetDay = { ...currentPlan[index] }; 
            const currentRecipeId = targetDay.recipe.id;
            
            let candidates = recipes.filter(r => r.protein === targetDay.recipe.protein && r.id !== currentRecipeId);
            if (candidates.length === 0) candidates = recipes.filter(r => r.id !== currentRecipeId);
            if (candidates.length === 0) candidates = recipes;

            const randomIdx = Math.floor(Math.random() * candidates.length);
            targetDay.recipe = candidates[randomIdx];
            currentPlan[index] = targetDay;
            
            setMealPlan(currentPlan);
            updateDb({ mealPlan: currentPlan });
          };

          const deleteRecipe = (id) => {
            const newRecipes = recipes.filter(r => r.id !== id);
            setRecipes(newRecipes);
            updateDb({ recipes: newRecipes });
            showToast("Receptet togs bort.");
          };

          const fetchWithBackoff = async (url, options, maxRetries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error!`);
                return await response.json();
              } catch (error) {
                if (i === maxRetries - 1) throw error;
                await new Promise(res => setTimeout(res, delays[i]));
              }
            }
          };

          const handlePdfUpload = async (event) => {
            const file = event.target.files?.[0];
            if (!file) return;
            if (file.type !== 'application/pdf') { showToast("Endast PDF-filer stöds."); return; }

            setIsUploadingPdf(true);
            showToast("Läser in PDF... (Detta tar ca 10 sekunder)");

            try {
              const reader = new FileReader();
              reader.onloadend = async () => {
                try {
                  const base64Data = reader.result.split(',')[1];
                  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                  const promptText = `Extrahera recept från PDF. Svara ENDAST med en giltig JSON-array med objekt. Ingen markdown runtomkring. "protein" måste vara kött, fisk, veg eller kyckling. "collection" måste vara Spaghetti- & pastarätter, Potatisrätter, Risrätter, Soppor, Övriga vardagsrätter eller Helgmat.`;

                  const payload = {
                    contents: [{ role: "user", parts: [{ text: promptText }, { inlineData: { mimeType: "application/pdf", data: base64Data } }] }],
                    generationConfig: { 
                        temperature: 0.1, responseMimeType: "application/json", 
                        responseSchema: {
                          type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, protein: { type: "STRING" }, collection: { type: "STRING" }, time: { type: "STRING" }, ingredients: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, amount: { type: "NUMBER" }, unit: { type: "STRING" } }, required: ["name", "amount", "unit"] } }, instructions: { type: "STRING" } }, required: ["name", "protein", "collection", "time", "ingredients", "instructions"] }
                        }
                    }
                  };

                  const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                  const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                  let cleanText = rawText || "[]";
                  cleanText = cleanText.replace(/```json/gi, '').replace(/```/g, '').trim();
                  
                  // Skydd mot parse-fel om AI:n är pratig
                  const arrayMatch = cleanText.match(/\[[\s\S]*\]/);
                  if (arrayMatch) { cleanText = arrayMatch[0]; }

                  const parsedRecipes = JSON.parse(cleanText);
                  const recipesWithIds = parsedRecipes.map(r => ({ ...r, id: 'pdf_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9) }));
                  
                  const newRecipes = [...recipes, ...recipesWithIds];
                  setRecipes(newRecipes);
                  updateDb({ recipes: newRecipes });
                  showToast(`${recipesWithIds.length} recept importerades!`);
                } catch (err) {
                  console.error(err);
                  showToast(`Fel vid import. (Kunde inte läsa PDF)`);
                } finally {
                  setIsUploadingPdf(false);
                  if (fileInputRef.current) fileInputRef.current.value = '';
                }
              };
              reader.readAsDataURL(file);
            } catch (err) {
              showToast("Ett fel uppstod."); setIsUploadingPdf(false);
            }
          };

          const handleGenerateInspiration = async () => {
            if (!inspirationQuery.trim()) { showToast("Skriv in en råvara eller idé först!"); return; }
            setIsGeneratingInspiration(true);
            setInspiredRecipe(null);
            showToast("Kocken skapar ett nytt recept...");

            try {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
              const promptText = `
                Du är en professionell kock. Skapa ett detaljerat, gott och lättlagat recept baserat på följande idé/råvara: "${inspirationQuery}".
                Svara ENDAST med ett giltigt JSON-objekt. Inga extra tecken. 
                Objektet MÅSTE ha följande struktur och egenskaper:
                {
                  "name": "Namn på rätten",
                  "protein": "kött" ELLER "fisk" ELLER "veg" ELLER "kyckling",
                  "collection": "Spaghetti- & pastarätter" ELLER "Potatisrätter" ELLER "Risrätter" ELLER "Soppor" ELLER "Övriga vardagsrätter" ELLER "Helgmat",
                  "time": "t.ex. 30 min",
                  "ingredients": [
                    { "name": "Ingrediens", "amount": 1.5, "unit": "dl" }
                  ],
                  "instructions": "1. Gör så här...\\n2. Nästa steg..."
                }
              `;

              const payload = {
                contents: [{ role: "user", parts: [{ text: promptText }] }],
