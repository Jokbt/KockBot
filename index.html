                generationConfig: { temperature: 0.7, responseMimeType: "application/json" }
              };

              const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              let rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
              rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
              
              // Felsäker JSON parse
              const objectMatch = rawText.match(/\{[\s\S]*\}/);
              if (objectMatch) { rawText = objectMatch[0]; }
              
              const parsed = JSON.parse(rawText);
              
              setInspiredRecipe({ ...parsed, id: 'insp_' + Date.now() });
              showToast("Receptet är klart!");
            } catch (err) {
              showToast("Kunde tyvärr inte skapa ett recept just nu. Försök igen.");
            } finally {
              setIsGeneratingInspiration(false);
            }
          };

          const saveInspiredRecipe = () => {
            if (!inspiredRecipe) return;
            const newRecipes = [inspiredRecipe, ...recipes];
            setRecipes(newRecipes);
            updateDb({ recipes: newRecipes });
            setInspiredRecipe(null);
            setInspirationQuery('');
            setActiveTab('recipes');
            showToast("Det nya receptet sparades i din bok!");
          };

          const handleCopyList = () => {
            if (shoppingList.length === 0) {
                showToast("Listan är tom."); 
                return;
            }
            // Syntax error fix: avoiding template literals for absolute Babel parser safety
            const text = shoppingList.map(item => formatAmounts(item.amounts) + " " + item.name).join('\n');
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); showToast("Listan kopierades till urklipp!"); } catch (err) { showToast("Ett fel uppstod."); }
            document.body.removeChild(textArea);
          };

          const filteredRecipes = useMemo(() => {
            if (selectedCollection === 'Alla') return recipes;
            return recipes.filter(r => r.collection === selectedCollection);
          }, [recipes, selectedCollection]);

          const CatBadge = ({ protein }) => {
            const colors = {
              'kött': 'bg-red-100 text-red-700',
              'fisk': 'bg-blue-100 text-blue-700',
              'veg': 'bg-emerald-100 text-emerald-700',
              'kyckling': 'bg-amber-100 text-amber-700'
            };
            const pStr = protein ? protein.toLowerCase() : 'veg';
            return (
              <span className={`px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${colors[pStr] || colors['veg']}`}>
                {protein || 'VEG'}
              </span>
            );
          };

          const ShareModal = () => {
            const [joinCode, setJoinCode] = useState('');
            if (!showShareModal) return null;

            const handleJoin = () => {
              if(joinCode.trim().length > 0) {
                  const code = joinCode.trim().toUpperCase();
                  setHouseholdId(code);
                  localStorage.setItem('smartMatsedel_householdId', code);
                  setShowShareModal(false);
                  showToast("Ansluten till nytt hushåll!");
              }
            };

            const handleCopyCode = () => {
              const textArea = document.createElement("textarea");
              textArea.value = householdId;
              document.body.appendChild(textArea);
              textArea.select();
              try { document.execCommand('copy'); showToast("Hushållskoden kopierades!"); } catch (err) {}
              document.body.removeChild(textArea);
            };

            return (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={() => setShowShareModal(false)}>
                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Users className="text-emerald-600" /> Familjedelning</h2>
                    <button onClick={() => setShowShareModal(false)} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors"><X size={20} /></button>
                  </div>
                  <div className="p-6 space-y-6">
                    <div className="bg-emerald-50 rounded-2xl p-5 text-center border border-emerald-100">
                      <p className="text-sm font-semibold text-emerald-800 mb-2">Din hushållskod</p>
                      <div className="text-3xl font-black text-emerald-600 tracking-widest mb-3">{householdId}</div>
                      <button onClick={handleCopyCode} className="px-4 py-2 bg-white text-emerald-700 rounded-lg text-sm font-bold shadow-sm border border-emerald-200 flex items-center justify-center gap-2 mx-auto hover:bg-emerald-50 transition-colors">
                        <Copy size={16} /> Kopiera kod
                      </button>
                      <p className="text-xs text-emerald-600 mt-4 leading-relaxed">Ge denna kod till din sambo så att ni delar samma matsedel och inköpslista i realtid.</p>
                    </div>

                    <div className="border-t border-slate-100 pt-6">
                      <label className="block text-sm font-semibold text-slate-700 mb-2">Har du fått en kod?</label>
                      <div className="flex gap-2">
                        <input type="text" value={joinCode} onChange={(e) => setJoinCode(e.target.value)} placeholder="T.ex. ABC123" className="flex-1 px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none uppercase font-bold tracking-widest text-slate-700" maxLength={6} />
                        <button onClick={handleJoin} disabled={!joinCode.trim()} className="px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-bold transition-colors disabled:opacity-50">Anslut</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const AddRecipeModal = () => {
            const [formData, setFormData] = useState({ name: '', protein: 'kött', collection: 'Spaghetti- & pastarätter', time: '30 min', ingredients: [{ name: '', amount: 1, unit: 'st' }], instructions: '' });
            const [isScanning, setIsScanning] = useState(false);
            const cameraInputRef = useRef(null);

            if (!showAddModal) return null;

            const handleSave = () => {
              if (!formData.name) return showToast("Receptet måste ha ett namn.");
              const newRecipes = [...recipes, { ...formData, id: 'man_' + Date.now() }];
              setRecipes(newRecipes);
              updateDb({ recipes: newRecipes });
              setShowAddModal(false);
              showToast("Receptet sparades!");
            };

            const updateIngredient = (index, field, value) => {
              const newIngs = [...formData.ingredients];
              newIngs[index][field] = field === 'amount' ? Number(value) : value;
              setFormData({ ...formData, ingredients: newIngs });
            };

            const handleScanRecipe = async (event) => {
              const file = event.target.files?.[0];
              if (!file) return;

              setIsScanning(true);
              showToast("Tittar på bilden... Detta kan ta en liten stund.");

              try {
                const reader = new FileReader();
                reader.onerror = () => { throw new Error("Kunde inte läsa bilden."); };
                reader.onloadend = async () => {
                  try {
                    const base64Data = reader.result.split(',')[1];
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const promptText = `
                      Du är en expert på att läsa och tolka handskrivna eller tryckta recept från bilder. 
                      Extrahera receptet från bilden.
                      Svara ENDAST med ett giltigt JSON-objekt. 
                      Objektet MÅSTE ha följande struktur och egenskaper:
                      {
                        "name": "Namn på rätten",
                        "protein": "kött" ELLER "fisk" ELLER "veg" ELLER "kyckling",
                        "collection": "Spaghetti- & pastarätter" ELLER "Potatisrätter" ELLER "Risrätter" ELLER "Soppor" ELLER "Övriga vardagsrätter" ELLER "Helgmat",
                        "time": "t.ex. 30 min",
                        "ingredients": [
                          { "name": "Ingrediens", "amount": 1.5, "unit": "dl" }
                        ],
                        "instructions": "1. Gör så här...\\n2. Nästa steg..."
                      }
                    `;

                    const payload = {
                      contents: [{ role: "user", parts: [{ text: promptText }, { inlineData: { mimeType: file.type, data: base64Data } }] }],
                      generationConfig: { temperature: 0.1, responseMimeType: "application/json" }
                    };

                    const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    let cleanText = rawText || "{}";
                    cleanText = cleanText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const objectMatch = cleanText.match(/\{[\s\S]*\}/);
                    if (objectMatch) { cleanText = objectMatch[0]; }
                    const parsed = JSON.parse(cleanText);
                    
                    setFormData(prev => ({
                      ...prev,
                      name: parsed.name || prev.name,
                      protein: parsed.protein || prev.protein,
                      collection: parsed.collection || prev.collection,
                      time: parsed.time || prev.time,
                      ingredients: (parsed.ingredients && parsed.ingredients.length > 0) ? parsed.ingredients : prev.ingredients,
                      instructions: parsed.instructions || prev.instructions
                    }));

                    showToast("Receptet fylldes i från bilden!");
                  } catch (err) {
                    showToast("Kunde inte tolka bilden tyvärr.");
                  } finally {
                    setIsScanning(false);
                    if (cameraInputRef.current) cameraInputRef.current.value = '';
                  }
                };
                reader.readAsDataURL(file);
              } catch (err) {
                showToast("Ett fel uppstod.");
                setIsScanning(false);
              }
            };

            return (
              <div 
                className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto"
                onClick={() => setShowAddModal(false)}
              >
                <div 
                  className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl my-8 flex flex-col animate-in fade-in zoom-in-95 duration-200"
                  style={{ maxHeight: 'calc(100vh - 4rem)' }}
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white flex-shrink-0 rounded-t-3xl">
                    <h2 className="text-xl font-bold text-slate-800">Skapa nytt recept</h2>
                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors"><X size={20} /></button>
                  </div>
                  
                  <div className="p-6 space-y-6 bg-slate-50/50 overflow-y-auto flex-1">
                    
                    <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 flex flex-col sm:flex-row gap-4 items-center justify-between">
                      <div>
                        <h3 className="font-bold text-emerald-800">Har du receptet framför dig?</h3>
                        <p className="text-emerald-600 text-sm">Fota av ett papper eller en skärm så fyller vi i automatiskt!</p>
                      </div>
                      <div className="relative w-full sm:w-auto">
                        <input type="file" accept="image/*" capture="environment" ref={cameraInputRef} onChange={handleScanRecipe} className="hidden" id="camera-upload" />
                        <label htmlFor="camera-upload" className={`flex items-center justify-center gap-2 px-5 py-2.5 ${isScanning ? 'bg-emerald-200 text-emerald-600 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 text-white cursor-pointer'} rounded-xl font-semibold text-sm transition-all shadow-sm w-full whitespace-nowrap`}>
                          {isScanning ? <Loader2 size={16} className="animate-spin" /> : <Camera size={16} />}
                          {isScanning ? 'Läser bild...' : 'Scanna med kameran'}
                        </label>
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Receptnamn</label>
                      <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="T.ex. Krämig Pasta" />
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Proteinkälla</label>
                        <select value={formData.protein} onChange={(e) => setFormData({...formData, protein: e.target.value})} className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                          <option value="kött">Kött</option>
                          <option value="fisk">Fisk</option>
                          <option value="veg">Vegetariskt</option>
                          <option value="kyckling">Kyckling</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Bokkapitel</label>
                        <select value={formData.collection} onChange={(e) => setFormData({...formData, collection: e.target.value})} className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                          {BOOK_COLLECTIONS.filter(c => c !== 'Alla').map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Tid</label>
                        <input type="text" value={formData.time} onChange={(e) => setFormData({...formData, time: e.target.value})} className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="30 min" />
                      </div>
                    </div>

                    <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                      <div className="flex justify-between items-center mb-4">
                        <label className="text-sm font-semibold text-slate-700">Ingredienser</label>
                        <button onClick={() => setFormData({ ...formData, ingredients: [...formData.ingredients, { name: '', amount: 1, unit: 'st' }] })} className="text-sm font-semibold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg hover:bg-emerald-100 flex items-center gap-1.5"><Plus size={16} /> Lägg till</button>
                      </div>
                      <div className="space-y-3">
                        {formData.ingredients.map((ing, idx) => (
                          <div key={idx} className="flex gap-2 items-center">
                            <input type="text" value={ing.name} onChange={(e) => updateIngredient(idx, 'name', e.target.value)} placeholder="T.ex. Morot" className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm" />
                            <input type="number" value={ing.amount} onChange={(e) => updateIngredient(idx, 'amount', e.target.value)} className="w-20 px-3 py-2 border border-slate-200 rounded-lg text-sm" min="0" step="0.5"/>
                            <input type="text" value={ing.unit} onChange={(e) => updateIngredient(idx, 'unit', e.target.value)} placeholder="st" className="w-16 px-3 py-2 border border-slate-200 rounded-lg text-sm" />
                            <button onClick={() => setFormData({ ...formData, ingredients: formData.ingredients.filter((_, i) => i !== idx) })} className="p-2 text-red-400 hover:bg-red-50 rounded-lg"><Trash2 size={18} /></button>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Gör så här</label>
                      <textarea value={formData.instructions} onChange={(e) => setFormData({...formData, instructions: e.target.value})} className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none min-h-[120px]" placeholder="1. Stek löken..." />
                    </div>
                  </div>
                  
                  <div className="p-6 border-t border-slate-100 bg-white flex justify-end gap-3 flex-shrink-0 rounded-b-3xl">
                    <button onClick={() => setShowAddModal(false)} className="px-6 py-2.5 text-slate-600 hover:bg-slate-100 rounded-xl font-semibold">Avbryt</button>
                    <button onClick={handleSave} disabled={!formData.name} className="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-semibold flex items-center gap-2 disabled:opacity-50"><Save size={18} /> Spara</button>
                  </div>
                </div>
              </div>
            );
          };

          const RecipeModal = () => {
            const [imgLoading, setImgLoading] = useState(true);

            if (!selectedRecipeId) return null;
            const recipe = recipes.find(r => r.id === selectedRecipeId);
            if (!recipe) return null;

            return (
              <div 
                className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto"
                onClick={() => { setSelectedRecipeId(null); setImgLoading(true); }}
              >
                <div 
                  className="bg-white rounded-3xl shadow-2xl w-full max-w-lg my-8 flex flex-col animate-in fade-in zoom-in-95 duration-200 relative"
                  style={{ maxHeight: 'calc(100vh - 4rem)' }}
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="p-4 border-b border-slate-100 flex justify-end items-center bg-white flex-shrink-0 rounded-t-3xl absolute top-0 w-full z-20 bg-white/80 backdrop-blur-md">
                    <div className="flex gap-2">
                        <button onClick={() => { deleteRecipe(recipe.id); setSelectedRecipeId(null); }} className="text-red-400 hover:text-red-600 bg-white hover:bg-red-50 rounded-full p-2 transition-colors shadow-sm" title="Ta bort recept">
                          <Trash2 size={20} />
                        </button>
                        <button onClick={() => { setSelectedRecipeId(null); setImgLoading(true); }} className="text-slate-400 hover:text-slate-800 bg-white hover:bg-slate-100 rounded-full p-2 transition-colors shadow-sm">
                          <X size={20} />
                        </button>
                    </div>
                  </div>

                  <div className="p-6 pt-16 overflow-y-auto flex-1">
                    <div className="mb-6">
                      <span className="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-2 block">{recipe.collection}</span>
                      <h2 className="text-3xl font-extrabold text-slate-800 leading-tight mb-3">{recipe.name}</h2>
                      
                      <div className="w-full h-48 sm:h-64 bg-slate-100 rounded-2xl mb-4 overflow-hidden shadow-inner relative">
                        {imgLoading && (
                           <div className="absolute inset-0 flex items-center justify-center bg-slate-100 z-10">
                              <Loader2 size={24} className="text-slate-400 animate-spin" />
                           </div>
                        )}
                        <img 
                          src={getRecipeImage(recipe.name, recipe.collection)} 
                          alt={recipe.name} 
                          className={`w-full h-full object-cover transition-opacity duration-500 ${imgLoading ? 'opacity-0' : 'opacity-100'}`}
                          onLoad={() => setImgLoading(false)}
                          onError={(e) => {
                            e.target.onerror = null; 
                            e.target.src = getFallbackImage(recipe.id);
                            setImgLoading(false);
                          }}
                        />
                      </div>

                      <div className="flex items-center gap-3 text-sm font-medium text-slate-500">
                        <CatBadge protein={recipe.protein} />
                        <span className="flex items-center gap-1.5"><CalendarDays size={16}/> {recipe.time}</span>
                      </div>
                    </div>

                    <div className="space-y-6 pb-6">
                      <div className="bg-emerald-50/50 p-5 rounded-2xl border border-emerald-100/50">
                        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><ShoppingCart size={18} className="text-emerald-600"/> Ingredienser</h3>
                        <ul className="space-y-2.5">
                          {recipe.ingredients.map((ing, i) => (
                            <li key={i} className="flex justify-between items-center text-slate-700 text-sm">
                              <span className="font-medium">{ing.name}</span>
                              <span className="text-emerald-700 font-bold bg-white px-2 py-1 rounded-md shadow-sm border border-emerald-50">{ing.amount} {ing.unit}</span>
                            </li>
                          ))}
                        </ul>
                      </div>

                      <div>
                        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><Utensils size={18} className="text-emerald-600"/> Tillagning</h3>
                        <div className="space-y-3">
                          {recipe.instructions.split('\n').map((step, idx) => {
                             const cleanStep = step.replace(/^\d+\.\s*/, '').trim();
                             if(!cleanStep) return null;
                             return (
                              <div key={idx} className="flex gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <span className="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-white rounded-full text-emerald-600 font-bold shadow-sm border border-slate-100">{idx+1}</span>
                                <p className="text-slate-700 pt-1 leading-relaxed">{cleanStep}</p>
                              </div>
                             );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-24 md:pb-10 relative selection:bg-emerald-200">
              
              {toastMessage && (
                <div className="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3.5 rounded-full shadow-2xl flex items-center gap-3 z-[60] animate-in fade-in slide-in-from-bottom-6 duration-300 w-[90%] md:w-auto max-w-md">
                  <Info size={20} className="text-emerald-400 flex-shrink-0" />
                  <span className="font-medium text-sm">{toastMessage}</span>
                </div>
              )}

              <header className="bg-white border-b border-slate-100 sticky top-0 z-30">
                <div className="max-w-4xl mx-auto px-4 py-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-xl shadow-md shadow-emerald-500/30 overflow-hidden bg-white border-2 border-emerald-500 flex-shrink-0 p-0.5">
                        <RobotLogo />
                      </div>
                      <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight hidden sm:block">KockBot</h1>
                      
                      <div className="flex items-center gap-2 ml-4">
                        <button onClick={() => setShowShareModal(true)} className="flex items-center justify-center gap-1.5 px-3 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-lg text-xs font-bold transition-all border border-emerald-100 shadow-sm" title="Dela med familjen">
                          <Users size={16} /> <span className="hidden sm:inline">Dela</span>
                        </button>
                        {!isStandalone && (
                          <button onClick={installApp} className="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 rounded-lg text-xs font-bold transition-all shadow-sm">
                            <Download size={14} /> <span className="hidden sm:inline">Installera</span> <span className="hidden md:inline">App</span>
                          </button>
                        )}
                      </div>
                    </div>
                    
                    <div className="hidden md:flex bg-slate-100/80 p-1 rounded-full border border-slate-200/60">
                      <button onClick={() => setActiveTab('plan')} className={`flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold transition-all ${activeTab === 'plan' ? 'bg-white shadow-sm text-emerald-700' : 'text-slate-500 hover:text-slate-800'}`}>
                        <Calendar size={18} /> Matsedel
                      </button>
                      <button onClick={() => setActiveTab('list')} className={`flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold transition-all ${activeTab === 'list' ? 'bg-white shadow-sm text-emerald-700' : 'text-slate-500 hover:text-slate-800'}`}>
                        <ShoppingCart size={18} /> Inköpslista
                      </button>
                      <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold transition-all ${activeTab === 'recipes' ? 'bg-white shadow-sm text-emerald-700' : 'text-slate-500 hover:text-slate-800'}`}>
                        <BookOpen size={18} /> Recept
                      </button>
                      <button onClick={() => setActiveTab('inspiration')} className={`flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold transition-all ${activeTab === 'inspiration' ? 'bg-white shadow-sm text-emerald-700' : 'text-slate-500 hover:text-slate-800'}`}>
                        <Sparkles size={18} /> Inspiration
                      </button>
                    </div>
                  </div>
                </div>
              </header>

              <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-3 pb-safe z-40 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                 <button onClick={() => setActiveTab('plan')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'plan' ? 'text-emerald-600' : 'text-slate-400'}`}>
                    <Calendar size={24} className={activeTab === 'plan' ? 'fill-emerald-50/50' : ''} />
                    <span className="text-[10px] font-bold">Matsedel</span>
                 </button>
                 <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'list' ? 'text-emerald-600' : 'text-slate-400'}`}>
                    <ShoppingCart size={24} className={activeTab === 'list' ? 'fill-emerald-50/50' : ''} />
                    <span className="text-[10px] font-bold">Handla</span>
                 </button>
                 <button onClick={() => setActiveTab('recipes')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'recipes' ? 'text-emerald-600' : 'text-slate-400'}`}>
                    <BookOpen size={24} className={activeTab === 'recipes' ? 'fill-emerald-50/50' : ''} />
                    <span className="text-[10px] font-bold">Recept</span>
                 </button>
                 <button onClick={() => setActiveTab('inspiration')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'inspiration' ? 'text-emerald-600' : 'text-slate-400'}`}>
                    <Sparkles size={24} className={activeTab === 'inspiration' ? 'fill-emerald-50/50' : ''} />
                    <span className="text-[10px] font-bold">Hitta på</span>
                 </button>
              </div>

              <main className="max-w-4xl mx-auto px-4 py-8">
                
                {/* --- VY: MATSEDEL --- */}
                {activeTab === 'plan' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    {recipes.length === 0 ? (
                        <div className="text-center py-20 px-4 bg-white rounded-3xl border border-slate-100 shadow-sm">
                            <div className="bg-emerald-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><BookOpen size={32} className="text-emerald-500" /></div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">Din receptbok är tom</h2>
                            <button onClick={() => setActiveTab('recipes')} className="px-6 py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-slate-800 transition-colors mt-4">Gå till Receptboken</button>
                        </div>
                    ) : mealPlan.length === 0 ? (
                        <div className="text-center py-20 px-4 bg-white rounded-3xl border border-slate-100 shadow-sm">
                            <div className="bg-emerald-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><Calendar size={32} className="text-emerald-500" /></div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">Ingen meny skapad ännu</h2>
                            <p className="text-slate-500 mb-6">Klicka nedan för att slumpa fram er första matsedel!</p>
                            <div className="flex justify-center gap-3">
                                <button onClick={() => generatePlan('week')} className="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition-colors">1 Vecka</button>
                                <button onClick={() => generatePlan('month')} className="px-6 py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-slate-800 transition-colors">4 Veckor</button>
                            </div>
                        </div>
                    ) : (
                        <>
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                              <div className="flex items-center gap-3">
                                <h2 className="text-3xl font-extrabold text-slate-800">Din Meny</h2>
                                <span className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md hidden sm:block">ID: {householdId}</span>
                                <button onClick={toggleLock} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all shadow-sm ${isPlanLocked ? 'bg-amber-100 text-amber-800 border border-amber-200 hover:bg-amber-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                  {isPlanLocked ? <><Lock size={14} /> Låst</> : <><Unlock size={14} /> Lås fast</>}
                                </button>
                              </div>
                              
                              {!isPlanLocked && (
                                <div className="flex bg-slate-200/60 p-1 rounded-xl w-full sm:w-auto">
                                    <button onClick={() => generatePlan('week')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all ${planType === 'week' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>1 Vecka</button>
                                    <button onClick={() => generatePlan('month')} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all ${planType === 'month' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>4 Veckor</button>
                                </div>
                              )}
                            </div>

                            {mealPlan.length > 0 && (
                                <div className="space-y-10">
                                {Array.from({ length: planType === 'week' ? 1 : 4 }).map((_, weekIndex) => {
                                    const targetDate = new Date();
                                    targetDate.setDate(targetDate.getDate() + (weekIndex * 7));
                                    const actualWeekNum = getISOWeekNumber(targetDate);
                                    return (
                                        <div key={weekIndex}>
                                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><span className="bg-emerald-100 text-emerald-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">V{actualWeekNum}</span> Vecka {actualWeekNum}</h3>
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                            <div className="divide-y divide-slate-100">
                                            {mealPlan.slice(weekIndex * 7, (weekIndex + 1) * 7).map((day, idx) => {
                                            const actualIndex = (weekIndex * 7) + idx;
                                            return (
                                                <div key={actualIndex} className="p-4 sm:p-5 flex items-center justify-between group hover:bg-slate-50 transition-colors">
                                                <div className="flex items-center gap-3 sm:gap-6 flex-1 min-w-0">
                                                    <p className="font-extrabold text-slate-700 w-16 sm:w-24 text-sm sm:text-base flex-shrink-0">{day.dayName}</p>
                                                    <button onClick={() => setSelectedRecipeId(day.recipe.id)} className="flex-1 text-left font-bold text-slate-900 text-base sm:text-lg hover:text-emerald-600 transition-colors truncate flex items-center gap-2">
                                                      <span className="truncate">{day.recipe.name}</span><ExternalLink size={16} className="opacity-0 group-hover:opacity-100 text-emerald-500 transition-opacity flex-shrink-0 hidden sm:block" />
                                                    </button>
                                                </div>
                                                <div className="flex items-center gap-3 sm:gap-4 flex-shrink-0 ml-4">
                                                    <div className="hidden sm:block"><CatBadge protein={day.recipe.protein} /></div>
                                                    {!isPlanLocked && (
                                                      <button onClick={() => swapDayRecipe(actualIndex)} className="p-2 sm:p-2.5 bg-slate-100 hover:bg-emerald-100 text-slate-500 hover:text-emerald-700 rounded-xl transition-colors"><RefreshCw size={16} /></button>
                                                    )}
                                                </div>
                                                </div>
                                            );
                                            })}
                                            </div>
                                        </div>
                                        </div>
                                    );
                                })}
                                </div>
                            )}
                        </>
                    )}
                  </div>
                )}

                {/* --- VY: INKÖPSLISTA --- */}
                {activeTab === 'list' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-3xl mx-auto">
                    {mealPlan.length === 0 ? (
                         <div className="text-center py-20 px-4 bg-white rounded-3xl border border-slate-100 shadow-sm">
                            <div className="bg-slate-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><ShoppingCart size={32} className="text-slate-400" /></div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">Inköpslistan är tom</h2>
                        </div>
                    ) : (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 sm:p-8 mb-6">
                        <div className="flex flex-col sm:flex-row justify-between sm:items-end gap-6 mb-8 border-b border-slate-100 pb-6">
                            <div><h2 className="text-3xl font-extrabold text-slate-800 mb-2">Inköpslista</h2></div>
                            <button onClick={handleCopyList} className="flex items-center justify-center gap-2 px-5 py-3 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl text-sm transition-all shadow-lg"><Copy size={16} /> Kopiera text</button>
                        </div>
                        <div className="space-y-2">
                            {shoppingList.map((item, idx) => {
                            const isChecked = checkedListItems[item.name];
                            return (
                                <div key={idx} className={`flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl border transition-all duration-300 gap-4 sm:gap-2 ${isChecked ? 'bg-slate-50 border-transparent opacity-60' : 'bg-white border-slate-200 shadow-sm hover:border-emerald-300'}`}>
                                <div className="flex items-center gap-4 flex-1 cursor-pointer" onClick={() => toggleCheckItem(item.name)}>
                                    <div className={`flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${isChecked ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300 bg-white'}`}>
                                    {isChecked && <Check size={14} className="text-white" strokeWidth={3} />}
                                    </div>
                                    <span className={`font-semibold text-lg sm:text-base transition-colors ${isChecked ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.name}</span>
                                </div>
                                <div className="flex items-center justify-between sm:justify-end gap-3 w-full sm:w-auto pl-10 sm:pl-0">
                                    <span className="font-bold text-slate-700 bg-slate-100 px-3 py-1.5 rounded-lg text-sm whitespace-nowrap">{formatAmounts(item.amounts)}</span>
                                    <a href={`https://handlaprivatkund.ica.se/stores/1004243/search?q=${encodeURIComponent(item.name)}`} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg border border-red-100" onClick={(e) => e.stopPropagation()}><ExternalLink size={12} /> Sök på ICA</a>
                                </div>
                                </div>
                            );
                            })}
                        </div>
                        </div>
                    )}
                  </div>
                )}

                {/* --- VY: RECEPTBOK --- */}
                {activeTab === 'recipes' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                      <div>
                        <h2 className="text-3xl font-extrabold text-slate-800">Receptbok</h2>
                        <p className="text-slate-500 font-medium mt-1">{recipes.length} sparade favoriter.</p>
                      </div>
                      
                      <div className="flex flex-wrap gap-2 w-full md:w-auto">
                        <button onClick={() => setShowAddModal(true)} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-semibold text-sm transition-all shadow-lg shadow-emerald-600/20">
                          <Plus size={18} /> Nytt Recept
                        </button>
                        <div className="relative flex-1 md:flex-none">
                          <input type="file" accept="application/pdf" ref={fileInputRef} onChange={handlePdfUpload} className="hidden" id="pdf-upload" />
                          <label htmlFor="pdf-upload" className={`flex items-center justify-center gap-2 px-5 py-2.5 ${isUploadingPdf ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-white border-2 border-slate-200 hover:border-slate-300 text-slate-700 cursor-pointer'} rounded-xl font-semibold text-sm transition-all w-full`}>
                            {isUploadingPdf ? <Loader2 size={18} className="animate-spin" /> : <Upload size={18} />} {isUploadingPdf ? 'Läser in...' : 'Importera PDF'}
                          </label>
                        </div>
                      </div>
                    </div>

                    {/* KATEGORI FILTRERING */}
                    {recipes.length > 0 && (
                        <div className="flex overflow-x-auto hide-scrollbar gap-2 mb-8 pb-2 -mx-4 px-4 sm:mx-0 sm:px-0">
                            {BOOK_COLLECTIONS.map(cat => (
                                <button 
                                    key={cat}
                                    onClick={() => setSelectedCollection(cat)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors border ${selectedCollection === cat ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200 hover:border-slate-300'}`}
                                >
                                    {cat === 'Alla' && <Filter size={14} />} {cat}
                                </button>
                            ))}
                        </div>
                    )}

                    {filteredRecipes.length === 0 ? (
                         <div className="text-center py-16 px-4 bg-white/50 border-2 border-dashed border-slate-200 rounded-3xl">
                            <p className="text-slate-500">Inga recept i denna kategori.</p>
                         </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                        {filteredRecipes.map(recipe => (
                            <div key={recipe.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group cursor-pointer relative" onClick={() => setSelectedRecipeId(recipe.id)}>
                            
                            <button onClick={(e) => { e.stopPropagation(); deleteRecipe(recipe.id); }} className="absolute top-4 right-4 p-2 bg-white/80 backdrop-blur-sm text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all opacity-0 group-hover:opacity-100 shadow-sm" title="Ta bort recept">
                                <Trash2 size={16} />
                            </button>

                            <div className="flex justify-between items-center mb-3 pr-8">
                               <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">{recipe.collection}</span>
                            </div>

                            <h3 className="font-extrabold text-xl text-slate-800 mb-4 leading-tight group-hover:text-emerald-600 transition-colors">{recipe.name}</h3>
                            
                            <div className="mt-auto pt-4 flex justify-between items-center border-t border-slate-50">
                                <CatBadge protein={recipe.protein} />
                                <span className="text-slate-400 text-xs font-bold">{recipe.time}</span>
                            </div>
                            </div>
                        ))}
                        </div>
                    )}
                  </div>
                )}

                {/* --- VY: INSPIRATION --- */}
                {activeTab === 'inspiration' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-2xl mx-auto">
                    <div className="text-center mb-8">
                      <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <Sparkles size={28} className="text-emerald-600" />
                      </div>
                      <h2 className="text-3xl font-extrabold text-slate-800 mb-2">Ny inspiration</h2>
                      <p className="text-slate-500">Skriv in en råvara du har hemma eller något du är sugen på, så hittar AI-kocken på ett nytt, gott recept åt dig.</p>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8 flex flex-col sm:flex-row gap-3">
                      <input 
                        type="text" 
                        value={inspirationQuery} 
                        onChange={(e) => setInspirationQuery(e.target.value)} 
                        placeholder="T.ex. Vegetariskt med sötpotatis..." 
                        className="flex-1 px-5 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none"
                        onKeyDown={(e) => e.key === 'Enter' && handleGenerateInspiration()}
                      />
                      <button 
                        onClick={handleGenerateInspiration} 
                        disabled={isGeneratingInspiration}
                        className="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 transition-all disabled:opacity-70 disabled:cursor-not-allowed whitespace-nowrap"
                      >
                        {isGeneratingInspiration ? <Loader2 size={18} className="animate-spin" /> : <Sparkles size={18} />}
                        Skapa recept
                      </button>
                    </div>

                    {inspiredRecipe && (
                      <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200 animate-in zoom-in-95 duration-300 relative">
                        <div className="p-6 sm:p-8">
                          <span className="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-2 block">{inspiredRecipe.collection}</span>
                          <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-800 leading-tight mb-4">{inspiredRecipe.name}</h2>
                          
                          <div className="w-full h-40 sm:h-64 bg-slate-100 rounded-2xl mb-6 overflow-hidden relative">
                             <img 
                              src={getRecipeImage(inspiredRecipe.name, inspiredRecipe.collection)} 
                              alt={inspiredRecipe.name} 
                              className="w-full h-full object-cover transition-opacity duration-500"
                              onError={(e) => {
                                e.target.onerror = null; 
                                e.target.src = getFallbackImage(inspiredRecipe.id);
                              }}
                            />
                          </div>

                          <div className="flex items-center gap-3 text-sm font-medium text-slate-500 mb-6">
                            <CatBadge protein={inspiredRecipe.protein} />
                            <span className="flex items-center gap-1.5"><CalendarDays size={16}/> {inspiredRecipe.time}</span>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                              <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><ShoppingCart size={18} className="text-emerald-600"/> Ingredienser</h3>
                              <ul className="space-y-2 text-sm text-slate-700">
                                {inspiredRecipe.ingredients.map((ing, i) => (
                                  <li key={i} className="flex justify-between border-b border-slate-200/50 pb-1 last:border-0">
                                    <span>{ing.name}</span>
                                    <span className="font-bold text-emerald-700">{ing.amount} {ing.unit}</span>
                                  </li>
                                ))}
                              </ul>
                            </div>
                            
                            <div>
                              <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><Utensils size={18} className="text-emerald-600"/> Tillagning</h3>
                              <div className="space-y-3">
                                {inspiredRecipe.instructions.split('\n').map((step, idx) => {
                                  const cleanStep = step.replace(/^\d+\.\s*/, '').trim();
                                  if(!cleanStep) return null;
                                  return (
                                    <div key={idx} className="flex gap-3 text-sm">
                                      <span className="font-bold text-emerald-600">{idx+1}.</span>
                                      <p className="text-slate-700">{cleanStep}</p>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          </div>
                          
                          <button onClick={saveInspiredRecipe} className="w-full px-6 py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg">
                            <Save size={20} /> Spara detta till min Receptbok
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

              </main>

              <RecipeModal />
              <AddRecipeModal />
              <ShareModal />

            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
