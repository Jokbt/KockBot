                      <textarea value={formData.instructions} onChange={e => setFormData({...formData, instructions: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-xl outline-none min-h-[120px] shadow-sm focus:ring-2 focus:ring-[#6a8a47]" placeholder="1. Stek löken..." />
                    </div>
                  </div>
                  <div className="p-6 border-t border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 flex justify-end gap-3 rounded-b-3xl">
                    <button onClick={() => setShowAddModal(false)} className="px-6 py-2.5 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl font-semibold active:scale-95">Avbryt</button>
                    <button onClick={handleSave} disabled={!formData.name} className="px-6 py-2.5 bg-[#526e35] hover:bg-[#3d5226] text-white rounded-xl font-semibold disabled:opacity-50 shadow-md active:scale-95 flex items-center gap-2">
                      <Save size={18} /> Spara
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const RecipeModal = () => {
            const [imgLoading, setImgLoading] = useState(true);

            if (!selectedRecipeId) return null;
            const recipe = recipes.find(r => r.id === selectedRecipeId);
            if (!recipe) return null;

            return (
              <div className="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50 overflow-y-auto" onClick={() => { setSelectedRecipeId(null); setImgLoading(true); }}>
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-lg my-8 flex flex-col border border-slate-200/60 dark:border-slate-700" style={{ maxHeight: 'calc(100vh - 4rem)' }} onClick={e => e.stopPropagation()}>
                  <div className="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-end items-center bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-t-3xl absolute top-0 w-full z-20">
                    <div className="flex gap-2">
                      <button onClick={() => { deleteRecipe(recipe.id); setSelectedRecipeId(null); }} className="text-red-400 hover:text-red-600 bg-white dark:bg-slate-700 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full p-2 shadow-sm border border-slate-100 dark:border-slate-600 active:scale-95">
                        <Trash2 size={20} />
                      </button>
                      <button onClick={() => { setSelectedRecipeId(null); setImgLoading(true); }} className="text-slate-400 hover:text-slate-800 dark:hover:text-white bg-white dark:bg-slate-700 hover:bg-slate-100 dark:hover:bg-slate-600 rounded-full p-2 shadow-sm border border-slate-100 dark:border-slate-600 active:scale-95">
                        <X size={20} />
                      </button>
                    </div>
                  </div>
                  <div className="p-6 pt-20 overflow-y-auto flex-1">
                    <div className="mb-6 relative">
                      <button onClick={e => triggerImageUpload(e, recipe.id)} className="absolute top-0 right-0 p-2.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm text-slate-500 hover:text-[#526e35] dark:hover:text-[#82a061] rounded-full shadow-sm border border-slate-200 dark:border-slate-600 active:scale-95 z-30" title="Lägg till egen bild">
                        <ImagePlus size={20} />
                      </button>
                      
                      <span className="text-xs font-bold text-[#526e35] dark:text-[#82a061] uppercase tracking-widest mb-2 block">{recipe.collection}</span>
                      <h2 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 leading-tight mb-4 pr-12">{recipe.name}</h2>
                      
                      <div className="w-full h-48 sm:h-64 bg-slate-100 dark:bg-slate-700 rounded-2xl mb-5 overflow-hidden shadow-inner border border-slate-200/50 dark:border-slate-600 relative">
                        {imgLoading && (
                           <div className="absolute inset-0 flex items-center justify-center bg-slate-50 dark:bg-slate-800 z-10">
                              <Loader2 size={24} className="text-slate-400 animate-spin" />
                           </div>
                        )}
                        <img 
                          src={getRecipeImage(recipe)} 
                          alt={recipe.name} 
                          className={`w-full h-full object-cover transition-opacity duration-700 ${imgLoading ? 'opacity-0' : 'opacity-100'}`}
                          onLoad={() => setImgLoading(false)}
                          onError={(e) => {
                            e.target.onerror = null; 
                            e.target.src = getFallbackImage(recipe.id);
                            setImgLoading(false);
                          }}
                        />
                      </div>
                      
                      <div className="flex items-center gap-3 text-sm font-medium text-slate-500 dark:text-slate-400">
                        <CatBadge protein={recipe.protein} />
                        <span className="flex items-center gap-1.5 bg-white dark:bg-slate-700 shadow-sm border border-slate-100 dark:border-slate-600 px-3 py-1 rounded-full">
                          <CalendarDays size={16}/> {recipe.time}
                        </span>
                      </div>
                    </div>
                    
                    <div className="space-y-6 pb-6">
                      <div className="bg-[#f5f8f2] dark:bg-[#171f0d]/20 p-5 rounded-2xl border border-[#e4ede0] dark:border-[#293819] shadow-sm">
                        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-3 flex items-center gap-2">
                          <ShoppingCart size={18} className="text-[#526e35] dark:text-[#82a061]"/> Ingredienser
                        </h3>
                        <ul className="space-y-2.5">
                          {recipe.ingredients.map((ing, i) => (
                            <li key={i} className="flex justify-between items-center text-sm">
                              <span className="font-medium text-slate-700 dark:text-slate-300">{ing.name}</span>
                              <span className="text-[#3d5226] dark:text-[#9eb582] font-bold bg-white dark:bg-slate-800 px-2 py-1 rounded-md shadow-sm border border-slate-100 dark:border-slate-700">{ing.amount} {ing.unit}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                      
                      <div>
                        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-3 flex items-center gap-2">
                          <Utensils size={18} className="text-[#526e35] dark:text-[#82a061]"/> Tillagning
                        </h3>
                        <div className="space-y-3">
                          {parseInstructionsText(recipe.instructions).map((cleanStep, idx) => (
                              <div key={idx} className="flex gap-4 p-4 bg-white dark:bg-slate-700 rounded-2xl border border-slate-100 dark:border-slate-600 shadow-sm">
                                <span className="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-[#f5f8f2] dark:bg-[#171f0d]/50 rounded-full text-[#526e35] dark:text-[#82a061] font-bold border border-[#e4ede0] dark:border-[#293819]">{idx+1}</span>
                                <p className="text-slate-700 dark:text-slate-200 pt-1 leading-relaxed">{cleanStep}</p>
                              </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className={isDarkMode ? 'dark' : ''}>
              <div className="min-h-screen font-sans text-slate-900 dark:text-slate-100 pb-24 md:pb-10 relative selection:bg-[#bacca0] dark:selection:bg-[#171f0d] transition-colors duration-300">
                
                {/* LINDEN GREEN / DARK MODE BACKGROUND */}
                <div className="fixed inset-0 -z-10 bg-slate-50 dark:bg-slate-900 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-[#e4ede0]/40 dark:from-[#171f0d]/20 via-slate-50 dark:via-slate-900 to-slate-100/60 dark:to-slate-950 transition-colors duration-300"></div>

                <input type="file" accept="image/*" ref={imageUploadRef} onChange={handleImageFileChange} className="hidden" />
                
                {toastMessage && (
                  <div className="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-slate-800 text-white px-6 py-3.5 rounded-full shadow-2xl flex items-center gap-3 z-[60] animate-in fade-in slide-in-from-bottom-6 w-[90%] md:w-auto max-w-md border border-slate-700">
                    <Info size={20} className="text-[#bacca0] flex-shrink-0" />
                    <span className="font-medium text-sm">{toastMessage}</span>
                  </div>
                )}

                {/* HEADER */}
                <header className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-800/50 sticky top-0 z-30 shadow-sm transition-colors duration-300">
                  <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-xl shadow-md overflow-hidden bg-white dark:bg-slate-800 border border-[#e4ede0] dark:border-[#171f0d]/50 flex-shrink-0 p-0.5">
                        <RobotLogo />
                      </div>
                      <h1 className="text-2xl font-extrabold text-slate-800 dark:text-white tracking-tight hidden sm:block drop-shadow-sm">KockBot</h1>
                    </div>
                    
                    <div className="hidden md:flex bg-slate-100/80 dark:bg-slate-800/80 p-1.5 rounded-full border border-slate-200/60 dark:border-slate-700 shadow-inner">
                      <button onClick={() => setActiveTab('plan')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'plan' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'}`}>
                        <Calendar size={18} /> Matsedel
                      </button>
                      <button onClick={() => setActiveTab('list')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'list' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'}`}>
                        <ShoppingCart size={18} /> Inköpslista
                      </button>
                      <button onClick={() => setActiveTab('recipes')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'recipes' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'}`}>
                        <BookOpen size={18} /> Recept
                      </button>
                      <button onClick={() => setActiveTab('inspiration')} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${activeTab === 'inspiration' ? 'bg-white dark:bg-slate-700 shadow-md text-[#526e35] dark:text-[#82a061]' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'}`}>
                        <Sparkles size={18} /> Inspiration
                      </button>
                    </div>

                    <div className="flex items-center gap-2 ml-auto sm:ml-4">
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="flex items-center justify-center p-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl transition-all border border-slate-200 dark:border-slate-700 shadow-sm active:scale-95" title="Byt tema">
                          {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                        </button>

                        <button onClick={() => setShowShareModal(true)} className="flex items-center justify-center gap-1.5 px-3 py-2 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-xs font-bold border border-slate-200 dark:border-slate-700 shadow-sm active:scale-95">
                          <Users size={16} className="text-[#526e35] dark:text-[#6a8a47]" /> <span className="hidden sm:inline">Dela</span>
                        </button>
                        
                        {!isStandalone && (
                          <button onClick={installApp} className="flex items-center gap-1.5 px-3 py-2 bg-[#526e35] dark:bg-[#6a8a47] hover:bg-[#3d5226] dark:hover:bg-[#526e35] text-white rounded-xl text-xs font-bold shadow-md active:scale-95">
                            <Download size={14} /> <span className="hidden sm:inline">Installera</span>
                          </button>
                        )}
                    </div>
                  </div>
                </header>

                {/* MOBIL MENY */}
                <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-200/50 dark:border-slate-800 px-2 py-2 pb-safe z-40 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)] transition-colors duration-300">
                   <button onClick={() => setActiveTab('plan')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl active:scale-95 ${activeTab === 'plan' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400 dark:text-slate-500'}`}>
                      <Calendar size={22} className={activeTab === 'plan' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} />
                      <span className="text-[10px] font-bold">Matsedel</span>
                   </button>
                   <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl active:scale-95 ${activeTab === 'list' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400 dark:text-slate-500'}`}>
                      <ShoppingCart size={22} className={activeTab === 'list' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} />
                      <span className="text-[10px] font-bold">Handla</span>
                   </button>
                   <button onClick={() => setActiveTab('recipes')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl active:scale-95 ${activeTab === 'recipes' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400 dark:text-slate-500'}`}>
                      <BookOpen size={22} className={activeTab === 'recipes' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} />
                      <span className="text-[10px] font-bold">Recept</span>
                   </button>
                   <button onClick={() => setActiveTab('inspiration')} className={`flex flex-col items-center gap-1 flex-1 py-2 rounded-xl active:scale-95 ${activeTab === 'inspiration' ? 'text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20' : 'text-slate-400 dark:text-slate-500'}`}>
                      <Sparkles size={22} className={activeTab === 'inspiration' ? 'fill-[#f5f8f2] dark:fill-[#171f0d]/50' : ''} />
                      <span className="text-[10px] font-bold">Inspiration</span>
                   </button>
                </div>

                <main className="max-w-4xl mx-auto px-4 py-8 md:py-12">
                  
                  {/* MATSEDEL */}
                  {activeTab === 'plan' && (
                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                      {recipes.length === 0 ? (
                          <div className="text-center py-24 px-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-3xl border border-white dark:border-slate-700 shadow-xl shadow-slate-200/40 dark:shadow-none">
                              <div className="bg-[#f5f8f2] dark:bg-[#171f0d]/30 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                <BookOpen size={40} className="text-[#6a8a47] dark:text-[#82a061]" />
                              </div>
                              <h2 className="text-2xl font-extrabold text-slate-800 dark:text-white mb-3">Din receptbok är tom</h2>
                              <p className="text-slate-500 dark:text-slate-400 mb-8 max-w-md mx-auto">Du måste lägga till några av dina favoritrecept innan vi kan hjälpa dig att bygga en smart matsedel.</p>
                              <button onClick={() => setActiveTab('recipes')} className="px-8 py-3.5 bg-slate-900 dark:bg-[#526e35] text-white rounded-2xl font-bold shadow-lg active:scale-95">Gå till Receptboken</button>
                          </div>
                      ) : mealPlan.length === 0 ? (
                          <div className="text-center py-24 px-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-3xl border border-white dark:border-slate-700 shadow-xl shadow-slate-200/40 dark:shadow-none">
                              <div className="bg-[#f5f8f2] dark:bg-[#171f0d]/30 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                <Calendar size={40} className="text-[#6a8a47] dark:text-[#82a061]" />
                              </div>
                              <h2 className="text-2xl font-extrabold text-slate-800 dark:text-white mb-3">Ingen meny skapad ännu</h2>
                              <p className="text-slate-500 dark:text-slate-400 mb-8 max-w-md mx-auto">Välj hur många veckor du vill planera för att slumpa fram er allra första smarta matsedel!</p>
                              <div className="flex flex-wrap justify-center gap-3">
                                  <button onClick={() => generatePlan('week')} className="px-6 py-3 bg-[#526e35] dark:bg-[#6a8a47] text-white rounded-2xl font-bold shadow-lg active:scale-95">1 Vecka</button>
                                  <button onClick={() => generatePlan('2weeks')} className="px-6 py-3 bg-[#526e35] dark:bg-[#6a8a47] text-white rounded-2xl font-bold shadow-lg active:scale-95">2 Veckor</button>
                                  <button onClick={() => generatePlan('3weeks')} className="px-6 py-3 bg-[#526e35] dark:bg-[#6a8a47] text-white rounded-2xl font-bold shadow-lg active:scale-95">3 Veckor</button>
                                  <button onClick={() => generatePlan('month')} className="px-6 py-3 bg-slate-900 dark:bg-slate-700 text-white rounded-2xl font-bold shadow-lg active:scale-95">4 Veckor</button>
                              </div>
                          </div>
                      ) : (
                          <>
                              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-10 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-6 sm:p-8 rounded-[2rem] border border-white dark:border-slate-700 shadow-xl dark:shadow-none">
                                <div className="flex items-center gap-4">
                                  <div className="bg-[#e4ede0] dark:bg-[#171f0d]/40 p-3.5 rounded-2xl shadow-inner border border-[#f5f8f2] dark:border-[#293819] hidden sm:block">
                                    <Calendar size={28} className="text-[#526e35] dark:text-[#82a061]" />
                                  </div>
                                  <div>
                                    <h2 className="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white drop-shadow-sm leading-tight">Din Matsedel</h2>
                                    <p className="text-slate-500 dark:text-slate-400 font-medium mt-1">Planera smart och spara tid.</p>
                                  </div>
                                </div>
                                
                                {!isPlanLocked ? (
                                  <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                                      <div className="relative flex-1 sm:flex-none">
                                          <select value={planStartOffset} onChange={e => { const val = Number(e.target.value); setPlanStartOffset(val); updateDb({ planStartOffset: val }); }} className="w-full appearance-none bg-white dark:bg-slate-900 pl-4 pr-10 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-sm font-bold text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-[#6a8a47] cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800">
                                             <option value={0}>Denna vecka (v.{getISOWeekNumber(new Date())})</option>
                                             <option value={1}>Nästa vecka (v.{getISOWeekNumber(new Date(new Date().setDate(new Date().getDate() + 7)))})</option>
                                             <option value={2}>Om 2 veckor (v.{getISOWeekNumber(new Date(new Date().setDate(new Date().getDate() + 14)))})</option>
                                             <option value={3}>Om 3 veckor (v.{getISOWeekNumber(new Date(new Date().setDate(new Date().getDate() + 21)))})</option>
                                          </select>
                                          <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                            <ChevronDown size={16} strokeWidth={3} />
                                          </div>
                                      </div>
                                      <div className="relative flex-1 sm:flex-none">
                                          <select value={planType} onChange={e => setPlanType(e.target.value)} className="w-full appearance-none bg-white dark:bg-slate-900 pl-4 pr-10 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-sm font-bold text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-[#6a8a47] cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800">
                                             <option value="week">1 vecka</option>
                                             <option value="2weeks">2 veckor</option>
                                             <option value="3weeks">3 veckor</option>
                                             <option value="month">4 veckor</option>
                                          </select>
                                          <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                            <ChevronDown size={16} strokeWidth={3} />
                                          </div>
                                      </div>
                                      <button onClick={() => generatePlan(planType)} className="flex-1 sm:flex-none px-6 py-3.5 bg-[#526e35] dark:bg-[#6a8a47] hover:bg-[#3d5226] dark:hover:bg-[#526e35] text-white rounded-2xl font-black text-sm active:scale-95 shadow-lg flex items-center justify-center gap-2">
                                        <RefreshCw size={16} strokeWidth={3} /> Slumpa
                                      </button>
                                  </div>
                                ) : (
                                  <div className="mt-4 md:mt-0">
                                    <button onClick={toggleLock} className="flex items-center gap-2 px-6 py-3.5 rounded-2xl text-sm font-black shadow-md border active:scale-95 bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 border-amber-200 dark:border-amber-800 w-full sm:w-auto justify-center">
                                      <Lock size={16} strokeWidth={3} /> Matsedeln är låst
                                    </button>
                                  </div>
                                )}
                              </div>

                              {!isPlanLocked && mealPlan.length > 0 && (
                                  <div className="flex justify-end mb-6">
                                    <button onClick={toggleLock} className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm border active:scale-95 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700">
                                      <Unlock size={16} /> Lås matsedeln
                                    </button>
                                  </div>
                              )}

                              {mealPlan.length > 0 && (
                                  <div className="space-y-12">
                                  {Array.from({ length: planType === 'week' ? 1 : planType === '2weeks' ? 2 : planType === '3weeks' ? 3 : 4 }).map((_, weekIndex) => {
                                      const targetDate = new Date(); 
                                      targetDate.setDate(targetDate.getDate() + ((weekIndex + planStartOffset) * 7));
                                      const actualWeekNum = getISOWeekNumber(targetDate);
                                      
                                      return (
                                          <div key={weekIndex} className="animate-in fade-in slide-in-from-bottom-4 duration-700" style={{animationDelay: `${weekIndex * 100}ms`, fillMode: 'both'}}>
                                            <h3 className="text-xl font-extrabold text-slate-800 dark:text-white mb-5 flex items-center gap-3">
                                              <span className="bg-slate-800 dark:bg-slate-700 text-white w-10 h-10 rounded-xl flex items-center justify-center text-sm shadow-md">V{actualWeekNum}</span> 
                                              Vecka {actualWeekNum}
                                            </h3>
                                            
                                            <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-[2rem] shadow-xl border border-white/50 dark:border-slate-700/50 overflow-hidden">
                                                <div className="divide-y divide-slate-100/80 dark:divide-slate-700/50">
                                                {mealPlan.slice(weekIndex * 7, (weekIndex + 1) * 7).map((day, idx) => {
                                                  const actualIndex = (weekIndex * 7) + idx; 
                                                  const hasRecipe = !!day.recipe;
                                                  
                                                  return (
                                                      <div key={actualIndex} className={`p-4 sm:p-6 flex items-center justify-between transition-all duration-300 ${hasRecipe ? 'hover:bg-slate-50/50 dark:hover:bg-slate-700/30' : 'bg-slate-50/30 dark:bg-slate-900/30'}`}>
                                                        {hasRecipe ? (
                                                          <div className="flex items-center gap-4 sm:gap-6 flex-1 min-w-0 group cursor-pointer" onClick={() => setSelectedRecipeId(day.recipe.id)}>
                                                              <p className="font-black text-slate-700 dark:text-slate-300 w-16 sm:w-24 text-sm sm:text-base flex-shrink-0">{day.dayName}</p>
                                                              <div className="flex-1 text-left font-bold text-slate-900 dark:text-slate-100 text-base sm:text-lg group-hover:text-[#526e35] dark:group-hover:text-[#82a061] truncate flex items-center gap-2">
                                                                <span className="truncate">{day.recipe.name}</span>
                                                                <ExternalLink size={16} className="opacity-0 group-hover:opacity-100 text-[#6a8a47] hidden sm:block" />
                                                              </div>
                                                          </div>
                                                        ) : (
                                                          <div className="flex items-center gap-4 sm:gap-6 flex-1 min-w-0 opacity-60">
                                                              <p className="font-extrabold text-slate-400 dark:text-slate-500 w-16 sm:w-24 text-sm sm:text-base flex-shrink-0">{day.dayName}</p>
                                                              <p className="flex-1 text-left font-medium text-slate-400 dark:text-slate-500 text-base sm:text-lg italic">Inget planerat</p>
                                                          </div>
                                                        )}
                                                        
                                                        <div className="flex items-center gap-3 sm:gap-5 flex-shrink-0 ml-4">
                                                            {hasRecipe && <div className="hidden sm:block"><CatBadge protein={day.recipe.protein} /></div>}
                                                            {!isPlanLocked && (
                                                              <div className="flex items-center gap-1.5 sm:gap-2 bg-slate-100/80 dark:bg-slate-900/50 p-1.5 rounded-2xl border border-slate-200/50 dark:border-slate-700 shadow-sm">
                                                                {hasRecipe ? (
                                                                  <>
                                                                    <button onClick={() => swapDayRecipe(actualIndex)} className="p-2 sm:p-2.5 bg-white dark:bg-slate-800 hover:bg-[#f5f8f2] dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 hover:text-[#526e35] dark:hover:text-[#9eb582] rounded-xl active:scale-95 shadow-sm border border-slate-100 dark:border-slate-700" title="Byt recept"><RefreshCw size={16} strokeWidth={2.5} /></button>
                                                                    <button onClick={() => clearDayRecipe(actualIndex)} className="p-2 sm:p-2.5 bg-white dark:bg-slate-800 hover:bg-red-50 dark:hover:bg-slate-700 text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 rounded-xl active:scale-95 shadow-sm border border-slate-100 dark:border-slate-700" title="Töm denna dag"><X size={16} strokeWidth={2.5} /></button>
                                                                  </>
                                                                ) : (
                                                                  <button onClick={() => swapDayRecipe(actualIndex)} className="px-4 py-2.5 bg-white dark:bg-slate-800 hover:bg-[#f5f8f2] dark:hover:bg-slate-700 text-[#526e35] dark:text-[#82a061] rounded-xl active:scale-95 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center gap-1.5">
                                                                    <Plus size={16} strokeWidth={3} /> <span className="text-xs font-extrabold hidden sm:inline">Lägg till</span>
                                                                  </button>
                                                                )}
                                                              </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                              })}
                                            </div>
                                        </div>
                                      </div>
                                    );
                                })}
                                </div>
                            )}
                        </>
                    )}
                  </div>
                )}

                {/* --- VY: INKÖPSLISTA --- */}
                {activeTab === 'list' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-3xl mx-auto">
                    {mealPlan.length === 0 ? (
                         <div className="text-center py-24 px-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-3xl border border-white dark:border-slate-700 shadow-xl shadow-slate-200/40 dark:shadow-none">
                            <div className="bg-slate-100 dark:bg-slate-900 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                              <ShoppingCart size={40} className="text-slate-400 dark:text-slate-600" />
                            </div>
                            <h2 className="text-2xl font-extrabold text-slate-800 dark:text-white mb-2">Inköpslistan är tom</h2>
                            <p className="text-slate-500 dark:text-slate-400 font-medium">Skapa en matsedel först för att se vad du behöver handla.</p>
                        </div>
                    ) : (
                        <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-[2rem] shadow-xl border border-white/50 dark:border-slate-700 p-6 sm:p-8 mb-6">
                          <div className="flex flex-col sm:flex-row justify-between sm:items-end gap-6 mb-8 border-b border-slate-100 dark:border-slate-700 pb-6">
                              <div><h2 className="text-3xl font-black text-slate-800 dark:text-white mb-2 drop-shadow-sm">Inköpslista</h2></div>
                              <button onClick={handleCopyList} className="flex items-center justify-center gap-2 px-6 py-3 bg-slate-900 dark:bg-[#526e35] text-white font-bold rounded-2xl text-sm shadow-lg active:scale-95">
                                <Copy size={18} /> Kopiera text
                              </button>
                          </div>
                          <div className="space-y-3">
                              {shoppingList.map((item, idx) => {
                              const isChecked = checkedListItems && checkedListItems[item.name];
                              return (
                                  <div key={idx} className={`flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl border duration-300 gap-4 sm:gap-2 ${isChecked ? 'bg-slate-50/50 dark:bg-slate-900/30 border-transparent opacity-60 scale-[0.98]' : 'bg-white dark:bg-slate-800 border-slate-200/60 dark:border-slate-700 shadow-sm hover:border-[#9eb582] dark:hover:border-[#526e35] hover:shadow-md hover:-translate-y-0.5'}`}>
                                    <div className="flex items-center gap-4 flex-1 cursor-pointer" onClick={() => toggleCheckItem(item.name)}>
                                        <div className={`flex-shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center transition-colors ${isChecked ? 'bg-[#6a8a47] border-[#6a8a47] dark:bg-[#526e35] dark:border-[#526e35]' : 'border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900'}`}>
                                          {isChecked && <Check size={16} className="text-white" strokeWidth={3} />}
                                        </div>
                                        <span className={`font-semibold text-lg sm:text-base ${isChecked ? 'line-through text-slate-400 dark:text-slate-600' : 'text-slate-800 dark:text-slate-200'}`}>{item.name}</span>
                                    </div>
                                    <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto pl-11 sm:pl-0">
                                        <span className="font-bold text-slate-700 dark:text-slate-300 bg-slate-100/80 dark:bg-slate-900/50 px-4 py-2 rounded-xl text-sm whitespace-nowrap shadow-sm border border-slate-200/50 dark:border-slate-700">{formatAmounts(item.amounts)}</span>
                                        <a href={`https://handlaprivatkund.ica.se/stores/1004243/search?q=${encodeURIComponent(item.name)}`} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1.5 px-4 py-2 text-xs font-extrabold text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 rounded-xl border border-red-100 dark:border-red-800 active:scale-95 shadow-sm" onClick={(e) => e.stopPropagation()}>
                                          <ExternalLink size={14} /> ICA
                                        </a>
                                    </div>
                                  </div>
                              );
                              })}
                          </div>
                        </div>
                    )}
                  </div>
                )}

                {/* --- VY: RECEPTBOK --- */}
                {activeTab === 'recipes' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-8 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-6 sm:p-8 rounded-[2rem] border border-white dark:border-slate-700 shadow-xl dark:shadow-none">
                      <div>
                        <h2 className="text-3xl font-black text-slate-800 dark:text-white drop-shadow-sm">Receptbok</h2>
                        <p className="text-slate-500 dark:text-slate-400 font-medium mt-1">{recipes.length} fantastiska favoriter samlade.</p>
                      </div>
                      <div className="flex flex-wrap gap-3 w-full md:w-auto">
                        <button onClick={() => setShowAddModal(true)} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3.5 bg-[#526e35] dark:bg-[#6a8a47] hover:bg-[#3d5226] dark:hover:bg-[#526e35] text-white rounded-2xl font-bold text-sm shadow-lg active:scale-95">
                          <Plus size={18} strokeWidth={3} /> Nytt Recept
                        </button>
                        <div className="relative flex-1 md:flex-none">
                          <input type="file" accept="application/pdf" ref={fileInputRef} onChange={handlePdfUpload} className="hidden" id="pdf-upload" />
                          <label htmlFor="pdf-upload" className={`flex items-center justify-center gap-2 px-6 py-3.5 ${isUploadingPdf ? 'bg-slate-100 dark:bg-slate-700 text-slate-400 dark:text-slate-500' : 'bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 text-slate-700 dark:text-slate-300 cursor-pointer shadow-sm active:scale-95'} rounded-2xl font-bold text-sm w-full`}>
                            {isUploadingPdf ? <Loader2 size={18} className="animate-spin" /> : <Upload size={18} />} {isUploadingPdf ? 'Läser in...' : 'Importera PDF'}
                          </label>
                        </div>
                      </div>
                    </div>

                    {/* KATEGORI FILTRERING */}
                    {recipes.length > 0 && (
                        <div className="flex overflow-x-auto hide-scrollbar gap-3 mb-8 pb-2 -mx-4 px-4 sm:mx-0 sm:px-0">
                            {BOOK_COLLECTIONS.map(cat => (
                                <button key={cat} onClick={() => setSelectedCollection(cat)} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-extrabold whitespace-nowrap border shadow-sm active:scale-95 ${selectedCollection === cat ? 'bg-slate-800 dark:bg-[#526e35] text-white border-slate-800 dark:border-[#526e35]' : 'bg-white/80 dark:bg-slate-800/80 text-slate-600 dark:text-slate-300 border-white dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                                    {cat === 'Alla' && <Filter size={16} />} {cat}
                                </button>
                            ))}
                        </div>
                    )}

                    {filteredRecipes.length === 0 ? (
                         <div className="text-center py-20 px-4 bg-white/50 dark:bg-slate-800/50 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-3xl backdrop-blur-sm">
                           <p className="text-slate-500 dark:text-slate-400 font-medium text-lg">Inga recept i denna kategori.</p>
                         </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredRecipes.map((recipe, index) => (
                            <div key={recipe.id} className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-[2rem] shadow-lg border border-white/50 dark:border-slate-700 flex flex-col hover:shadow-2xl hover:-translate-y-1.5 duration-300 group cursor-pointer relative overflow-hidden animate-in fade-in slide-in-from-bottom-4" style={{animationDelay: `${(index % 10) * 50}ms`, fillMode: 'both'}} onClick={() => setSelectedRecipeId(recipe.id)}>
                              <div className="h-40 w-full bg-slate-100 dark:bg-slate-700 relative overflow-hidden flex-shrink-0">
                                  <button onClick={(e) => { e.stopPropagation(); deleteRecipe(recipe.id); }} className="absolute top-4 right-4 p-2.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 rounded-full opacity-0 group-hover:opacity-100 shadow-sm active:scale-95 z-10" title="Ta bort recept">
                                    <Trash2 size={18} />
                                  </button>
                                  
                                  <button onClick={(e) => triggerImageUpload(e, recipe.id)} className="absolute top-4 left-4 p-2.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md text-slate-400 dark:text-slate-500 hover:text-[#6a8a47] dark:hover:text-[#82a061] rounded-full opacity-0 group-hover:opacity-100 shadow-sm active:scale-95 z-10" title="Lägg till egen bild">
                                    <ImagePlus size={18} />
                                  </button>

                                  <img src={getRecipeImage(recipe)} alt={recipe.name} className="w-full h-full object-cover group-hover:scale-105 duration-700" onError={(e) => { e.target.onerror=null; e.target.src=getFallbackImage(recipe.id); }} />
                                  <div className="absolute bottom-0 left-0 right-0 h-10 bg-gradient-to-t from-white/90 dark:from-slate-800/90 to-transparent"></div>
                              </div>
                              <div className="p-6 flex flex-col flex-1">
                                  <div className="flex justify-between items-center mb-4 pr-8">
                                    <span className="text-[10px] font-extrabold text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2] dark:bg-[#171f0d]/30 px-2 py-1 rounded-md uppercase tracking-widest border border-[#e4ede0] dark:border-[#293819]">{recipe.collection}</span>
                                  </div>
                                  
                                  <h3 className="font-black text-xl text-slate-800 dark:text-slate-100 mb-6 leading-tight group-hover:text-[#6a8a47] dark:group-hover:text-[#82a061] transition-colors drop-shadow-sm">{recipe.name}</h3>
                                  
                                  <div className="mt-auto pt-5 flex justify-between items-center border-t border-slate-100/80 dark:border-slate-700/80">
                                      <CatBadge protein={recipe.protein} />
                                      <span className="text-slate-500 dark:text-slate-400 text-xs font-bold flex items-center gap-1.5 bg-slate-50 dark:bg-slate-900/50 px-2 py-1 rounded-md border border-slate-100 dark:border-slate-700">
                                        <CalendarDays size={14}/>{recipe.time}
                                      </span>
                                  </div>
                              </div>
                            </div>
                        ))}
                        </div>
                    )}
                  </div>
                )}

                {/* --- VY: INSPIRATION --- */}
                {activeTab === 'inspiration' && (
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-2xl mx-auto">
                    <div className="text-center mb-8 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-8 rounded-3xl border border-white dark:border-slate-700 shadow-xl dark:shadow-none">
                      <div className="bg-[#e4ede0] dark:bg-[#171f0d]/40 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-[#f5f8f2] dark:border-[#293819]">
                        <Sparkles size={36} className="text-[#526e35] dark:text-[#82a061]" />
                      </div>
                      <h2 className="text-3xl font-extrabold text-slate-800 dark:text-white mb-3 drop-shadow-sm">Ny inspiration</h2>
                      <p className="text-slate-500 dark:text-slate-400 font-medium">Skriv in en råvara du har hemma eller något du är sugen på, så hittar AI-kocken på ett helt unikt, gott recept åt dig.</p>
                    </div>
                    
                    <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md p-3 sm:p-4 rounded-3xl shadow-lg border border-white dark:border-slate-700 mb-8 flex flex-col sm:flex-row gap-3 relative z-10">
                      <input type="text" value={inspirationQuery} onChange={(e) => setInspirationQuery(e.target.value)} placeholder="T.ex. Vegetariskt med sötpotatis..." className="flex-1 px-6 py-4 bg-slate-50/50 dark:bg-slate-900/50 border border-slate-200/60 dark:border-slate-600 rounded-2xl outline-none text-slate-900 dark:text-slate-100 text-lg font-medium shadow-inner" onKeyDown={(e) => e.key === 'Enter' && handleGenerateInspiration()} />
                      <button onClick={handleGenerateInspiration} disabled={isGeneratingInspiration} className="px-8 py-4 bg-[#526e35] hover:bg-[#3d5226] dark:bg-[#6a8a47] dark:hover:bg-[#526e35] text-white rounded-2xl font-bold flex items-center justify-center gap-2 disabled:opacity-70 shadow-md active:scale-95 text-lg">
                        {isGeneratingInspiration ? <Loader2 size={20} className="animate-spin" /> : <Sparkles size={20} />} Skapa recept
                      </button>
                    </div>

                    {inspiredRecipe && (
                      <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-[2rem] shadow-2xl overflow-hidden border border-white dark:border-slate-700 animate-in zoom-in-95 duration-500 relative">
                        <div className="p-6 sm:p-8">
                          <span className="text-xs font-bold text-[#526e35] dark:text-[#82a061] bg-[#f5f8f2] dark:bg-[#171f0d]/30 px-3 py-1 rounded-md border border-[#e4ede0] dark:border-[#293819] uppercase tracking-widest mb-4 inline-block">{inspiredRecipe.collection}</span>
                          <h2 className="text-3xl sm:text-4xl font-black text-slate-800 dark:text-slate-100 leading-tight mb-6 drop-shadow-sm">{inspiredRecipe.name}</h2>
                          
                          <div className="w-full h-48 sm:h-80 bg-slate-100 dark:bg-slate-700 rounded-3xl mb-8 overflow-hidden relative shadow-inner border border-slate-200/50 dark:border-slate-600">
                            <img src={getRecipeImage(inspiredRecipe)} alt={inspiredRecipe.name} className="w-full h-full object-cover animate-in fade-in" onError={(e) => { e.target.onerror=null; e.target.src=getFallbackImage(inspiredRecipe.id); }} />
                          </div>
                          
                          <div className="flex items-center gap-4 text-sm font-medium text-slate-500 dark:text-slate-400 mb-8 pb-6 border-b border-slate-100 dark:border-slate-700">
                            <CatBadge protein={inspiredRecipe.protein} />
                            <span className="flex items-center gap-1.5 bg-slate-50 dark:bg-slate-900/50 px-3 py-1.5 rounded-lg border border-slate-200/50 dark:border-slate-600">
                              <CalendarDays size={18}/> {inspiredRecipe.time}
                            </span>
                          </div>
                          
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                            <div className="bg-[#f5f8f2]/50 dark:bg-[#171f0d]/20 p-6 rounded-3xl border border-[#e4ede0]/50 dark:border-[#293819]/50 shadow-sm">
                              <h3 className="font-extrabold text-slate-800 dark:text-slate-100 mb-5 flex items-center gap-2 text-lg">
                                <ShoppingCart size={20} className="text-[#526e35] dark:text-[#82a061]"/> Ingredienser
                              </h3>
                              <ul className="space-y-3 text-sm text-slate-700 dark:text-slate-300">
                                {inspiredRecipe.ingredients.map((ing, i) => (
                                  <li key={i} className="flex justify-between border-b border-slate-200/50 dark:border-slate-700/50 pb-2 last:border-0 last:pb-0 items-center">
                                    <span className="font-medium text-base">{ing.name}</span>
                                    <span className="font-bold text-[#3d5226] dark:text-[#9eb582] bg-white dark:bg-slate-800 px-3 py-1 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700">{ing.amount} {ing.unit}</span>
                                  </li>
                                ))}
                              </ul>
                            </div>
                            
                            <div>
                              <h3 className="font-extrabold text-slate-800 dark:text-slate-100 mb-5 flex items-center gap-2 text-lg">
                                <Utensils size={20} className="text-[#526e35] dark:text-[#82a061]"/> Tillagning
                              </h3>
                              <div className="space-y-4">
                                {parseInstructionsText(inspiredRecipe.instructions).map((cleanStep, idx) => (
                                    <div key={idx} className="flex gap-4 p-4 bg-slate-50 dark:bg-slate-700 rounded-2xl border border-slate-100 dark:border-slate-600 shadow-sm items-start">
                                      <span className="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-800 rounded-full text-[#526e35] dark:text-[#82a061] font-bold border border-[#e4ede0] dark:border-[#293819] shadow-sm">{idx+1}</span>
                                      <p className="text-slate-700 dark:text-slate-200 pt-1 leading-relaxed font-medium">{cleanStep}</p>
                                    </div>
                                ))}
                              </div>
                            </div>
                          </div>
                          <button onClick={saveInspiredRecipe} className="w-full px-6 py-5 bg-slate-900 dark:bg-[#526e35] text-white rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl active:scale-95 text-lg">
                            <Save size={24} /> Spara detta till min Receptbok
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </main>

              <RecipeModal />
              <AddRecipeModal />
              <ShareModal />
            </div>
          </div>
        );
      }

      const root = createRoot(document.getElementById('root'));
      root.render(<App />);

    </script>
</body>
</html>
